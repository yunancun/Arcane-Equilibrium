# G8-02 — Python↔Rust ExecutorAgent decision parity test cases.
# G8-02 — Python↔Rust ExecutorAgent 決策一致性測試案例。
#
# Source-of-truth design (per PA RFC Q2 §95% case-level binary):
#   - case_id    : unique tag (golden_NN / synthetic_NN)
#   - source     : "golden" | "synthetic_handcrafted"
#                  (E2 G8-02 review: previous name implied "real replay"
#                  but these 40 cases are handcrafted YAML literals — no
#                  seed, no generator, no PG snapshot from production
#                  decision_outcomes. The case_id "_replay" suffix is
#                  preserved as-is solely for stable test ids.)
#                  (E2 G8-02 審查：原名暗示真 replay，但 40 case 皆為手寫
#                  YAML 字面量，無種子、無生成器、無 production decision_outcomes
#                  PG snapshot。case_id "_replay" 後綴保留僅為穩定 test id。)
#   - description: human-readable purpose / 案例目的
#   - config     : {shadow_mode, max_position_pct, per_symbol_position_cap}
#                  Mirror of Rust RiskConfig.executor sub-slice schema
#                  (rust/openclaw_engine/src/config/risk_config_advanced.rs:770).
#   - intent     : {symbol, side, qty, current_position_qty}
#                  Used by both Python ExecutorAgent.execute_order(...) and
#                  the reference spec to derive an expected decision.
#   - expected_decision: "submit" | "block_shadow"
#                        (Wave-3 scope: only shadow_mode is wired in Python
#                        ExecutorAgent + Rust schema. per_symbol_cap +
#                        max_pct gates are deferred to G3-08; see
#                        test_per_symbol_cap_parity_deferred for marker.)
#   - expected_reason  : human-readable rationale
#
# Distribution (per PA RFC Q2 §70 case · ≥95% agree):
#   - 30 golden fixtures        (handcrafted, every shadow_mode boundary covered)
#   - 40 synthetic_handcrafted  (handcrafted YAML literals; deterministic by
#                                 construction. Naming clarified per E2 G8-02
#                                 review — was "synthetic replay", but these
#                                 are NOT real replays.)
#
# Mock boundaries (per task spec §"實作要求"):
#   - IPC channel: never spawned; cache._fetch_via_ipc_blocking is patched.
#   - PG connection: never opened; synthetic replay uses fixture-injected
#     decision_outcomes shape (no live SELECT).
#   - Business logic NOT mocked: Python ExecutorAgent.execute_order() runs
#     real, including the shadow_mode_provider lambda chain.

