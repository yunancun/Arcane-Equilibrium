<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>测试交易</title>
<script src="/static/common.js"></script>
</head>
<body>
<script>ocAuthCheck(); ocInjectBaseCSS();</script>

<style>
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Unified control bar ─────────────────────────────────────── */
  .unified-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .unified-bar .bar-title { font-weight: 600; font-size: 13px; }
  .unified-bar .bar-status { font-size: 12px; color: var(--text-dim); }

  /* ── Sub-tab bar — same style as outer console tab bar ───────── */
  .sub-tab-bar {
    display: flex;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .sub-tab-bar::-webkit-scrollbar { display: none; }
  .sub-tab {
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    flex-shrink: 0;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .sub-tab:hover { color: var(--text); background: rgba(56,139,253,0.04); }
  .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .sub-tab .sub-icon { margin-right: 4px; }

  /* ── Inner frame container ────────────────────────────────────── */
  .inner-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .inner-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    background: var(--bg);
  }

  /* ── Confirm dialog overlay ──────────────────────────────────── */
  .oc-dialog-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.55);
    z-index: 9999;
    align-items: center; justify-content: center;
  }
  .oc-dialog-overlay.show { display: flex; }
  .oc-dialog {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    max-width: 440px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .oc-dialog h3 { margin: 0 0 12px; font-size: 16px; }
  .oc-dialog p { margin: 0 0 16px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .oc-dialog .btn-row { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .oc-dialog .note { font-size: 11px; color: var(--yellow); margin-bottom: 12px; }
</style>

<!-- ── Unified Control Bar ──────────────────────────────────────── -->
<div class="unified-bar">
  <span class="bar-title">&#x2699;&#xFE0F; 双引擎统一控制</span>
  <span id="unified-status" class="oc-chip oc-chip-neutral">--</span>
  <span class="bar-status" id="unified-detail"></span>
  <span style="flex:1"></span>
  <button class="oc-btn oc-btn-success" id="btn-unified-start" onclick="unifiedStart()">&#x25B6; 启动引擎</button>
  <button class="oc-btn oc-btn-danger" id="btn-unified-stop" onclick="unifiedStop()" disabled>&#x23F9; 停止引擎</button>
</div>

<!-- ── Sub-tab bar ──────────────────────────────────────────────── -->
<div class="sub-tab-bar">
  <div class="sub-tab active" id="st-demo" onclick="switchSub('demo')">
    <span class="sub-icon">&#x1F3E6;</span>执行引擎 / Demo (Primary)
  </div>
  <div class="sub-tab" id="st-paper" onclick="switchSub('paper')">
    <span class="sub-icon">&#x1F9EA;</span>测试引擎 / Paper (Testing)
  </div>
</div>

<!-- ── Inner iframe area ────────────────────────────────────────── -->
<div class="inner-wrap">
  <iframe id="if-demo"  src="/static/tab-demo.html?v=20260405b"></iframe>
  <iframe id="if-paper" style="display:none" data-src="/static/tab-paper.html?v=20260405b"></iframe>
</div>

<!-- ── Start Confirmation Dialog ────────────────────────────────── -->
<div class="oc-dialog-overlay" id="dlg-start">
  <div class="oc-dialog">
    <h3>&#x25B6; 启动双引擎</h3>
    <p>启动 Rust 交易引擎：Paper 测试引擎 + Demo 执行引擎同步运行。初始余额自动从 Demo 账户同步。</p>
    <div class="note">&#x26A0; Bybit Demo 如需重置余额，请先到 <a href="https://demo-trading.bybit.com" target="_blank" style="color:var(--accent)">demo-trading.bybit.com</a> 手动操作后再启动。</div>
    <div id="dlg-start-balance" style="font-size:13px;margin-bottom:12px;color:var(--text)"></div>
    <div class="btn-row">
      <button class="oc-btn" onclick="closeDialog('dlg-start')">取消</button>
      <button class="oc-btn oc-btn-success" id="btn-dlg-confirm-start" onclick="doStart()">启动</button>
    </div>
  </div>
</div>

<!-- ── Stop Confirmation Dialog ─────────────────────────────────── -->
<div class="oc-dialog-overlay" id="dlg-stop">
  <div class="oc-dialog">
    <h3>&#x23F9; 停止双引擎</h3>
    <p>停止将同时：<br>1. 平掉所有 Paper 持仓<br>2. 取消 Demo 所有挂单 + 平掉 Demo 所有仓位<br>3. 暂停策略信号</p>
    <div class="btn-row">
      <button class="oc-btn" onclick="closeDialog('dlg-stop')">取消</button>
      <button class="oc-btn oc-btn-danger" onclick="doStop()">确认停止</button>
    </div>
  </div>
</div>

<script>
let _loaded = { demo: true, paper: false };

function switchSub(which) {
  document.getElementById('st-paper').classList.toggle('active', which === 'paper');
  document.getElementById('st-demo').classList.toggle('active', which === 'demo');

  const frames = { paper: 'if-paper', demo: 'if-demo' };
  Object.entries(frames).forEach(([id, frameId]) => {
    const el = document.getElementById(frameId);
    if (id === which) {
      el.style.display = 'block';
      if (!_loaded[id]) {
        el.src = el.dataset.src;
        _loaded[id] = true;
      }
    } else {
      el.style.display = 'none';
    }
  });
}

// ── Dialog helpers ──────────────────────────────────────────────
function closeDialog(id) { document.getElementById(id).classList.remove('show'); }

// ── Unified Start ───────────────────────────────────────────────
// 打开启动对话框时预读 Demo 余额，显示在弹窗中
// Pre-fetch Demo balance when opening start dialog, show in popup
let _pendingStartBalance = 0;

async function unifiedStart() {
  const balEl = document.getElementById('dlg-start-balance');
  const confirmBtn = document.getElementById('btn-dlg-confirm-start');
  balEl.textContent = '正在读取 Demo 余额...';
  confirmBtn.disabled = true;
  document.getElementById('dlg-start').classList.add('show');

  _pendingStartBalance = 0;
  try {
    const balD = await ocApi('/api/v1/strategy/demo/balance');
    if (balD && balD.data && (balD.data.source === 'rust_engine' || balD.data.retCode === 0)) {
      let b = balD.data;
      if (b.result && b.result.list && b.result.list[0]) b = b.result.list[0];
      const equity = parseFloat(b.totalEquity || b.total_equity || b.equity || 0);
      if (equity > 0) {
        _pendingStartBalance = equity;
        balEl.innerHTML = '&#x1F4B0; Demo 账户余额：<strong style="color:var(--green)">₮' + equity.toFixed(2) + '</strong>（将作为 Paper 初始余额）';
        confirmBtn.disabled = false;
        return;
      }
    }
  } catch (e) {}
  balEl.innerHTML = '&#x26A0; 无法读取 Demo 余额，请检查 Demo API 连接';
  confirmBtn.disabled = true;
}

async function doStart() {
  closeDialog('dlg-start');

  if (_pendingStartBalance <= 0) {
    ocToast('无法获取 Demo 余额，启动已取消', 'error');
    return;
  }

  // Clear Demo baseline so iframe picks up fresh values on reload
  // 清除 Demo 基准数据，iframe 重载时会重新捕获
  try {
    localStorage.removeItem('oc_demo_initial_equity');
    localStorage.removeItem('oc_demo_peak_equity');
    localStorage.removeItem('oc_demo_realized_baseline');
  } catch (e) {}

  // Start Paper session with Demo balance
  // 用 Demo 余额启动 Paper 引擎
  const d = await ocPost('/api/v1/paper/session/start', { initial_balance: _pendingStartBalance });
  if (d) {
    ocToast('引擎已启动，初始余额 ₮' + _pendingStartBalance.toFixed(2), 'success');
    refreshIframes();
    checkUnifiedStatus();
  } else {
    ocToast('启动失败', 'error');
  }
}

// ── Unified Stop ────────────────────────────────────────────────
function unifiedStop() {
  document.getElementById('dlg-stop').classList.add('show');
}

async function doStop() {
  closeDialog('dlg-stop');
  // P1: Stop closes Paper + Demo positions, cancels Demo orders, pauses strategies
  const d = await ocPost('/api/v1/paper/session/stop', {});
  if (d) {
    const errors = d.data && d.data.errors;
    if (errors && errors.length) {
      ocToast('引擎已停止（部分错误: ' + errors.join('; ') + '）', 'warning');
    } else {
      ocToast('双引擎已停止 — Paper + Demo 持仓已平仓', 'success');
    }
    refreshIframes();
    setTimeout(checkUnifiedStatus, 3000);
  } else {
    ocToast('停止失败', 'error');
  }
}

// ── Status Check ────────────────────────────────────────────────
async function checkUnifiedStatus() {
  const badge = document.getElementById('unified-status');
  const detail = document.getElementById('unified-detail');
  const btnStart = document.getElementById('btn-unified-start');
  const btnStop = document.getElementById('btn-unified-stop');

  let paperState = 'idle';
  let demoConnected = false;

  try {
    const pd = await ocApi('/api/v1/paper/session/status');
    if (pd && pd.data && pd.data.session) paperState = pd.data.session.session_state || 'idle';
  } catch (e) {}

  try {
    const dd = await ocApi('/api/v1/strategy/demo/balance');
    if (dd && dd.data && (dd.data.source === 'rust_engine' || dd.data.retCode === 0)) demoConnected = true;
  } catch (e) {}

  const paperActive = (paperState === 'active' || paperState === 'paused');
  const stateMap = {
    'active': '运行中', 'paused': '已暂停', 'stopped': '已停止', 'idle': '未启动',
  };

  const paperLabel = stateMap[paperState] || paperState;
  if (paperActive && demoConnected) {
    badge.textContent = '双引擎运行中';
    badge.className = 'oc-chip oc-chip-good';
  } else if (paperState === 'paused' || paperState === 'stopped') {
    badge.textContent = paperState === 'paused' ? '已暂停' : '已停止';
    badge.className = 'oc-chip oc-chip-warn';
  } else if (demoConnected) {
    badge.textContent = 'Demo 已连接';
    badge.className = 'oc-chip oc-chip-warn';
  } else {
    badge.textContent = '离线';
    badge.className = 'oc-chip oc-chip-neutral';
  }

  detail.textContent = '执行引擎(Demo): ' + (demoConnected ? '已连接' : '未连接') + ' | 测试引擎(Paper): ' + paperLabel;
  btnStart.disabled = paperActive;
  btnStop.disabled = (!paperActive && paperState !== 'paused');
}

function refreshIframes() {
  try { document.getElementById('if-paper').contentWindow.location.reload(); } catch (e) {}
  if (_loaded.demo) {
    try { document.getElementById('if-demo').contentWindow.location.reload(); } catch (e) {}
  }
}

// Initial status check + periodic
checkUnifiedStatus();
setInterval(checkUnifiedStatus, 20000);
</script>
</body>
</html>
