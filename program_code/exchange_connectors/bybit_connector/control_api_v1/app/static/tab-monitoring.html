<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monitoring</title>
<!-- Phase 0 過渡:token 正本 tokens.css+compat 映射層須先於一切樣式載入;data-theme="dark" 釘死玄夜主題,因存量樣式仍有暗色硬編碼,OS 淺色偏好會產生壞對比;P1.3 主題切換上線後移除釘死 -->
<link rel="stylesheet" href="/static/tokens.css" />
<link rel="stylesheet" href="/static/tokens-compat.css" />
<link rel="stylesheet" href="/static/oc-utilities.css" />
<script src="/static/common-formatters.js?v=20260711.p03-numerics"></script>
<script src="/static/common-mode-badge.js?v=20260519.split-p2"></script>
<script src="/static/common-modals.js?v=20260519.split-p2"></script>
<script src="/static/js/fetch_with_csrf.js?v=20260527.ops1"></script>
<script src="/static/common.js?v=20260527.ops1-csrf"></script>
</head>
<body>
<script>ocAuthCheck(); ocInjectBaseCSS();</script>

<style>
  /* ── P0.2 批次 2:inline style= 收斂出的頁面組件(頁內 <style> 在 body,
     文檔序晚於 ocInjectBaseCSS 注入的 head <style>,同 specificity 由本塊勝出)── */
  .oc-metrics.metrics-1col { grid-template-columns: 1fr; }
  /* 父層字級修飾:oc-metric-val 的 className 會被 JS 整串重寫(鐵則二),
     字級掛在不被 JS 觸碰的 .oc-metric 包裹層 */
  .mv--sm .oc-metric-val { font-size: var(--fs-dense); }
  .mv--md .oc-metric-val { font-size: var(--fs-md); }
</style>

<!-- ═══ Component Status Grid ═══ -->
<div class="oc-grid-2">
  <!-- Pipeline Bridge -->
  <div class="oc-card">
    <h3>&#x1F310; Pipeline Bridge</h3>
    <div id="explain-pipeline"></div>
    <div class="oc-metrics metrics-1col" id="pipeline-metrics">
      <div class="oc-metric mv--md"><div class="oc-metric-label">Status</div><div class="oc-metric-val" id="pipe-status">--</div></div>
      <div class="oc-metric mv--md"><div class="oc-metric-label">Tick Count</div><div class="oc-metric-val num" id="pipe-ticks">--</div></div>
      <div class="oc-metric mv--md"><div class="oc-metric-label">Intent Count</div><div class="oc-metric-val num" id="pipe-intents">--</div></div>
      <div class="oc-metric mv--sm"><div class="oc-metric-label">Last Tick</div><div class="oc-metric-val num" id="pipe-last">--</div></div>
    </div>
  </div>

  <!-- Telegram Alerter -->
  <div class="oc-card">
    <h3>&#x1F4E8; Telegram Alerter</h3>
    <div id="explain-telegram"></div>
    <div class="oc-metrics metrics-1col" id="telegram-metrics">
      <div class="oc-metric mv--md"><div class="oc-metric-label">Status</div><div class="oc-metric-val" id="tg-status">--</div></div>
      <div class="oc-metric mv--md"><div class="oc-metric-label">Messages Sent</div><div class="oc-metric-val num" id="tg-sent">--</div></div>
      <div class="oc-metric mv--md"><div class="oc-metric-label">Failed</div><div class="oc-metric-val num" id="tg-failed">--</div></div>
      <div class="oc-metric mv--sm"><div class="oc-metric-label">Last Sent</div><div class="oc-metric-val num" id="tg-last">--</div></div>
    </div>
  </div>

</div>

<!-- ═══ System Health Detail ═══ -->
<details class="oc-collapse">
  <summary>&#x1F3E5; 系統健康详情 / System Health Detail</summary>
  <div class="oc-collapse-body">
    <div id="health-detail" class="oc-loading">Loading...</div>
  </div>
</details>

<script>
// ─── Explainers ───────────────────────────────────────────────
$('explain-pipeline').innerHTML = ocExplain(
  'Pipeline Bridge 是數據管線的核心組件，負責将實時市场數據分发給各個策略，并将策略的交易意圖转换为實際訂單。',
  'Pipeline Bridge 接收 WebSocket tick 數據，執行 fan-out 分发給所有注册的策略。策略產生的 OrderIntent 經過風控檢查后，通過 Bridge 转换为 Paper 模擬 或 Demo 演示 的訂單。Bridge 還負責 K 線聚合和成交量追踪。'
);

$('explain-telegram').innerHTML = ocExplain(
  'Telegram 告警在重要事件發生時發送通知到你的手机。例如：新的交易信號、訂單成交、止損触发、系統異常等。',
  '告警通過 Telegram Bot API 發送。需要配置 TELEGRAM_BOT_TOKEN 和 TELEGRAM_CHAT_ID 環境变量。告警分为多個级别：INFO（信號和成交）、WARNING（異常和風控触发）、CRITICAL（系統錯誤和熔斷）。可以按级别過滤。'
);

// ─── Data Loading ─────────────────────────────────────────────
async function loadPipeline() {
  // Pipeline stats from paper session (pipeline_bridge stats live there)
  // 管線統計从 paper session 获取（pipeline_bridge 的統計在那里）
  let d;
  try { d = await ocApi('/api/v1/paper/session/status'); } catch(e) { d = null; }
  if (!d || !d.data) { $('pipe-status').textContent = 'Load Failed'; $('pipe-status').className = 'oc-metric-val'; return; }
  const sess = d.data.session || d.data;
  const isActive = sess.session_state === 'active';
  const el = $('pipe-status');
  el.textContent = isActive ? 'Active' : (sess.session_state || 'Inactive');
  el.className = 'oc-metric-val ' + (isActive ? 'green' : '');

  // Also fetch orchestrator for intent/tick stats
  let d2;
  try { d2 = await ocApi('/api/v1/strategy/status'); } catch(e) { d2 = null; }
  if (d2 && d2.data) {
    const stats = d2.data.stats || {};
    const km = d2.data.kline_manager_status || {};
    const kmStats = km.stats || {};
    ocSetText('pipe-ticks', kmStats.total_ticks_processed != null ? kmStats.total_ticks_processed : '--');
    ocSetText('pipe-intents', stats.intents_collected != null ? stats.intents_collected : '--');
    ocSetText('pipe-last', kmStats.last_tick_ts_ms ? ocTimeShort(kmStats.last_tick_ts_ms) : '--');
  } else {
    ocSetText('pipe-ticks', '--');
    ocSetText('pipe-intents', '--');
    ocSetText('pipe-last', '--');
  }
}

async function loadTelegram() {
  let d;
  try { d = await ocApi('/api/v1/strategy/telegram/status'); } catch(e) { d = null; }
  if (!d || !d.data) {
    ocSetText('tg-status', 'Not Configured');
    return;
  }
  const t = d.data;
  const enabled = t.enabled || t.configured;
  const el = $('tg-status');
  el.textContent = enabled ? 'Enabled' : 'Disabled';
  el.className = 'oc-metric-val ' + (enabled ? 'green' : '');
  ocSetText('tg-sent', t.messages_sent != null ? t.messages_sent : (t.sent_count != null ? t.sent_count : '--'));
  ocSetText('tg-failed', t.messages_failed != null ? t.messages_failed : (t.error_count != null ? t.error_count : '--'));
  ocSetText('tg-last', t.last_sent_at ? ocTimeShort(t.last_sent_at) : '--');
}

async function loadHealthDetail() {
  const d = await ocApi('/api/v1/system/health');
  if (!d) { ocSetHtml('health-detail', '<div class="oc-loading">Failed to load</div>'); return; }
  const h = d.data || d;

  // Flatten nested dicts into displayable key-value pairs
  // 将嵌套 dict 展平为可顯示的键值對
  function flatEntries(obj, prefix) {
    let entries = [];
    Object.entries(obj).forEach(([key, val]) => {
      const fullKey = prefix ? prefix + '.' + key : key;
      if (val != null && typeof val === 'object' && !Array.isArray(val)) {
        entries = entries.concat(flatEntries(val, fullKey));
      } else {
        entries.push([fullKey, val]);
      }
    });
    return entries;
  }

  let html = '<div class="oc-metrics">';
  flatEntries(h, '').forEach(([key, val]) => {
    const v = val != null ? String(val) : '--';
    const label = key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    let cls = '';
    if (v === 'true' || v === 'passed' || v === 'healthy') cls = 'green';
    else if (v === 'false' || v === 'failed' || v === 'fail') cls = 'red';
    html += '<div class="oc-metric"><div class="oc-metric-label fs-micro">' + ocEsc(label) + '</div><div class="oc-metric-val fs-base ' + cls + '">' + ocEsc(v) + '</div></div>';
  });
  html += '</div>';
  ocSetHtml('health-detail', html);
}

async function loadAll() {
  await Promise.allSettled([loadPipeline(), loadTelegram(), loadHealthDetail()]);
}

loadAll();
ocStartRefresh(loadAll, 15000);
</script>
</body>
</html>
