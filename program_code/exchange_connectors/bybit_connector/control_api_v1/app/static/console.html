<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenClaw Trading Console</title>
<script src="/static/common.js"></script>
<style>
  :root {
    --bg: #0d1117; --card-bg: #161b22; --border: #30363d;
    --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #388bfd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Roboto, sans-serif;
    overflow: hidden; }

  /* ── Header ─────────────────────────────────────────────────── */
  .header { display: flex; align-items: center; gap: 10px; padding: 8px 16px;
    background: var(--card-bg); border-bottom: 1px solid var(--border); height: 42px; }
  .header .logo { font-size: 18px; margin-right: 2px; }
  .header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .header .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
  .tag-blue { background: rgba(56,139,253,0.15); color: var(--blue); }
  .tag-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: var(--green); }
  .dot-err { background: var(--red); }
  .dot-off { background: var(--text-dim); }
  .spacer { flex: 1; }
  .header-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-size: 11px; padding: 3px 10px; cursor: pointer; }
  .header-btn:hover { border-color: var(--accent); color: var(--text); }

  /* ── Layout ─────────────────────────────────────────────────── */
  .layout { display: grid; grid-template-columns: 220px 1fr; height: calc(100vh - 42px); }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }

  /* ── Sidebar ────────────────────────────────────────────────── */
  .sidebar { background: var(--card-bg); border-right: 1px solid var(--border);
    padding: 10px; overflow-y: auto; }
  .sidebar h2 { font-size: 10px; text-transform: uppercase; color: var(--text-dim);
    margin: 12px 0 5px; letter-spacing: 0.5px; }
  .sidebar h2:first-child { margin-top: 0; }

  .mc { background: var(--bg); border: 1px solid #21262d; border-radius: 8px;
    padding: 7px 10px; margin-bottom: 5px; }
  .mc-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
  .mc-val { font-size: 17px; font-weight: 700; margin-top: 1px; }
  .mc-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .green { color: var(--green); } .red { color: var(--red); }
  .yellow { color: var(--yellow); } .blue { color: var(--blue); }

  /* ── Tab Bar ────────────────────────────────────────────────── */
  .tab-bar { display: flex; background: var(--card-bg); border-bottom: 1px solid var(--border);
    overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab { padding: 7px 14px; font-size: 12px; cursor: pointer; color: var(--text-dim);
    border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none;
    white-space: nowrap; flex-shrink: 0; }
  .tab:hover { color: var(--text); background: rgba(56,139,253,0.04); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .tab-icon { margin-right: 4px; font-size: 12px; }

  /* ── Frame Container ────────────────────────────────────────── */
  .frame-wrap { flex: 1; position: relative; overflow: hidden; }
  .frame-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border: none; background: var(--bg); }
  .frame-wrap .placeholder { display: none; position: absolute; inset: 0; overflow-y: auto; }

  /* ── Sidebar Nav Buttons ────────────────────────────────────── */
  .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 6px; }
  .nav-btn { padding: 5px 6px; border-radius: 6px; border: 1px solid #21262d;
    background: var(--bg); color: var(--text-dim); font-size: 10px; cursor: pointer;
    text-align: center; transition: all 0.15s; }
  .nav-btn:hover { border-color: var(--accent); color: var(--text); }
  .nav-btn.nav-active { background: rgba(56,139,253,0.1); border-color: rgba(56,139,253,0.3); color: var(--accent); }

  /* Currency Toggle Badge */
  .oc-curr-badge { display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer;
    background: rgba(56,139,253,0.12); border: 1px solid rgba(56,139,253,0.3);
    color: var(--blue); user-select: none; transition: background 0.15s; }
  .oc-curr-badge:hover { background: rgba(56,139,253,0.25); }
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<div class="header">
  <span class="logo">&#x1F99E;</span>
  <div class="dot" id="api-dot"></div>
  <h1>OpenClaw Trading Console</h1>
  <span class="tag tag-blue">Paper Trading</span>
  <span class="tag tag-green" id="mode-tag">shadow_only</span>
  <span class="spacer"></span>
  <span id="clock" style="font-size:11px;color:var(--text-dim)"></span>
  <span class="oc-curr-badge" onclick="ocToggleCurrency()" title="Click to cycle USDT → USD → EUR / 点击切换计价货币">USDT</span>
  <span style="font-size:11px;color:var(--text-dim);margin:0 4px" id="user-label"></span>
  <button class="header-btn" onclick="ocLogout()">Logout</button>
</div>

<!-- ═══ Layout ═══ -->
<div class="layout">

  <!-- ─── Sidebar ─── -->
  <div class="sidebar">

    <h2>Paper PnL / 模拟盈亏</h2>
    <div class="mc">
      <div class="mc-label">Net PnL</div>
      <div class="mc-val" id="s-pnl">--</div>
      <div class="mc-sub" id="s-pnl-detail"></div>
    </div>

    <h2>Session / 会话</h2>
    <div class="mc">
      <div class="mc-label">State</div>
      <div class="mc-val" id="s-session" style="font-size:14px">--</div>
      <div class="mc-sub" id="s-session-detail"></div>
    </div>

    <h2>AI Cost / AI 成本</h2>
    <div class="mc">
      <div class="mc-label">Today</div>
      <div class="mc-val blue" id="s-cost" style="font-size:14px">$--</div>
      <div class="mc-sub" id="s-cost-detail"></div>
    </div>

    <h2>System / 系统</h2>
    <div class="mc">
      <div class="mc-label">Control API</div>
      <div class="mc-val" id="s-api" style="font-size:14px">--</div>
    </div>
    <div class="mc">
      <div class="mc-label">OpenClaw Gateway</div>
      <div class="mc-val" id="s-oc" style="font-size:14px">--</div>
    </div>

    <h2>Currency / 计价货币</h2>
    <div class="mc" style="display:flex;align-items:center;gap:6px">
      <span style="font-size:11px;color:var(--text-dim)">Display</span>
      <span class="oc-curr-badge" onclick="ocToggleCurrency()" title="Click to cycle USDT → USD → EUR / 点击切换计价货币">USDT</span>
      <span style="font-size:10px;color:var(--text-dim)">click to cycle</span>
    </div>

    <h2>Navigation / 导航</h2>
    <div class="nav-grid" id="nav-grid"></div>
    <div class="mc-sub" style="margin-top:6px;text-align:center">
      Auto-refresh 15s | <span id="s-token-status">--</span>
    </div>
  </div>

  <!-- ─── Main Content ─── -->
  <div style="display:flex;flex-direction:column;overflow:hidden">

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar"></div>

    <!-- Frame Container -->
    <div class="frame-wrap" id="frame-wrap"></div>
  </div>
</div>

<script>
// ─── Auth ─────────────────────────────────────────────────────
const TOKEN_KEY = 'oc_trading_token';
const USER_KEY = 'oc_username';
(function() {
  if (!localStorage.getItem(TOKEN_KEY)) {
    sessionStorage.setItem('oc_login_redirect', '/console');
    window.location.href = '/login';
  }
})();

function ocLogout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
  window.location.href = '/login';
}

function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

// Cache-bust timestamp — ensures iframe tabs reload on each console.html refresh
const BUILD_TS = Date.now();

// ─── Tab Definitions ──────────────────────────────────────────
const TABS = [
  // ── 儀表板 ──────────────────────────────────────────────────────
  { id: 'system',     label: '系统总览',  labelEn: 'Overview',  icon: '&#x1F4CA;', src: '/static/tab-system.html' },
  // ── 交易核心 ─────────────────────────────────────────────────────
  { id: 'live',       label: '实盘交易',  labelEn: 'Live 🔒',   icon: '&#x1F512;', src: '/static/tab-live.html' },
  { id: 'trading',    label: '测试交易',  labelEn: 'Test',      icon: '&#x1F9EA;', src: '/static/tab-trading.html' },
  // ── 市場與策略 ───────────────────────────────────────────────────
  { id: 'charts',     label: 'K线图表',   labelEn: 'Charts',    icon: '&#x1F4C8;', src: '/trading' },
  { id: 'strategy',   label: '策略中心',  labelEn: 'Strategy',  icon: '&#x2699;',  src: '/static/tab-strategy.html' },
  // ── 風控與智能 ───────────────────────────────────────────────────
  { id: 'risk',       label: '风控止损',  labelEn: 'Risk',      icon: '&#x1F6E1;', src: '/static/tab-risk.html' },
  { id: 'ai',         label: 'AI 引擎',   labelEn: 'AI',        icon: '&#x1F916;', src: '/static/tab-ai.html' },
  { id: 'learning',   label: '学习系统',  labelEn: 'Learning',  icon: '&#x1F4D6;', src: '/static/tab-learning.html' },
  // ── 治理與運維 ───────────────────────────────────────────────────
  { id: 'governance', label: '治理控制',  labelEn: 'Governance',icon: '&#x2696;',  src: '/static/tab-governance.html' },
  { id: 'monitoring', label: '监控',      labelEn: 'Monitor',   icon: '&#x1F50D;', src: '/static/tab-monitoring.html' },
  { id: 'settings',   label: '设置',      labelEn: 'Settings',  icon: '&#x2699;',  src: '/static/tab-settings.html' },
];

let currentTab = 'system';

// ─── Build Tab Bar ────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tab-bar');
  const wrap = document.getElementById('frame-wrap');
  const navGrid = document.getElementById('nav-grid');

  TABS.forEach((t, i) => {
    // Tab button
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.dataset.tab = t.id;
    tab.innerHTML = '<span class="tab-icon">' + t.icon + '</span>' + t.label;
    tab.onclick = () => switchTo(t.id);
    bar.appendChild(tab);

    // iframe (lazy loaded) — append build timestamp to bust browser cache on reload
    const frame = document.createElement('iframe');
    frame.id = 'f-' + t.id;
    frame.style.display = i === 0 ? 'block' : 'none';
    frame.dataset.src = t.src + '?v=' + BUILD_TS;
    if (i === 0) frame.src = t.src + '?v=' + BUILD_TS; // Load first tab immediately
    wrap.appendChild(frame);

    // Sidebar nav button
    const navBtn = document.createElement('div');
    navBtn.className = 'nav-btn' + (i === 0 ? ' nav-active' : '');
    navBtn.dataset.tab = t.id;
    navBtn.textContent = t.labelEn;
    navBtn.onclick = () => switchTo(t.id);
    navGrid.appendChild(navBtn);
  });
}

function switchTo(tabId) {
  currentTab = tabId;
  // Update tab bar
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tabId));
  // Update nav buttons
  document.querySelectorAll('.nav-btn').forEach(b =>
    b.classList.toggle('nav-active', b.dataset.tab === tabId));
  // Show/hide iframes (lazy load on first switch)
  TABS.forEach(t => {
    const frame = document.getElementById('f-' + t.id);
    if (t.id === tabId) {
      frame.style.display = 'block';
      if (!frame.src || frame.src === 'about:blank') {
        frame.src = frame.dataset.src;
      }
    } else {
      frame.style.display = 'none';
    }
  });
}

buildTabs();

// ─── Clock ────────────────────────────────────────────────────
setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour12:false});
}, 1000);

// ─── User Label ───────────────────────────────────────────────
const user = localStorage.getItem(USER_KEY);
if (user) document.getElementById('user-label').textContent = user;
document.getElementById('s-token-status').textContent = getToken() ? 'authenticated' : 'none';

// ─── Sidebar API helper ──────────────────────────────────────
async function api(path) {
  const t = getToken();
  if (!t) return null;
  try {
    const r = await fetch(path, { headers: { 'Authorization': 'Bearer ' + t } });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

const OC = window.location.origin + '/openclaw';

// ─── Sidebar Refresh ─────────────────────────────────────────
async function refreshSidebar() {
  // Paper Trading PnL + Session
  try {
    const d = await api('/api/v1/paper/session/status');
    if (d && d.data) {
      const s = d.data.session;
      const state = s.session_state;
      const el = document.getElementById('s-session');
      el.textContent = state;
      el.className = 'mc-val ' + (state==='active'?'green': state==='paused'?'yellow':'');
      document.getElementById('s-session-detail').textContent =
        'Orders: ' + (d.data.order_count||0) + ' | Pos: ' + (d.data.position_count||0);

      const pnl = d.data.pnl;
      const net = pnl.net_paper_pnl || 0;
      const pnlEl = document.getElementById('s-pnl');
      pnlEl.textContent = ocMoney(net);
      pnlEl.className = 'mc-val ' + (net>=0?'green':'red');
      document.getElementById('s-pnl-detail').textContent =
        'Realized: ' + (pnl.realized_pnl||0).toFixed(2) + ' | Fees: ' + (pnl.total_fees_paid||0).toFixed(4);

      document.getElementById('s-api').textContent = 'Online';
      document.getElementById('s-api').className = 'mc-val green';
      document.getElementById('api-dot').className = 'dot dot-ok';
    }
  } catch(e) {
    document.getElementById('s-api').textContent = 'Offline';
    document.getElementById('s-api').className = 'mc-val red';
    document.getElementById('api-dot').className = 'dot dot-err';
  }

  // AI Cost
  try {
    const d = await api('/api/v1/paper/ai-cost');
    if (d && d.data && d.data.available) {
      document.getElementById('s-cost').textContent = ocBalance(d.data.today_cost, 4);
      document.getElementById('s-cost-detail').textContent =
        d.data.today_tokens.toLocaleString() + ' tokens | 30d: ' + ocBalance(d.data.total_cost_30d, 2);
    }
  } catch(e) {}

  // OpenClaw
  try {
    const r = await fetch(OC + '/health', {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    });
    const h = await r.json();
    document.getElementById('s-oc').textContent = h.ok ? 'Online' : 'Down';
    document.getElementById('s-oc').className = 'mc-val ' + (h.ok ? 'green' : 'red');
  } catch(e) {
    document.getElementById('s-oc').textContent = 'Offline';
    document.getElementById('s-oc').className = 'mc-val red';
  }
}

refreshSidebar();
setInterval(refreshSidebar, 15000);
ocInitFx();
window.addEventListener('occurrencychange', refreshSidebar);
</script>
</body>
</html>
