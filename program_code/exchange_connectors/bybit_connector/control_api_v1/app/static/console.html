<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenClaw Trading Console</title>
<script src="/static/common.js"></script>
<link rel="stylesheet" href="/static/styles.css" />
<style>
  /* :root variables are in styles.css (canonical location) */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Roboto, sans-serif;
    overflow: hidden; }

  /* ── Header ─────────────────────────────────────────────────── */
  .header { display: flex; align-items: center; gap: 10px; padding: 8px 16px;
    background: var(--card-bg); border-bottom: 1px solid var(--border); height: 42px; }
  .header .logo { font-size: 18px; margin-right: 2px; }
  .header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .header .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
  .tag-blue { background: rgba(56,139,253,0.15); color: var(--blue); }
  .tag-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: var(--green); }
  .dot-err { background: var(--red); }
  .dot-off { background: var(--text-dim); }
  .spacer { flex: 1; }
  .header-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-size: 11px; padding: 3px 10px; cursor: pointer; }
  .header-btn:hover { border-color: var(--accent); color: var(--text); }

  /* ── Layout ─────────────────────────────────────────────────── */
  .layout { display: grid; grid-template-columns: 220px 1fr; height: calc(100vh - 42px); }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }

  /* ── Sidebar ────────────────────────────────────────────────── */
  .sidebar { background: var(--card-bg); border-right: 1px solid var(--border);
    padding: 10px; overflow-y: auto; }
  .sidebar h2 { font-size: 10px; text-transform: uppercase; color: var(--text-dim);
    margin: 12px 0 5px; letter-spacing: 0.5px; }
  .sidebar h2:first-child { margin-top: 0; }

  .mc { background: var(--bg); border: 1px solid #21262d; border-radius: 8px;
    padding: 7px 10px; margin-bottom: 5px; }
  .mc-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
  .mc-val { font-size: 17px; font-weight: 700; margin-top: 1px; }
  .mc-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .green { color: var(--green); } .red { color: var(--red); }
  .yellow { color: var(--yellow); } .blue { color: var(--blue); }

  /* ── Switchable Side Panel ─────────────────────────────────── */
  .side-panel { cursor: pointer; border-radius: 8px; padding: 4px; transition: background 0.15s; }
  .side-panel:hover { background: rgba(56,139,253,0.04); }
  .panel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); display: inline-block; cursor: pointer; }
  .panel-dot-active { background: var(--accent); }

  /* ── Tab Bar ────────────────────────────────────────────────── */
  .tab-bar { display: flex; background: var(--card-bg); border-bottom: 1px solid var(--border);
    overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab { padding: 7px 14px; font-size: 12px; cursor: pointer; color: var(--text-dim);
    border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none;
    white-space: nowrap; flex-shrink: 0; }
  .tab:hover { color: var(--text); background: rgba(56,139,253,0.04); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .tab-icon { margin-right: 4px; font-size: 12px; }

  /* ── Frame Container ────────────────────────────────────────── */
  .frame-wrap { flex: 1; position: relative; overflow: hidden; }
  .frame-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border: none; background: var(--bg); }
  .frame-wrap .placeholder { display: none; position: absolute; inset: 0; overflow-y: auto; }

  /* Currency Toggle Badge */
  .oc-curr-badge { display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer;
    background: rgba(56,139,253,0.12); border: 1px solid rgba(56,139,253,0.3);
    color: var(--blue); user-select: none; transition: background 0.15s; }
  .oc-curr-badge:hover { background: rgba(56,139,253,0.25); }
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<div class="header">
  <span class="logo">&#x1F99E;</span>
  <div class="dot" id="api-dot"></div>
  <h1>OpenClaw Trading Console</h1>
  <span class="tag tag-blue">Paper Trading</span>
  <span class="tag tag-green" id="mode-tag">shadow_only</span>
  <span class="spacer"></span>
  <span id="clock" style="font-size:11px;color:var(--text-dim)"></span>
  <span class="oc-curr-badge" onclick="ocToggleCurrency()" title="Click to cycle USDT → USD → EUR / 点击切换计价货币">USDT</span>
  <span style="font-size:11px;color:var(--text-dim);margin:0 4px" id="user-label"></span>
  <button class="header-btn" onclick="ocLogout()">Logout</button>
</div>

<!-- ═══ Layout ═══ -->
<div class="layout">

  <!-- ─── Sidebar ─── -->
  <div class="sidebar">

    <!-- Live / Paper panel switcher buttons / 实盘/模拟面板切换按钮 -->
    <div style="display:flex;gap:4px;margin-bottom:8px">
      <button id="spbtn-live" onclick="toggleSidePanel('live')"
        style="flex:1;padding:4px 0;font-size:11px;font-weight:600;border-radius:6px;border:1px solid rgba(239,68,68,0.5);background:rgba(239,68,68,0.15);color:#ef4444;cursor:pointer">
        🔴 Live
      </button>
      <button id="spbtn-paper" onclick="toggleSidePanel('paper')"
        style="flex:1;padding:4px 0;font-size:11px;font-weight:600;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer">
        🧪 Paper
      </button>
    </div>

    <!-- Switchable Live / Paper panel -->
    <div id="side-panel-live" class="side-panel active">
      <h2 style="margin:0 0 5px">&#x1F534; Live / 实盘</h2>
      <div class="mc" id="live-section" style="opacity:0.5">
        <div class="mc-label">System Mode</div>
        <div class="mc-val" id="s-live-mode" style="font-size:13px">--</div>
        <div class="mc-sub" id="s-live-mode-detail"></div>
      </div>
      <div class="mc" id="live-balance-section" style="opacity:0.5">
        <div class="mc-label">Balance</div>
        <div class="mc-val" id="s-live-balance" style="font-size:14px">--</div>
        <div class="mc-sub" id="s-live-balance-detail"></div>
      </div>
      <div class="mc" id="live-pnl-section" style="opacity:0.5">
        <div class="mc-label"><abbr title="Net Unrealized Profit & Loss / 未实现净损益">Net PnL</abbr></div>
        <div class="mc-val" id="s-live-pnl">--</div>
        <div class="mc-sub" id="s-live-pnl-detail"></div>
      </div>
    </div>

    <div id="side-panel-paper" class="side-panel" style="display:none">
      <h2 style="margin:0 0 5px">&#x1F4B0; Paper / 模拟</h2>
      <div class="mc">
        <div class="mc-label">Balance</div>
        <div class="mc-val" id="s-paper-balance" style="font-size:14px">--</div>
        <div class="mc-sub" id="s-paper-balance-detail"></div>
      </div>
      <div class="mc">
        <div class="mc-label">Net PnL</div>
        <div class="mc-val" id="s-pnl">--</div>
        <div class="mc-sub" id="s-pnl-detail"></div>
      </div>
    </div>


    <h2>AI Cost / AI 成本</h2>
    <div class="mc">
      <div class="mc-label">Today</div>
      <div class="mc-val blue" id="s-cost" style="font-size:14px">$--</div>
      <div class="mc-sub" id="s-cost-detail"></div>
    </div>

    <h2>System / 系统</h2>
    <div class="mc">
      <div class="mc-label">Control API</div>
      <div class="mc-val" id="s-api" style="font-size:14px">--</div>
    </div>
    <div class="mc">
      <div class="mc-label">OpenClaw Gateway</div>
      <div class="mc-val" id="s-oc" style="font-size:14px">--</div>
    </div>

    <div class="mc-sub" style="margin-top:6px;text-align:center">
      Auto-refresh 15s | <span id="s-token-status">--</span>
    </div>
  </div>

  <!-- ─── Main Content ─── -->
  <div style="display:flex;flex-direction:column;overflow:hidden">

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar"></div>

    <!-- Frame Container -->
    <div class="frame-wrap" id="frame-wrap"></div>
  </div>
</div>

<script>
// ─── Auth (APR01-MEDIUM-13: HttpOnly cookie, no localStorage token) ─────────
const USER_KEY = 'oc_username';
// Clean up legacy localStorage token if present / 清理旧的 localStorage token
localStorage.removeItem('oc_trading_token');

(function() {
  // Synchronous auth check via cookie / 通过 cookie 同步验证认证
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/v1/auth/check', false);
    xhr.send();
    if (xhr.status !== 200) {
      sessionStorage.setItem('oc_login_redirect', '/console');
      window.location.href = '/login';
    }
  } catch(e) {
    sessionStorage.setItem('oc_login_redirect', '/console');
    window.location.href = '/login';
  }
})();

// ocLogout is defined in common.js (calls /api/v1/auth/logout + clears cookie)
// ocLogout 已在 common.js 中定义（调用登出端点 + 清除 cookie）

// getToken() removed — auth handled by HttpOnly cookie (common.js ocGetToken() if needed)
// getToken() 已移除 — 认证由 HttpOnly cookie 处理（如需可用 common.js 的 ocGetToken()）

// Cache-bust version — increment on each deploy to force iframe reload
// 緩存破壞版本號 — 每次部署遞增以強制 iframe 重新載入
const BUILD_TS = '20260410.live-ui-v2';

// ─── Tab Definitions ──────────────────────────────────────────
// src uses BUILD_TS for cache-busting — update BUILD_TS on each deploy
// src 使用 BUILD_TS 破壞緩存 — 每次部署更新 BUILD_TS
const _v = BUILD_TS;
const TABS = [
  // ── 儀表板 ──────────────────────────────────────────────────────
  { id: 'system',     label: '系统总览',  labelEn: 'Overview',  icon: '&#x1F4CA;', src: `/static/tab-system.html?v=${_v}` },
  // ── 交易核心 ─────────────────────────────────────────────────────
  { id: 'live',       label: '实盘交易',  labelEn: 'Live',      icon: '&#x1F534;', src: `/static/tab-live.html?v=${_v}` },
  // FIX-43: split into direct Demo + Paper tabs (eliminate double-iframe nesting)
  // FIX-43：拆為直接 Demo + Paper 標籤（消除雙層 iframe 嵌套）
  { id: 'demo',       label: 'Demo引擎',  labelEn: 'Demo',      icon: '&#x1F3E6;', src: `/static/tab-demo.html?v=${_v}` },
  { id: 'paper',      label: '模拟引擎',  labelEn: 'Paper',     icon: '&#x1F9EA;', src: `/static/tab-paper.html?v=${_v}` },
  // ── 市場與策略 ───────────────────────────────────────────────────
  { id: 'charts',     label: 'K线图表',   labelEn: 'Charts',    icon: '&#x1F4C8;', src: '/trading?embed=1' },
  { id: 'strategy',   label: '策略中心',  labelEn: 'Strategy',  icon: '&#x2699;',  src: `/static/tab-strategy.html?v=${_v}` },
  // ── 風控與智能 ───────────────────────────────────────────────────
  { id: 'risk',       label: '风控止损',  labelEn: 'Risk',      icon: '&#x1F6E1;', src: `/static/tab-risk.html?v=${_v}` },
  { id: 'ai',         label: 'AI 引擎',   labelEn: 'AI',        icon: '&#x1F916;', src: `/static/tab-ai.html?v=${_v}` },
  { id: 'learning',   label: '学习系统',  labelEn: 'Learning',  icon: '&#x1F4D6;', src: `/static/tab-learning.html?v=${_v}` },
  // ── 治理與運維 ───────────────────────────────────────────────────
  { id: 'governance', label: '治理控制',  labelEn: 'Governance',icon: '&#x2696;',  src: `/static/tab-governance.html?v=${_v}` },
  { id: 'monitoring', label: '监控',      labelEn: 'Monitor',   icon: '&#x1F50D;', src: `/static/tab-monitoring.html?v=${_v}` },
  { id: 'settings',   label: '设置',      labelEn: 'Settings',  icon: '&#x2699;',  src: `/static/tab-settings.html?v=${_v}` },
];

let currentTab = 'system';

// ─── Build Tab Bar ────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tab-bar');
  const wrap = document.getElementById('frame-wrap');

  TABS.forEach((t, i) => {
    // Tab button
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.dataset.tab = t.id;
    tab.innerHTML = '<span class="tab-icon">' + t.icon + '</span>' + t.label;
    tab.onclick = () => switchTo(t.id);
    bar.appendChild(tab);

    // iframe (lazy loaded) — append build timestamp to bust browser cache on reload
    const frame = document.createElement('iframe');
    frame.id = 'f-' + t.id;
    frame.style.display = i === 0 ? 'block' : 'none';
    // Use & if src already has query params (e.g. ?embed=1), otherwise use ?
    // 若 src 已有查询参数则用 &，否则用 ?
    const sep = t.src.includes('?') ? '&' : '?';
    frame.dataset.src = t.src + sep + 'v=' + BUILD_TS;
    if (i === 0) frame.src = t.src + sep + 'v=' + BUILD_TS; // Load first tab immediately
    wrap.appendChild(frame);
  });
}

function switchTo(tabId) {
  currentTab = tabId;
  // Update tab bar
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tabId));
  // Show/hide iframes (lazy load on first switch)
  TABS.forEach(t => {
    const frame = document.getElementById('f-' + t.id);
    if (t.id === tabId) {
      frame.style.display = 'block';
      if (!frame.src || frame.src === 'about:blank') {
        frame.src = frame.dataset.src;
      }
    } else {
      frame.style.display = 'none';
    }
  });
}

buildTabs();

// ─── Clock ────────────────────────────────────────────────────
setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour12:false});
}, 1000);

// ─── User Label ───────────────────────────────────────────────
const user = localStorage.getItem(USER_KEY);
if (user) document.getElementById('user-label').textContent = user;
// Auth status is determined by HttpOnly cookie, not a JS-accessible token.
// 认证状态由 HttpOnly cookie 决定，非 JS 可访问的 token。
document.getElementById('s-token-status').textContent = 'cookie-auth';

// ─── Side Panel Toggle (Live ↔ Paper) ────────────────────────
// Shows the clicked panel directly (not toggle to opposite)
// 直接顯示被點擊的面板（不是切換到對面）
let _sidePanel = 'live';
function toggleSidePanel(clicked) {
  _sidePanel = clicked;
  document.getElementById('side-panel-live').style.display = _sidePanel === 'live' ? '' : 'none';
  document.getElementById('side-panel-paper').style.display = _sidePanel === 'paper' ? '' : 'none';
  // Update button active state / 更新按鈕激活狀態
  const liveActive = _sidePanel === 'live';
  const btnLive = document.getElementById('spbtn-live');
  const btnPaper = document.getElementById('spbtn-paper');
  if (btnLive) {
    btnLive.style.background = liveActive ? 'rgba(239,68,68,0.15)' : 'transparent';
    btnLive.style.borderColor = liveActive ? 'rgba(239,68,68,0.5)' : 'var(--border)';
    btnLive.style.color = liveActive ? '#ef4444' : 'var(--text-dim)';
  }
  if (btnPaper) {
    btnPaper.style.background = liveActive ? 'transparent' : 'rgba(56,139,253,0.12)';
    btnPaper.style.borderColor = liveActive ? 'var(--border)' : 'rgba(56,139,253,0.3)';
    btnPaper.style.color = liveActive ? 'var(--text-dim)' : 'var(--blue)';
  }
}

// ─── Sidebar API helper (APR01-MEDIUM-13: cookie-based auth) ─
async function api(path) {
  // HttpOnly cookie sent automatically / HttpOnly cookie 自动发送
  // 5s timeout prevents sidebar from blocking when API is slow after restart
  // 5 秒超时防止重启后 API 慢导致侧边栏卡死
  try {
    const r = await fetch(path, { credentials: 'same-origin', signal: AbortSignal.timeout(5000) });
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

const OC = window.location.origin + '/openclaw';

// ─── Sidebar Refresh ─────────────────────────────────────────
async function refreshSidebar() {
  // ── Live Section — always shown, reads real Bybit account via /api/v1/live/balance
  // 實盤板塊 — 始終顯示，從 /api/v1/live/balance 讀取真實帳戶
  document.getElementById('live-section').style.opacity = '1';
  document.getElementById('live-balance-section').style.opacity = '1';
  document.getElementById('live-pnl-section').style.opacity = '1';

  // Show system_mode + active engines from live session status
  // 從 live session status 顯示 system_mode + 活躍引擎列表
  try {
    const ls = await api('/api/v1/live/session/status');
    const modeEl = document.getElementById('s-live-mode');
    if (ls && ls.data) {
      const d = ls.data;
      const systemMode = d.system_mode || 'unknown';
      const execAuth = d.execution_authority || 'not_granted';
      const sessionState = (d.session && d.session.session_state) || 'offline';
      const isLiveActive = sessionState === 'active' && execAuth === 'granted';
      // Display system_mode with readable formatting / 以可讀格式顯示 system_mode
      const modeLabel = systemMode.replace(/_/g, ' ');
      const modeColor = {
        live_reserved: '#a855f7',
        demo_reserved: '#3b82f6',
        shadow_only:   '#f59e0b',
        observe_only:  '#6b7280',
        design_only:   '#6b7280',
      }[systemMode] || '';
      modeEl.textContent = modeLabel;
      modeEl.className = 'mc-val';
      modeEl.style.color = modeColor;
      // Show auth detail when session is active / 僅在 session active 時顯示 auth
      document.getElementById('s-live-mode-detail').textContent =
        isLiveActive ? 'auth: ' + execAuth : '';
    } else {
      modeEl.textContent = '--';
      document.getElementById('s-live-mode-detail').textContent = '';
    }
  } catch(e) {
    document.getElementById('s-live-mode').textContent = '--';
    document.getElementById('s-live-mode-detail').textContent = '';
  }

  // Live balance from /api/v1/live/balance (PyO3 BybitClient — real exchange data)
  // 實盤餘額來自 /api/v1/live/balance（PyO3 BybitClient — 真實交易所數據）
  try {
    const bd = await api('/api/v1/live/balance');
    if (bd && bd.data && bd.data.available !== false) {
      const b = bd.data;
      const equity = parseFloat(b.total_equity || b.totalEquity || b.equity || 0);
      const available = parseFloat(b.total_available_balance || b.totalAvailableBalance || b.available_balance || 0);
      const unrealized = parseFloat(b.total_unrealised_pnl || b.totalPerpUPL || b.unrealized_pnl || 0);

      document.getElementById('s-live-balance').textContent = equity > 0 ? ocBalance(equity, 2) : '--';
      document.getElementById('s-live-balance-detail').textContent =
        available > 0 ? 'Available: ' + ocBalance(available, 2) : (b.source || 'connecting...');

      const pnlEl = document.getElementById('s-live-pnl');
      pnlEl.textContent = unrealized !== 0 ? ocMoney(unrealized) : '--';
      pnlEl.className = 'mc-val' + (unrealized > 0 ? ' green' : unrealized < 0 ? ' red' : '');
      document.getElementById('s-live-pnl-detail').textContent =
        unrealized !== 0 ? 'UPL (Unrealized PnL): ' + unrealized.toFixed(2) : 'UPL: --';
    } else {
      document.getElementById('s-live-balance').textContent = '--';
      document.getElementById('s-live-balance-detail').textContent = 'connecting...';
    }
  } catch(e) {
    document.getElementById('s-live-balance').textContent = '--';
    document.getElementById('s-live-balance-detail').textContent = 'error';
  }

  // ── Paper Trading Balance + PnL ──
  try {
    const d = await api('/api/v1/paper/session/status');
    if (d && d.data) {
      const s = d.data.session;
      const initBal = s.initial_paper_balance_usdt || 0;
      const pnl = d.data.pnl;
      const net = pnl.net_paper_pnl || 0;
      const currentBal = initBal + net;

      document.getElementById('s-paper-balance').textContent = ocBalance(currentBal, 2);
      const state = s.session_state;
      const stateLabel = {active:'运行中',paused:'已暂停',stopped:'已停止',idle:'未启动'}[state] || state;
      document.getElementById('s-paper-balance-detail').textContent =
        stateLabel + ' | Pos: ' + (d.data.position_count||0);

      const pnlEl = document.getElementById('s-pnl');
      pnlEl.textContent = ocMoney(net);
      pnlEl.className = 'mc-val ' + (net>=0?'green':'red');
      document.getElementById('s-pnl-detail').textContent =
        'Realized: ' + (pnl.realized_pnl||0).toFixed(2) + ' | Fees: ' + (pnl.total_fees_paid||0).toFixed(4);

      document.getElementById('s-api').textContent = 'Online';
      document.getElementById('s-api').className = 'mc-val green';
      document.getElementById('api-dot').className = 'dot dot-ok';
    }
  } catch(e) {
    document.getElementById('s-api').textContent = 'Offline';
    document.getElementById('s-api').className = 'mc-val red';
    document.getElementById('api-dot').className = 'dot dot-err';
  }

  // AI Cost
  try {
    const d = await api('/api/v1/paper/ai-cost');
    if (d && d.data && d.data.available) {
      document.getElementById('s-cost').textContent = ocBalance(d.data.today_cost, 4);
      document.getElementById('s-cost-detail').textContent =
        d.data.today_tokens.toLocaleString() + ' tokens | 30d: ' + ocBalance(d.data.total_cost_30d, 2);
    }
  } catch(e) {}

  // OpenClaw
  try {
    const r = await fetch(OC + '/health', {
      credentials: 'same-origin'  // HttpOnly cookie sent automatically / 自动发送 HttpOnly cookie
    });
    const h = await r.json();
    document.getElementById('s-oc').textContent = h.ok ? 'Online' : 'Down';
    document.getElementById('s-oc').className = 'mc-val ' + (h.ok ? 'green' : 'red');
  } catch(e) {
    document.getElementById('s-oc').textContent = 'Offline';
    document.getElementById('s-oc').className = 'mc-val red';
  }
}

// Wait for server to be up before first sidebar refresh (replaces fixed 2s blind wait).
// 等待服務器就緒後才做第一次 sidebar 刷新（取代盲等 2s，避免重啟後 GUI 卡住）。
// waitForServerUp() is defined in common.js; polls /api/v1/system/startup-status.
waitForServerUp(function() {
  refreshSidebar();
  setInterval(refreshSidebar, 15000);
});
ocInitFx();
window.addEventListener('occurrencychange', refreshSidebar);
</script>
</body>
</html>
