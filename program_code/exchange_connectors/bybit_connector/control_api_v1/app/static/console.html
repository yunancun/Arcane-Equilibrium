<!-- REF-20 Wave 2 P1-U9: Paper Replay Lab i18n (Chinese dominant, 9 對照表) -->
<!-- REF-20 Wave 2 P1-U9: Paper Replay Lab i18n (Chinese-dominant, 9 lookup tables) -->

<link rel="stylesheet" href="/static/styles.css" />
<style>
  /* :root variables are in styles.css (canonical location) */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', Roboto, sans-serif;
    overflow: hidden; }

  /* ── Header ─────────────────────────────────────────────────── */
  .header { display: flex; align-items: center; gap: 10px; padding: 8px 16px;
    background: var(--card-bg); border-bottom: 1px solid var(--border); height: 42px; }
  .header .logo {
    width: 22px; height: 22px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-right: 2px; font-size: 14px; font-weight: 700;
    color: #f0f6fc; background: linear-gradient(135deg, rgba(56,139,253,0.28), rgba(139,92,246,0.22));
    border: 1px solid rgba(139,148,158,0.28);
  }
  .header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .header .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
  .tag-blue { background: rgba(56,139,253,0.15); color: var(--blue); }
  .tag-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-ok { background: var(--green); }
  .dot-err { background: var(--red); }
  .dot-off { background: var(--text-dim); }
  .spacer { flex: 1; }
  .header-btn { background: transparent; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); font-size: 11px; padding: 3px 10px; cursor: pointer; }
  .header-btn:hover { border-color: var(--accent); color: var(--text); }

  /* ── Layout ─────────────────────────────────────────────────── */
  .layout { display: grid; grid-template-columns: 220px 1fr; height: calc(100vh - 42px); }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }

  /* ── Sidebar ────────────────────────────────────────────────── */
  .sidebar { background: var(--card-bg); border-right: 1px solid var(--border);
    padding: 10px; overflow-y: auto; }
  .sidebar h2 { font-size: 10px; text-transform: uppercase; color: var(--text-dim);
    margin: 12px 0 5px; letter-spacing: 0.5px; }
  .sidebar h2:first-child { margin-top: 0; }

  .mc { background: var(--bg); border: 1px solid #21262d; border-radius: 8px;
    padding: 7px 10px; margin-bottom: 5px; }
  .mc-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.3px; }
  .mc-val { font-size: 17px; font-weight: 700; margin-top: 1px; }
  .mc-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .green { color: var(--green); } .red { color: var(--red); }
  .yellow { color: var(--yellow); } .blue { color: var(--blue); }

  /* ── Switchable Side Panel ─────────────────────────────────── */
  .side-panel { cursor: pointer; border-radius: 8px; padding: 4px; transition: background 0.15s; }
  .side-panel:hover { background: rgba(56,139,253,0.04); }
  .panel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); display: inline-block; cursor: pointer; }
  .panel-dot-active { background: var(--accent); }

  /* ── Tab Bar ────────────────────────────────────────────────── */
  .tab-bar { display: flex; align-items: stretch; gap: 8px; background: var(--card-bg);
    border-bottom: 1px solid var(--border); padding: 6px 8px;
    overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-group { display:flex; align-items:center; gap:5px; flex-shrink:0;
    border:1px solid rgba(139,148,158,0.24); border-radius:9px; padding:3px;
    background:rgba(13,17,23,0.62); }
  .tab-group.collapsed { border-style:dashed; background:rgba(13,17,23,0.34); }
  .tab-group-label { display:inline-flex; align-items:center; gap:5px; min-height:30px;
    font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.1px;
    padding:0 9px; border:1px solid rgba(139,148,158,0.16); border-radius:7px; background:rgba(139,148,158,0.06);
    font-family:inherit; cursor:pointer; white-space:nowrap; user-select:none; }
  .tab-group-label:hover { color:var(--text); background:rgba(56,139,253,0.08); border-color:rgba(56,139,253,0.28); }
  .tab-group.has-active .tab-group-label { color:var(--accent); border-color:rgba(56,139,253,0.25); background:rgba(56,139,253,0.06); }
  .tab-group-caret { display:inline-flex; align-items:center; justify-content:center;
    width:15px; height:15px; border-radius:4px; background:rgba(139,148,158,0.12);
    font-size:9px; line-height:1; transition:transform 0.12s ease; }
  .tab-group-state { font-size:9px; color:var(--text-dim); font-weight:600; text-transform:none; }
  .tab-group-count { font-size:9px; color:var(--text-dim); background:rgba(139,148,158,0.10);
    border:1px solid rgba(139,148,158,0.14); border-radius:999px; padding:0 5px; }
  .tab-group-key { display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px;
    border-radius:4px; border:1px solid rgba(139,148,158,0.18); background:rgba(139,148,158,0.10);
    color:var(--text); font-size:9px; font-weight:800; }
  .tab-group-items { display:flex; align-items:center; gap:3px; padding-left:2px; border-left:1px solid rgba(139,148,158,0.16); }
  .tab-group.collapsed .tab-group-items { display:none; }
  .tab-group.collapsed .tab-group-caret { transform:rotate(-90deg); }
  .tab-group.collapsed .tab-group-label { background:rgba(139,148,158,0.035); }
  .tab { padding: 5px 9px; font-size: 11px; cursor: pointer; color: var(--text-dim);
    border:1px solid transparent; border-bottom: 2px solid transparent; border-radius:6px;
    display:inline-flex; align-items:center; gap:4px; transition: all 0.15s; user-select: none;
    white-space: nowrap; flex-shrink: 0; }
  .tab:hover { color: var(--text); background: rgba(56,139,253,0.04); }
  .tab.active { color: var(--accent); border-color:rgba(56,139,253,0.25); border-bottom-color: var(--accent); background:rgba(56,139,253,0.06); }
  .tab .tab-label { order:1; }
  .tab .tab-icon { order:2; margin-left: 4px; font-size: 12px; }
  @media (max-width: 900px) {
    .tab-group-label { padding:0 6px; }
    .tab-group-text { max-width:64px; overflow:hidden; text-overflow:ellipsis; }
    .tab { padding:5px 8px; }
  }

  /* ── Frame Container ────────────────────────────────────────── */
  .frame-wrap { flex: 1; position: relative; overflow: hidden; }
  .frame-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border: none; background: var(--bg); }
  .frame-wrap .placeholder { display: none; position: absolute; inset: 0; overflow-y: auto; }

  /* Currency Toggle Badge */
  .oc-curr-badge { display: inline-block; padding: 2px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer;
    background: rgba(56,139,253,0.12); border: 1px solid rgba(56,139,253,0.3);
    color: var(--blue); user-select: none; transition: background 0.15s; }
  .oc-curr-badge:hover { background: rgba(56,139,253,0.25); }

  /* ── F5/A3 — Live Tab visual hardening ───────────────────────────
     Live Tab 永遠醒目（即使 engine 未啟動 / Live 槽未配置 / LiveDemo 模式）。
     紅+紫雙下劃線 + 「⚠ REAL FUNDS」徽章常駐，即使尚未進入 active live。
     避免 operator 點錯 tab 在不知情下下單。
     Make Live Tab visually distinct at all times — purple+red double underline
     + "⚠ REAL FUNDS" badge persists even when not active, to avoid operator
     accidentally placing trades while thinking they're on Demo. */
  .tab[data-tab="live"] {
    color: #f87171;
    font-weight: 700;
    border-bottom: 2px solid transparent;
    box-shadow: inset 0 -4px 0 0 rgba(168,85,247,0.6);
    padding-right: 4px;
  }
  .tab[data-tab="live"].active {
    color: #f87171;
    border-bottom-color: #f87171;
    box-shadow: inset 0 -4px 0 0 rgba(168,85,247,0.85);
  }
  .tab[data-tab="live"]::after {
    content: " ⚠ REAL FUNDS";
    font-size: 9px;
    font-weight: 700;
    color: rgba(239,68,68,0.85);
    margin-left: 6px;
    letter-spacing: 0.4px;
    background: rgba(239,68,68,0.12);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid rgba(239,68,68,0.3);
  }
  /* Demo / Paper tabs — clearly distinct (no danger color) / 演示/模擬 Tab 顏色明確區分 */
  .tab[data-tab="demo"] {
    color: var(--blue);
    box-shadow: inset 0 -4px 0 0 rgba(59,130,246,0.4);
  }
  .tab[data-tab="paper"] {
    color: #34d399;
    box-shadow: inset 0 -4px 0 0 rgba(34,197,94,0.4);
  }
  .tab[data-tab="replay"] {
    color: #38bdf8;
    box-shadow: inset 0 -4px 0 0 rgba(14,165,233,0.42);
  }
</style>
</head>
<body>

<!-- ═══ Header ═══ -->
<div class="header">
  <span class="logo" aria-hidden="true">玄</span>
  <div class="dot" id="api-dot"></div>
  <h1>玄衡 Console</h1>
  <span class="tag tag-blue">Arcane Equilibrium</span>
  <span class="tag tag-yellow">OpenClaw 控制面</span>
  <span class="tag tag-green" id="mode-tag">shadow_only</span>
  <span class="spacer"></span>
  <span id="clock" style="font-size:11px;color:var(--text-dim)"></span>
  <span class="oc-curr-badge" onclick="ocToggleCurrency()" title="Click to cycle USDT → USD → EUR / 点击切换计价货币">USDT</span>

  <button class="header-btn" onclick="ocLogout()">Logout</button>
</div>

<!-- ═══ Layout ═══ -->
<div class="layout">

  <!-- ─── Sidebar ─── -->
  <div class="sidebar">

    <!-- Live / Demo panel switcher buttons / 实盘/Demo 面板切换按钮 -->
    <div style="display:flex;gap:4px;margin-bottom:8px">
      <button id="spbtn-live" onclick="toggleSidePanel('live')"
        style="flex:1;padding:4px 0;font-size:11px;font-weight:600;border-radius:6px;border:1px solid rgba(239,68,68,0.5);background:rgba(239,68,68,0.15);color:#ef4444;cursor:pointer">
        🔴 Live
      </button>
      <button id="spbtn-paper" onclick="toggleSidePanel('demo')"
        style="flex:1;padding:4px 0;font-size:11px;font-weight:600;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer">

      </button>

    <!-- Switchable Live / Demo panel -->
    <div id="side-panel-live" class="side-panel active">
      <h2 style="margin:0 0 5px">&#x1F534; Live / 实盘</h2>
      <div class="mc" id="live-section" style="opacity:0.5">
        <div class="mc-label">System Mode</div>
        <div class="mc-val" id="s-live-mode" style="font-size:13px">--</div>

      <div class="mc" id="live-balance-section" style="opacity:0.5">

      <div class="mc" id="live-pnl-section" style="opacity:0.5">
        <!-- Sidebar and Live tab both consume account_metrics_today.
             This is DB-local-day realized_pnl - fees + funding, not position

             側欄與 Live tab 統一讀 account_metrics_today：DB 當地日
             realized_pnl - 手續費 + funding；不讀持倉 cumRealisedPnl，也不混入
             session/lifetime total fees。 -->

    <h2>AI Cost / AI 成本</h2>
    <div class="mc">
      <div class="mc-label">Today</div>

      <div class="mc-sub" id="s-cost-detail"></div>
    </div>

    <h2>System / 系统</h2>
    <div class="mc">
      <div class="mc-label">Control API</div>
      <div class="mc-val" id="s-api" style="font-size:14px">--</div>
    </div>
    <div class="mc">
      <div class="mc-label">OpenClaw Gateway</div>

    <div class="mc-sub" style="margin-top:6px;text-align:center">
      Auto-refresh 15s | <span id="s-token-status">--</span>

  </div>

  <!-- ─── Main Content ─── -->
  <div style="display:flex;flex-direction:column;overflow:hidden">

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar"></div>

    <!-- Frame Container -->
    <div class="frame-wrap" id="frame-wrap"></div>

<script>
// ─── Auth (APR01-MEDIUM-13: HttpOnly cookie, no localStorage token) ─────────
const USER_KEY = 'oc_username';
// Clean up legacy localStorage token if present / 清理旧的 localStorage token
localStorage.removeItem('oc_trading_token');

(function() {
  // Synchronous auth check via cookie / 通过 cookie 同步验证认证
  try {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/v1/auth/check', false);
    xhr.send();
    if (xhr.status !== 200) {
      sessionStorage.setItem('oc_login_redirect', '/console');
      window.location.href = '/login';
    }
  } catch(e) {
    sessionStorage.setItem('oc_login_redirect', '/console');
    window.location.href = '/login';
  }
})();

// ocLogout is defined in common.js (calls /api/v1/auth/logout + clears cookie)
// ocLogout 已在 common.js 中定义（调用登出端点 + 清除 cookie）

// getToken() removed — auth handled by HttpOnly cookie (common.js ocGetToken() if needed)
// getToken() 已移除 — 认证由 HttpOnly cookie 处理（如需可用 common.js 的 ocGetToken()）

// Cache-bust version — increment on each deploy to force iframe reload
// 緩存破壞版本號 — 每次部署遞增以強制 iframe 重新載入
const BUILD_TS = '20260507.fill-tabs-v1';

// ─── Tab Definitions ──────────────────────────────────────────
// src uses BUILD_TS for cache-busting — update BUILD_TS on each deploy
// src 使用 BUILD_TS 破壞緩存 — 每次部署更新 BUILD_TS
const _v = BUILD_TS;
const TAB_GROUP_LABELS = {
  core: '核心',
  trading: '交易',
  edge: '策略/Edge',
  governance: '治理',
  intelligence: '智能',
  ops: '运维',
};
const TAB_GROUP_SHORTCUTS = {
  '1': 'core',
  '2': 'trading',
  '3': 'edge',
  '4': 'governance',
  '5': 'intelligence',
  '6': 'ops',
};
const TAB_GROUP_SHORTCUT_LABELS = {
  core: '1',
  trading: '2',
  edge: '3',
  governance: '4',
  intelligence: '5',
  ops: '6',
};
const TAB_GROUP_STATE_KEY = 'oc_console_tab_group_state_v1';
const TAB_GROUP_DEFAULT_OPEN = {
  core: true,
  trading: false,
  edge: false,
  governance: false,
  intelligence: false,
  ops: false,
};
const TABS = [
  { id: 'system',     group: 'core', label: '总览 Overview',    labelEn: 'Overview',  icon: '&#x1F4CA;', src: `/static/tab-system.html?v=${_v}` },
  { id: 'edge-gates', group: 'core', label: 'Pre-Live Gates',   labelEn: 'Edge Gates',icon: '&#x1F4C8;', src: `/static/tab-edge-gates.html?v=${_v}` },
  // ── 交易环境：低风险到高风险 / Trading environments: low-risk to high-risk ──
  // FIX-43: split into direct Demo + Paper tabs (eliminate double-iframe nesting)
  // FIX-43：拆為直接 Demo + Paper 標籤（消除雙層 iframe 嵌套）
  { id: 'paper',      group: 'trading', label: 'Legacy Paper',  labelEn: 'Paper',     icon: '&#x1F9EA;', src: `/static/tab-paper.html?v=${_v}`, requiresPaperEngine: true },
  { id: 'demo',       group: 'trading', label: '演示 Demo',     labelEn: 'Demo',      icon: '&#x1F3E6;', src: `/static/tab-demo.html?v=${_v}` },
  { id: 'live',       group: 'trading', label: '实盘 Live',     labelEn: 'Live',      icon: '&#x1F534;', src: `/static/tab-live.html?v=${_v}` },
  { id: 'replay',     group: 'edge', label: '回测 Replay',      labelEn: 'Replay',    icon: '&#x23F1;',  src: `/static/tab-replay.html?v=${_v}` },
  { id: 'strategy',   group: 'edge', label: '策略 Strategy',    labelEn: 'Strategy',  icon: '&#x2699;',  src: `/static/tab-strategy.html?v=${_v}` },
  { id: 'charts',     group: 'edge', label: '图表 Charts',      labelEn: 'Charts',    icon: '&#x1F4C8;', src: '/trading?embed=1' },
  { id: 'risk',       group: 'governance', label: '风控 Risk',        labelEn: 'Risk',      icon: '&#x1F6E1;', src: `/static/tab-risk.html?v=${_v}` },
  { id: 'governance', group: 'governance', label: '治理 Governance',  labelEn: 'Governance',icon: '&#x2696;',  src: `/static/tab-governance.html?v=${_v}` },
  { id: 'ai',         group: 'intelligence', label: 'AI 状态',          labelEn: 'AI Status', icon: '&#x1F9E0;', src: `/static/tab-ai.html?v=${_v}` },
  { id: 'learning',   group: 'intelligence', label: '学习 Learning',    labelEn: 'Learning',  icon: '&#x1F4D6;', src: `/static/tab-learning.html?v=${_v}` },
  // REF-20 Wave 7 P5 R20-P5-A1+A4: 12-Tab Agents Monitor 抽出（位置在 Learning 之後）
  // REF-20 Wave 7 P5 R20-P5-A1+A4: 12-Tab Agents Monitor extracted (position: after Learning)
  // 既有 agent-tracker.js 行為 0 mutation；mount target 從 tab-learning.html → tab-agents.html
  // icon=🤖 robot（對齊既有 emoji icon set）；read-only never-emit surface（V3 §11 P5）
  // agent-tracker.js logic 0 mutation; mount target swapped from tab-learning.html → tab-agents.html
  // icon=🤖 robot (consistent with existing emoji icon set); read-only never-emit surface (V3 §11 P5)
  { id: 'agents',     group: 'intelligence', label: 'Agent 团队',       labelEn: 'Agents',    icon: '&#x1F465;', src: `/static/tab-agents.html?v=${_v}` },
  { id: 'monitoring', group: 'ops', label: '监控 Monitor',     labelEn: 'Monitor',   icon: '&#x1F50D;', src: `/static/tab-monitoring.html?v=${_v}` },
  { id: 'development',group: 'ops', label: '开发状态 Support', labelEn: 'Support',   icon: '&#x1F6E0;', src: `/static/tab-development.html?v=${_v}`, requiresDevelopmentSupport: true },
  { id: 'settings',   group: 'ops', label: '设置 Settings',    labelEn: 'Settings',  icon: '&#x2699;',  src: `/static/tab-settings.html?v=${_v}` },
];

let currentTab = 'system';
let paperEngineGuiEnabled = false;
let developmentSupportEnabled = typeof ocReadCachedDevelopmentSupportMode === 'function'
  ? ocReadCachedDevelopmentSupportMode()
  : false;
let tabGroupExpanded = readTabGroupExpandedState();
const pendingFrameMessages = {};

function readTabGroupExpandedState() {
  try {
    const raw = localStorage.getItem(TAB_GROUP_STATE_KEY);
    const saved = raw ? JSON.parse(raw) : {};
    return Object.assign({}, TAB_GROUP_DEFAULT_OPEN, saved || {});
  } catch (_) {
    return Object.assign({}, TAB_GROUP_DEFAULT_OPEN);
  }
}

function persistTabGroupExpandedState() {
  try {
    localStorage.setItem(TAB_GROUP_STATE_KEY, JSON.stringify(tabGroupExpanded));
  } catch (_) {}
}

function getTabGroup(tabId) {
  const target = TABS.find(t => t.id === tabId);
  return target ? (target.group || 'core') : 'core';
}

function setTabGroupExpanded(groupId, expanded, persist) {
  tabGroupExpanded[groupId] = !!expanded;
  const group = document.querySelector('.tab-group[data-tab-group="' + groupId + '"]');
  if (group) {
    group.classList.toggle('collapsed', !expanded);
    const toggle = group.querySelector('.tab-group-label');
    if (toggle) toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    const state = group.querySelector('.tab-group-state');
    if (state) state.textContent = expanded ? '收起' : '展开';
  }
  if (persist !== false) persistTabGroupExpandedState();
}

function toggleTabGroup(groupId) {
  setTabGroupExpanded(groupId, !tabGroupExpanded[groupId]);
}

function isConsoleTypingTarget(target) {
  if (!target) return false;
  const tag = (target.tagName || '').toLowerCase();
  return tag === 'input' || tag === 'textarea' || tag === 'select' || target.isContentEditable;
}

function withBuildVersion(src) {
  if (src.includes('v=')) return src;
  const sep = src.includes('?') ? '&' : '?';
  return src + sep + 'v=' + BUILD_TS;
}

function handleTabGroupShortcut(ev) {
  if (ev.defaultPrevented || ev.ctrlKey || ev.metaKey || ev.altKey) return;
  if (isConsoleTypingTarget(ev.target)) return;
  const groupId = TAB_GROUP_SHORTCUTS[ev.key];
  if (!groupId) return;
  ev.preventDefault();
  toggleTabGroup(groupId);
}

function expandTabGroupForTab(tabId) {
  setTabGroupExpanded(getTabGroup(tabId), true);
}

function updateActiveTabGroup() {
  const activeGroup = getTabGroup(currentTab);
  document.querySelectorAll('.tab-group').forEach(group => {
    group.classList.toggle('has-active', group.dataset.tabGroup === activeGroup);
  });
}

// ─── Build Tab Bar ────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tab-bar');
  const wrap = document.getElementById('frame-wrap');
  const groups = {};

  function ensureGroup(groupId) {
    const id = groupId || 'core';
    if (groups[id]) return groups[id];
    const group = document.createElement('div');
    group.className = 'tab-group';
    group.dataset.tabGroup = id;
    const label = document.createElement('button');
    label.type = 'button';
    label.className = 'tab-group-label';
    label.title = '展开/折叠 ' + (TAB_GROUP_LABELS[id] || id) + ' · 快捷键 ' + (TAB_GROUP_SHORTCUT_LABELS[id] || '');
    label.setAttribute('aria-expanded', tabGroupExpanded[id] ? 'true' : 'false');
    const tabCount = TABS.filter(tab => (tab.group || 'core') === id).length;
    label.innerHTML =
      '<span class="tab-group-caret">&#x25BE;</span>' +
      '<span class="tab-group-text">' + (TAB_GROUP_LABELS[id] || id) + '</span>' +
      '<span class="tab-group-key">' + (TAB_GROUP_SHORTCUT_LABELS[id] || '') + '</span>' +
      '<span class="tab-group-state"></span>' +
      '<span class="tab-group-count">' + tabCount + '</span>';
    label.onclick = () => toggleTabGroup(id);
    const items = document.createElement('div');
    items.className = 'tab-group-items';
    group.appendChild(label);
    group.appendChild(items);
    bar.appendChild(group);
    groups[id] = { group, items };
    setTabGroupExpanded(id, tabGroupExpanded[id], false);
    return groups[id];
  }

  TABS.forEach((t, i) => {
    const group = ensureGroup(t.group);
    // Tab button
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.dataset.tab = t.id;
    if (t.requiresPaperEngine) {
      tab.dataset.requiresPaperEngine = 'true';
      tab.style.display = 'none';
    }
    if (t.requiresDevelopmentSupport) {
      tab.dataset.requiresDevelopmentSupport = 'true';
      tab.style.display = developmentSupportEnabled ? '' : 'none';
    }
    tab.innerHTML = '<span class="tab-label">' + t.label + '</span><span class="tab-icon">' + t.icon + '</span>';
    tab.onclick = () => switchTo(t.id);
    group.items.appendChild(tab);

    // iframe (lazy loaded) — append build timestamp to bust browser cache on reload
    const frame = document.createElement('iframe');
    frame.id = 'f-' + t.id;
    frame.style.display = i === 0 ? 'block' : 'none';
    frame.addEventListener('load', () => {
      frame.dataset.loaded = 'true';
      flushPendingFrameMessages(t.id);
    });
    if (t.requiresPaperEngine) frame.dataset.requiresPaperEngine = 'true';
    if (t.requiresDevelopmentSupport) frame.dataset.requiresDevelopmentSupport = 'true';
    const frameSrc = withBuildVersion(t.src);
    frame.dataset.src = frameSrc;
    if (i === 0) frame.src = frameSrc; // Load first tab immediately
    wrap.appendChild(frame);
  });
  updateTabGroupVisibility();
  updateActiveTabGroup();
}

function switchTo(tabId) {
  const target = TABS.find(t => t.id === tabId);
  if (target && target.requiresPaperEngine && !paperEngineGuiEnabled) {
    tabId = 'replay';
  }
  if (target && target.requiresDevelopmentSupport && !developmentSupportEnabled) {
    tabId = 'system';
  }
  currentTab = tabId;
  expandTabGroupForTab(tabId);
  // Update tab bar
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tabId));
  updateActiveTabGroup();
  // Show/hide iframes (lazy load on first switch)
  TABS.forEach(t => {
    const frame = document.getElementById('f-' + t.id);
    if (t.id === tabId) {
      frame.style.display = 'block';
      if (!frame.src || frame.src === 'about:blank') {
        frame.src = frame.dataset.src;
      }
    } else {
      frame.style.display = 'none';
    }
  });
}

buildTabs();
window.addEventListener('keydown', handleTabGroupShortcut);

function flushPendingFrameMessages(tabId) {
  const frame = document.getElementById('f-' + tabId);
  const queue = pendingFrameMessages[tabId] || [];
  if (!frame || !queue.length) return;
  pendingFrameMessages[tabId] = [];
  queue.forEach(message => {
    try {
      frame.contentWindow.postMessage(message, window.location.origin);
    } catch (_) {}
  });
}

function postToTabFrame(tabId, message) {
  const frame = document.getElementById('f-' + tabId);
  if (!frame) return;
  if (frame.dataset.loaded === 'true') {
    setTimeout(() => {
      try {
        frame.contentWindow.postMessage(message, window.location.origin);
      } catch (_) {}
    }, 0);
    return;
  }
  if (!pendingFrameMessages[tabId]) pendingFrameMessages[tabId] = [];
  pendingFrameMessages[tabId].push(message);
}

function updateTabGroupVisibility() {
  document.querySelectorAll('.tab-group').forEach(group => {
    const tabs = Array.from(group.querySelectorAll('.tab'));
    group.style.display = tabs.some(tab => tab.style.display !== 'none') ? '' : 'none';
    if (group.style.display !== 'none') {
      setTabGroupExpanded(group.dataset.tabGroup, tabGroupExpanded[group.dataset.tabGroup], false);
    }
  });
  updateActiveTabGroup();
}

function broadcastPaperEngineGuiSetting(enabled) {
  document.querySelectorAll('#frame-wrap iframe').forEach(frame => {
    try {
      frame.contentWindow.postMessage({
        type: 'openclaw-paper-engine-setting',
        enabled: !!enabled
      }, window.location.origin);
    } catch (_) {}
  });
}

function applyPaperEngineGuiSetting(enabled) {
  paperEngineGuiEnabled = !!enabled;
  document.querySelectorAll('.tab[data-requires-paper-engine="true"]').forEach(node => {
    node.style.display = paperEngineGuiEnabled ? '' : 'none';
  });
  updateTabGroupVisibility();
  TABS.filter(t => t.requiresPaperEngine).forEach(t => {
    const frame = document.getElementById('f-' + t.id);
    if (!frame) return;
    frame.style.display = paperEngineGuiEnabled && currentTab === t.id ? 'block' : 'none';
  });
  if (!paperEngineGuiEnabled && currentTab === 'paper') {
    switchTo('replay');
  }
  broadcastPaperEngineGuiSetting(paperEngineGuiEnabled);
}

async function loadPaperEngineGuiSetting() {
  const d = await api('/api/v1/settings/paper-engine');
  const data = d && d.data ? d.data : d;
  applyPaperEngineGuiSetting(!!(data && data.enabled));
}

function broadcastDevelopmentSupportSetting(enabled) {
  document.querySelectorAll('#frame-wrap iframe').forEach(frame => {
    try {
      frame.contentWindow.postMessage({
        type: 'openclaw-development-support-setting',
        enabled: !!enabled
      }, window.location.origin);
      frame.contentWindow.postMessage({
        type: 'openclaw-development-mode-setting',
        enabled: !!enabled
      }, window.location.origin);
    } catch (_) {}
  });
}

function applyDevelopmentSupportSetting(enabled, options) {
  developmentSupportEnabled = !!enabled;
  if (typeof ocCacheDevelopmentSupportMode === 'function') {
    ocCacheDevelopmentSupportMode(developmentSupportEnabled);
  }
  document.querySelectorAll('.tab[data-requires-development-support="true"]').forEach(node => {
    node.style.display = developmentSupportEnabled ? '' : 'none';
  });
  updateTabGroupVisibility();
  TABS.filter(t => t.requiresDevelopmentSupport).forEach(t => {
    const frame = document.getElementById('f-' + t.id);
    if (!frame) return;
    frame.style.display = developmentSupportEnabled && currentTab === t.id ? 'block' : 'none';
  });
  if (!developmentSupportEnabled && currentTab === 'development') {
    switchTo('system');
  }
  if (!options || options.broadcast !== false) {
    broadcastDevelopmentSupportSetting(developmentSupportEnabled);
  }
}

async function loadDevelopmentSupportSetting() {
  const enabled = typeof ocReadCachedDevelopmentSupportMode === 'function'
    ? ocReadCachedDevelopmentSupportMode()
    : false;
  applyDevelopmentSupportSetting(enabled, { broadcast: true });
}

window.addEventListener('message', function(ev) {
  if (ev.origin !== window.location.origin) return;
  if (!ev.data || ev.data.type !== 'openclaw-paper-engine-setting') return;
  applyPaperEngineGuiSetting(!!ev.data.enabled);
});

window.addEventListener('message', function(ev) {
  if (ev.origin !== window.location.origin) return;
  if (!ev.data || ev.data.type !== 'openclaw-console-switch-tab') return;
  const tabId = ev.data.tab || ev.data.tabId;
  if (!tabId || !TABS.some(t => t.id === tabId)) return;
  switchTo(tabId);
  if (tabId === 'risk') {
    postToTabFrame('risk', {
      type: 'openclaw-risk-select',
      engine: ev.data.riskEngine || ev.data.engine,
      riskTab: ev.data.riskTab || 'monitor',
      scrollTo: ev.data.scrollTo || 'top'
    });
  } else if (tabId === 'governance') {
    postToTabFrame('governance', {
      type: 'openclaw-governance-scroll',
      section: ev.data.governanceSection || ev.data.section || ev.data.scrollTo || 'top',
      scrollTo: ev.data.scrollTo || ev.data.governanceSection || ev.data.section || 'top'
    });
  }
});

window.addEventListener('message', function(ev) {
  if (ev.origin !== window.location.origin) return;
  if (!ev.data) return;
  if (
    ev.data.type !== 'openclaw-development-support-setting' &&
    ev.data.type !== 'openclaw-development-mode-setting'
  ) return;
  applyDevelopmentSupportSetting(!!ev.data.enabled, { broadcast: true });
});

loadPaperEngineGuiSetting();
loadDevelopmentSupportSetting();

// ─── Clock ────────────────────────────────────────────────────
setInterval(() => {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleDateString('zh-CN') + ' ' + d.toLocaleTimeString('zh-CN', {hour12:false});
}, 1000);

// ─── User Label ───────────────────────────────────────────────
const user = localStorage.getItem(USER_KEY);
if (user) document.getElementById('user-label').textContent = user;
// Auth status is determined by HttpOnly cookie, not a JS-accessible token.
// 认证状态由 HttpOnly cookie 决定，非 JS 可访问的 token。
document.getElementById('s-token-status').textContent = 'cookie-auth';

// ─── Side Panel Toggle (Live ↔ Demo) ─────────────────────────
// Shows the clicked panel directly (not toggle to opposite)
// 直接顯示被點擊的面板（不是切換到對面）
let _sidePanel = 'live';
function toggleSidePanel(clicked) {
  _sidePanel = clicked === 'paper' ? 'demo' : clicked;
  document.getElementById('side-panel-live').style.display = _sidePanel === 'live' ? '' : 'none';
  document.getElementById('side-panel-paper').style.display = _sidePanel === 'demo' ? '' : 'none';
  // Update button active state / 更新按鈕激活狀態
  const liveActive = _sidePanel === 'live';
  const btnLive = document.getElementById('spbtn-live');
  const btnPaper = document.getElementById('spbtn-paper');
  if (btnLive) {
    btnLive.style.background = liveActive ? 'rgba(239,68,68,0.15)' : 'transparent';
    btnLive.style.borderColor = liveActive ? 'rgba(239,68,68,0.5)' : 'var(--border)';
    btnLive.style.color = liveActive ? '#ef4444' : 'var(--text-dim)';
  }
  if (btnPaper) {
    btnPaper.style.background = liveActive ? 'transparent' : 'rgba(56,139,253,0.12)';
    btnPaper.style.borderColor = liveActive ? 'var(--border)' : 'rgba(56,139,253,0.3)';
    btnPaper.style.color = liveActive ? 'var(--text-dim)' : 'var(--blue)';
  }
}

// ─── Sidebar API helper (APR01-MEDIUM-13: cookie-based auth) ─
async function api(path) {
  // HttpOnly cookie sent automatically / HttpOnly cookie 自动发送
  // 5s timeout prevents sidebar from blocking when API is slow after restart
  // 5 秒超时防止重启后 API 慢导致侧边栏卡死
  try {
    const r = await fetch(path, { credentials: 'same-origin', signal: AbortSignal.timeout(5000) });
    if (!r.ok) {
      await ocHandleUnauthenticatedResponse(r);
      return null;
    }
    return await r.json();
  } catch(e) { return null; }
}

const OC = window.location.origin + '/openclaw';

// ─── Sidebar Refresh ─────────────────────────────────────────
async function refreshSidebar() {
  // ── Live Section — always shown, reads real Bybit account via /api/v1/live/balance
  // 實盤板塊 — 始終顯示，從 /api/v1/live/balance 讀取真實帳戶
  document.getElementById('live-section').style.opacity = '1';
  document.getElementById('live-balance-section').style.opacity = '1';
  document.getElementById('live-pnl-section').style.opacity = '1';

  // F5/A1+A2 — fetch session status + balance + metrics in one go.
  //   session/status → mode label + actual_endpoint (LiveDemo / Mainnet / unconfigured)
  //   balance        → equity / available
  //   metrics        → account_metrics_today DB-local-day identity
  // F5/A1+A2：一次抓 status + balance + metrics。前者給 mode + endpoint 標籤，
  // 後者算與 tab-live「今日淨 PnL」一致的口徑。
  let sessionData = null, balData = null, metricsData = null;
  try {
    const [lsR, bR, mR] = await Promise.allSettled([
      api('/api/v1/live/session/status'),
      api('/api/v1/live/balance'),
      api('/api/v1/live/metrics'),
    ]);
    sessionData = lsR.status === 'fulfilled' && lsR.value && lsR.value.data;
    balData = bR.status === 'fulfilled' && bR.value && bR.value.data;
    metricsData = mR.status === 'fulfilled' && mR.value && mR.value.data;
  } catch(e) {}

  // Show system_mode + endpoint label / 顯示 system_mode + endpoint 標籤
  const modeEl = document.getElementById('s-live-mode');
  if (sessionData) {
    const systemMode = sessionData.system_mode || 'unknown';
    const execAuth = sessionData.execution_authority || 'not_granted';
    const sessionState = (sessionData.session && sessionData.session.session_state) || 'offline';
    const actualEpt = sessionData.actual_endpoint || 'unconfigured';
    const actualKind = sessionData.actual_engine_kind || sessionData.engine_kind || 'unknown';
    const isLiveActive = sessionState === 'active' && execAuth === 'granted' && actualKind === 'live';
    // F5/A1: include endpoint label so the sidebar can't misrepresent LiveDemo
    //        as Mainnet (or unconfigured as either).
    // F5/A1：mode 標籤含 endpoint 後綴避免誤標 LiveDemo / Mainnet / 未配置。
    const epSuffix = actualEpt === 'mainnet' ? ' · Mainnet'
                   : actualEpt === 'live_demo' ? ' · LiveDemo'
                   : actualEpt === 'unconfigured' ? ' · 未配置' : '';
    const modeLabel = systemMode.replace(/_/g, ' ') + epSuffix;
    const modeColor = actualEpt === 'mainnet' ? '#f87171'
                    : actualEpt === 'live_demo' ? '#f97316'
                    : ({
                        live_reserved: '#a855f7',
                        demo_reserved: '#3b82f6',
                        shadow_only:   '#f59e0b',
                        observe_only:  '#6b7280',
                        design_only:   '#6b7280',
                      }[systemMode] || '');
    modeEl.textContent = modeLabel;
    modeEl.className = 'mc-val';
    modeEl.style.color = modeColor;
    document.getElementById('s-live-mode-detail').textContent =
      isLiveActive ? 'auth: ' + execAuth :
      actualKind !== 'live' ? 'engine: ' + actualKind : '';
  } else {
    modeEl.textContent = '--';
    document.getElementById('s-live-mode-detail').textContent = '';
  }

  // Live balance from /api/v1/live/balance (httpx BybitClient — real exchange data)
  // 實盤餘額來自 /api/v1/live/balance（httpx BybitClient — 真實交易所數據）
  try {
    if (balData && balData.error === 'live_slot_not_configured') {
      // F5/A1: refuse to display demo balance under the Live label
      // F5/A1：拒絕在 Live 標籤下顯示 demo 帳戶
      document.getElementById('s-live-balance').textContent = 'N/A';
      document.getElementById('s-live-balance-detail').textContent = 'Live 槽未配置 / Live slot not configured';
      const pnlEl = document.getElementById('s-live-pnl');
      pnlEl.textContent = 'N/A';
      pnlEl.className = 'mc-val';
      document.getElementById('s-live-pnl-detail').textContent = '';
    } else if (balData && balData.available !== false) {
      const b = balData;
      const equity = parseFloat(b.total_equity || b.totalEquity || b.equity || 0);
      const available = parseFloat(b.total_available_balance || b.totalAvailableBalance || b.available_balance || 0);

      document.getElementById('s-live-balance').textContent = equity > 0 ? ocBalance(equity, 2) : '--';
      document.getElementById('s-live-balance-detail').textContent =
        available > 0 ? 'Available: ' + ocBalance(available, 2) : (b.source || 'connecting...');

      const today = (metricsData && metricsData.db_true_metrics && metricsData.db_true_metrics.account_metrics_today)
        || (metricsData && metricsData.account_metrics_today)
        || {};
      const realizedGross = Number(today.gross_pnl);
      const fees = Number(today.total_fees);
      const funding = Number(today.funding_pnl);
      const fills = Number(today.total_fills);
      const netPnl = Number(today.net_pnl);
      const pnlEl = document.getElementById('s-live-pnl');
      pnlEl.textContent = Number.isFinite(netPnl) && netPnl !== 0 ? ocMoney(netPnl) : '--';
      pnlEl.className = 'mc-val' + (netPnl > 0 ? ' green' : netPnl < 0 ? ' red' : '');
      const detailParts = [];
      if (Number.isFinite(realizedGross)) detailParts.push('Realized ' + realizedGross.toFixed(2));
      if (Number.isFinite(fees)) detailParts.push('Fees ' + fees.toFixed(4));
      if (Number.isFinite(funding) && funding !== 0) detailParts.push('Funding ' + funding.toFixed(4));
      if (Number.isFinite(fills)) detailParts.push('fills ' + String(Math.round(fills)));
      document.getElementById('s-live-pnl-detail').textContent = detailParts.join(' · ');
    } else {
      document.getElementById('s-live-balance').textContent = '--';
      document.getElementById('s-live-balance-detail').textContent = 'connecting...';
    }
  } catch(e) {
    document.getElementById('s-live-balance').textContent = '--';
    document.getElementById('s-live-balance-detail').textContent = 'error';
  }

  // ── Demo Trading Balance + PnL ──
  try {
    const [sdR, balR, metricsR] = await Promise.allSettled([
      api('/api/v1/strategy/demo/session/status'),
      api('/api/v1/strategy/demo/balance'),
      api('/api/v1/strategy/demo/metrics'),
    ]);
    const sd = sdR.status === 'fulfilled' && sdR.value ? sdR.value.data : null;
    const balPayload = balR.status === 'fulfilled' && balR.value ? balR.value.data : null;
    const metricsPayload = metricsR.status === 'fulfilled' && metricsR.value ? metricsR.value.data : null;
    if (balPayload) {
      let b = balPayload;
      if (b.result && b.result.list && b.result.list[0]) b = b.result.list[0];
      const equity = parseFloat(b.totalEquity || b.total_equity || b.equity || b.balance || 0);
      const available = parseFloat(b.totalAvailableBalance || b.total_available_balance || b.availableBalance || b.available_balance || 0);
      const unrealized = parseFloat(b.totalPerpUPL || b.unrealized_pnl || b.total_unrealised_pnl || b.total_unrealized_pnl || 0);
      const realizedGross = parseFloat(b.engine_realized_pnl || 0) || 0;
      const fees = parseFloat(b.engine_total_fees || 0) || 0;
      let net = realizedGross - fees + unrealized;
      const perf = (metricsPayload && metricsPayload.performance_metrics)
        || (metricsPayload && metricsPayload.db_true_metrics && metricsPayload.db_true_metrics.performance_metrics)
        || [];
      const netMetric = Array.isArray(perf) ? perf.find(m => m && m.key === 'net_pnl_7d') : null;
      if (!Number.isFinite(net) && netMetric) net = Number(netMetric.value);

      document.getElementById('s-paper-balance').textContent = equity > 0 ? ocBalance(equity, 2) : '--';
      const s = sd && sd.session ? sd.session : {};
      const state = s.session_state || 'offline';
      const stateLabel = {active:'运行中',paused:'已暂停',stopped:'已停止',idle:'未启动'}[state] || state;
      document.getElementById('s-paper-balance-detail').textContent =
        stateLabel + (available > 0 ? ' | Available: ' + ocBalance(available, 2) : '');

      const pnlEl = document.getElementById('s-pnl');
      pnlEl.textContent = ocMoney(net);
      pnlEl.className = 'mc-val ' + (net>=0?'green':'red');
      document.getElementById('s-pnl-detail').textContent =
        'UPL ' + unrealized.toFixed(2) + ' + Realized ' + realizedGross.toFixed(2) +
        ' − Fees ' + fees.toFixed(4);

      document.getElementById('s-api').textContent = 'Online';
      document.getElementById('s-api').className = 'mc-val green';
      document.getElementById('api-dot').className = 'dot dot-ok';
    }
  } catch(e) {
    document.getElementById('s-api').textContent = 'Offline';
    document.getElementById('s-api').className = 'mc-val red';
    document.getElementById('api-dot').className = 'dot dot-err';
  }

  // AI Cost
  try {
    const d = await api('/api/v1/paper/ai-cost');
    if (d && d.data && d.data.available) {
      document.getElementById('s-cost').textContent = ocBalance(d.data.today_cost, 4);
      document.getElementById('s-cost-detail').textContent =
        d.data.today_tokens.toLocaleString() + ' tokens | 30d: ' + ocBalance(d.data.total_cost_30d, 2);
    }
  } catch(e) {}

  // OpenClaw
  try {
    const r = await fetch(OC + '/health', {
      credentials: 'same-origin'  // HttpOnly cookie sent automatically / 自动发送 HttpOnly cookie
    });
    const h = await r.json();
    document.getElementById('s-oc').textContent = h.ok ? 'Online' : 'Down';
    document.getElementById('s-oc').className = 'mc-val ' + (h.ok ? 'green' : 'red');
  } catch(e) {
    document.getElementById('s-oc').textContent = 'Offline';
    document.getElementById('s-oc').className = 'mc-val red';
  }
}

// Wait for server to be up before first sidebar refresh (replaces fixed 2s blind wait).
// 等待服務器就緒後才做第一次 sidebar 刷新（取代盲等 2s，避免重啟後 GUI 卡住）。
// waitForServerUp() is defined in common.js; polls /api/v1/system/startup-status.
waitForServerUp(function() {
  refreshSidebar();
  setInterval(refreshSidebar, 15000);
});
ocInitFx();
window.addEventListener('occurrencychange', refreshSidebar);
</script>
