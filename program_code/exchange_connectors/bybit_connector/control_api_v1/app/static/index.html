<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenClaw / Bybit Control Center</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>OpenClaw / Bybit Control Center</h1>
      <p>RC2 MVP GUI · FastAPI embedded dashboard</p>
    </div>
    <div class="token-panel">
      <label for="tokenInput">Bearer Token</label>
      <input id="tokenInput" type="password" placeholder="仅保存在当前页面内存 / kept in-memory only" />
      <button id="connectButton">连接 / Connect</button>
    </div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>系统总览 / Overview</h2>
      <pre id="overviewBox">等待加载 / Waiting...</pre>
    </section>

    <section class="card">
      <h2>控制平面 / Control Plane</h2>
      <pre id="controlPlaneBox">等待加载 / Waiting...</pre>
    </section>

    <section class="card">
      <h2>来源上下文 / Source Context</h2>
      <pre id="sourceContextBox">等待加载 / Waiting...</pre>
    </section>

    <section class="card">
      <h2>审计摘要 / Audit Summary</h2>
      <pre id="auditBox">等待加载 / Waiting...</pre>
    </section>

    <section class="card wide">
      <h2>快捷动作 / Quick Actions</h2>
      <div class="actions">
        <button data-action="refresh">刷新概览 / Refresh</button>
        <button data-action="validate">Demo Validate</button>
        <button data-action="bundle">Safe Recheck Bundle</button>
      </div>
      <div class="actions">
        <button data-action="set-demo-mode">Set Demo Reserved</button>
        <button data-action="enable-spot">Enable Spot Shadow</button>
      </div>
      <pre id="actionResultBox">尚未执行动作 / No action yet.</pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
