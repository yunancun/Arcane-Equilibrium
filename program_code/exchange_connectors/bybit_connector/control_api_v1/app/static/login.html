<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>玄衡 · Arcane Equilibrium — Login</title>
<link rel="stylesheet" href="/static/styles.css" />
<style>
  /* :root variables are in styles.css (canonical location, includes --card and --dim aliases for this page) */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font:14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;display:flex;align-items:center;justify-content:center}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;text-align:center}
  .login-card h1{font-size:20px;margin-bottom:6px}
  .login-card p{color:var(--dim);font-size:12px;margin-bottom:24px}
  .logo{
    width:54px;height:54px;margin:0 auto 16px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:700;color:#f0f6fc;
    background:linear-gradient(135deg,rgba(56,139,253,0.28),rgba(139,92,246,0.22));
    border:1px solid rgba(139,148,158,0.28);
  }
  .field{margin-bottom:16px;text-align:left}
  .field label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
  .field input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none}
  .field input:focus{border-color:var(--accent)}
  .pw-wrap{position:relative}
  .pw-wrap input{padding-right:38px}
  .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:0;line-height:1}
  .pw-toggle:hover{color:var(--text)}
  .btn{width:100%;padding:12px;background:rgba(56,139,253,0.15);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
  .btn:hover{background:rgba(56,139,253,0.3)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .error{color:var(--red);font-size:12px;margin-top:12px;display:none}
  .links{margin-top:20px;font-size:11px;color:var(--dim)}
  .links a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo" aria-hidden="true">玄</div>
  <h1>玄衡 · Arcane Equilibrium</h1>
  <p>Agentic trading governance console</p>
  <form id="loginForm">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required autofocus/>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" autocomplete="current-password" required/>
        <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1">&#x1F441;</button>
      </div>
    </div>
    <button type="submit" class="btn" id="loginBtn">Login</button>
  </form>
  <div class="error" id="error"></div>
  <div class="links">
    <!-- Use dynamic origin to avoid hardcoded Tailscale URL / 使用动态 origin 避免硬编码 Tailscale URL -->
    <a id="gw-link" href="#" target="_blank">OpenClaw Gateway</a>
  </div>
</div>
<script>
// Set gateway link dynamically using current origin to avoid hardcoded Tailscale URL
// 使用当前 origin 动态设置网关链接，避免硬编码 Tailscale URL
document.getElementById('gw-link').href = window.location.origin + '/openclaw';

// Password visibility toggle / 密码显示切换
document.getElementById('pwToggle').addEventListener('click', function() {
  const pw = document.getElementById('password');
  const isHidden = pw.type === 'password';
  pw.type = isHidden ? 'text' : 'password';
  this.textContent = isHidden ? '\u25CF' : '\uD83D\uDC41';
});

const REDIRECT_KEY = 'oc_login_redirect';
const USER_KEY = 'oc_username';

function safeRedirectTarget(value) {
  if (!value || typeof value !== 'string') return '';
  if (!value.startsWith('/') || value.startsWith('//') || value.includes('\\')) {
    return '';
  }
  let path = value;
  try {
    path = new URL(value, window.location.origin).pathname;
  } catch (_) {
    return '';
  }
  if (path === '/login' || path.startsWith('/static/')) {
    return '/';
  }
  return value;
}

function loginRedirectTarget() {
  const params = new URLSearchParams(window.location.search);
  return safeRedirectTarget(params.get('redirect')) ||
    safeRedirectTarget(sessionStorage.getItem(REDIRECT_KEY)) ||
    '/';
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Authenticating...';

  try {
    // Login endpoint sets HttpOnly cookie — no need to store token in JS.
    // 登录端点设置 HttpOnly cookie，无需在 JS 中存储 token。
    const resp = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });

    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      const detail = data.detail;
      const msg = typeof detail === 'string' ? detail
        : (detail && detail.message) ? detail.message
        : 'Login failed';
      throw new Error(msg);
    }

    const data = await resp.json();
    // Only store username for display; token is in HttpOnly cookie.
    // 只存用户名用于显示；token 在 HttpOnly cookie 中。
    localStorage.setItem(USER_KEY, data.username);
    // Clean up legacy token if present / 清理旧的 localStorage token
    localStorage.removeItem('oc_trading_token');

    // Redirect to original page or default to /console
    const redirect = loginRedirectTarget();
    sessionStorage.removeItem(REDIRECT_KEY);
    window.location.href = redirect;

  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Login';
  }
});

// If already logged in (cookie valid), redirect.
// 如果已登录（cookie 有效），直接跳转。
(async function() {
  try {
    const r = await fetch('/api/v1/auth/check', { credentials: 'same-origin' });
    if (r.ok) {
      const redirect = loginRedirectTarget();
      sessionStorage.removeItem(REDIRECT_KEY);
      window.location.href = redirect;
    }
  } catch(e) { /* not logged in, stay on login page / 未登录，留在登录页 */ }
})();
</script>
</body>
</html>
