<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OpenClaw Trading — Login</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --dim:#8b949e; --accent:#58a6ff; --green:#3fb950; --red:#f85149; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font:14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;display:flex;align-items:center;justify-content:center}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;text-align:center}
  .login-card h1{font-size:20px;margin-bottom:6px}
  .login-card p{color:var(--dim);font-size:12px;margin-bottom:24px}
  .logo{font-size:36px;margin-bottom:16px}
  .field{margin-bottom:16px;text-align:left}
  .field label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
  .field input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none}
  .field input:focus{border-color:var(--accent)}
  .btn{width:100%;padding:12px;background:rgba(56,139,253,0.15);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
  .btn:hover{background:rgba(56,139,253,0.3)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .error{color:var(--red);font-size:12px;margin-top:12px;display:none}
  .links{margin-top:20px;font-size:11px;color:var(--dim)}
  .links a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">&#x1F99E;</div>
  <h1>OpenClaw Trading System</h1>
  <p>AI Agent trading system console</p>
  <form id="loginForm">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required autofocus/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="btn" id="loginBtn">Login</button>
  </form>
  <div class="error" id="error"></div>
  <div class="links">
    <a href="https://trade-core.tail358794.ts.net" target="_blank">OpenClaw Gateway</a>
  </div>
</div>
<script>
const REDIRECT_KEY = 'oc_login_redirect';
const TOKEN_KEY = 'oc_trading_token';
const USER_KEY = 'oc_username';

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Authenticating...';

  try {
    const resp = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });

    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      throw new Error(data.detail || 'Login failed');
    }

    const data = await resp.json();
    localStorage.setItem(TOKEN_KEY, data.token);
    localStorage.setItem(USER_KEY, data.username);

    // Redirect to original page or default to /trading
    const redirect = sessionStorage.getItem(REDIRECT_KEY) || '/trading';
    sessionStorage.removeItem(REDIRECT_KEY);
    window.location.href = redirect;

  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Login';
  }
});

// If already logged in, redirect
if (localStorage.getItem(TOKEN_KEY)) {
  const redirect = sessionStorage.getItem(REDIRECT_KEY) || '/trading';
  sessionStorage.removeItem(REDIRECT_KEY);
  window.location.href = redirect;
}
</script>
</body>
</html>
