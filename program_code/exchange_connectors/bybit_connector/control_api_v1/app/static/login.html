<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>玄衡 · Arcane Equilibrium — Login</title>
<!-- Phase 0 過渡:token 正本 tokens.css+compat 映射層須先於一切樣式載入;data-theme="dark" 釘死玄夜主題,因存量樣式仍有暗色硬編碼,OS 淺色偏好會產生壞對比;P1.3 主題切換上線後移除釘死 -->
<link rel="stylesheet" href="/static/tokens.css" />
<link rel="stylesheet" href="/static/tokens-compat.css" />
<link rel="stylesheet" href="/static/oc-utilities.css" />
<link rel="stylesheet" href="/static/styles.css" />
<style>
  /* token 正本=tokens.css;本頁 --card/--dim 簡短別名由 tokens-compat.css 映射(P0.1) */
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font:14px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;display:flex;align-items:center;justify-content:center}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;text-align:center}
  .login-card h1{font-size:20px;margin-bottom:6px}
  .login-card p{color:var(--dim);font-size:12px;margin-bottom:24px}
  /* 品牌方印:青銅 accent(canon 10 品牌刻度),不再用舊 GitHub 藍紫漸層 */
  .logo{
    width:54px;height:54px;margin:0 auto 16px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;font-weight:700;color:var(--accent);
    background:var(--accent-weak);
    border:1px solid var(--border);
  }
  .field{margin-bottom:16px;text-align:left}
  .field label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
  .field input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;outline:none}
  .field input:focus{border-color:var(--accent)}
  .pw-wrap{position:relative}
  .pw-wrap input{padding-right:38px}
  .pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:0;line-height:1}
  .pw-toggle:hover{color:var(--text)}
  /* CTA 沿用 console .idx-banner-cta 青銅慣用法;hover 填實青銅(canon 10 焦點 CTA) */
  .btn{width:100%;padding:12px;background:var(--accent-weak);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
  .btn:hover{background:var(--accent);color:var(--bg-app)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .error{color:var(--red);font-size:12px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo" aria-hidden="true">玄</div>
  <h1>玄衡 · Arcane Equilibrium</h1>
  <p>Agentic trading governance console</p>
  <form id="loginForm">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required autofocus/>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" autocomplete="current-password" required/>
        <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1">&#x1F441;</button>
      </div>
    </div>
    <button type="submit" class="btn" id="loginBtn">Login</button>
  </form>
  <div class="error" id="error"></div>
</div>
<script>
// Password visibility toggle / 密码顯示切换
document.getElementById('pwToggle').addEventListener('click', function() {
  const pw = document.getElementById('password');
  const isHidden = pw.type === 'password';
  pw.type = isHidden ? 'text' : 'password';
  this.textContent = isHidden ? '\u25CF' : '\uD83D\uDC41';
});

const REDIRECT_KEY = 'oc_login_redirect';
const USER_KEY = 'oc_username';
const LOGIN_ERROR_FALLBACKS = {
  'Auth config not found': {
    code: 'AUTH_CONFIG_MISSING',
    message: 'GUI auth config not found — set GUI_USERNAME/GUI_PASSWORD or configure gui_auth.env',
  },
  'Auth not configured — edit gui_auth.env': {
    code: 'AUTH_CONFIG_PLACEHOLDER',
    message: 'GUI auth username placeholder is still configured — edit gui_auth.env',
  },
  'Auth password not configured — set GUI_PASSWORD': {
    code: 'AUTH_PASSWORD_MISSING',
    message: 'GUI auth password not configured — set GUI_PASSWORD',
  },
  'Invalid credentials': {
    code: 'AUTH_INVALID_CREDENTIALS',
    message: 'Invalid username or password',
  },
};

function safeRedirectTarget(value) {
  if (!value || typeof value !== 'string') return '';
  if (!value.startsWith('/') || value.startsWith('//') || value.includes('\\')) {
    return '';
  }
  let target;
  try {
    target = new URL(value, window.location.origin);
  } catch (_) {
    return '';
  }

  // 跳轉目標只由可信常量重建；即使解析完成也不直接回傳呼叫方 URL，避免未來解析器邊界案例重新形成 open redirect。
  if (target.origin !== window.location.origin) return '';
  switch (target.pathname) {
    case '/': return '/';
    case '/gui': return '/gui';
    case '/console': return '/console';
    case '/console/legacy': return '/console/legacy';
    case '/trading':
      if (target.searchParams.get('embed') === '1') return '/trading?embed=1';
      return '/trading';
    case '/login':
    default:
      return '/';
  }
}

function loginRedirectTarget() {
  const params = new URLSearchParams(window.location.search);
  return safeRedirectTarget(params.get('redirect')) ||
    safeRedirectTarget(sessionStorage.getItem(REDIRECT_KEY)) ||
    '/';
}

function formatLoginError(detail) {
  if (detail && typeof detail === 'object') {
    const code = detail.code || 'AUTH_LOGIN_FAILED';
    const message = detail.message || detail.detail || 'Login failed';
    return code + ': ' + message;
  }
  const raw = typeof detail === 'string' ? detail : 'Login failed';
  const fallback = LOGIN_ERROR_FALLBACKS[raw];
  if (fallback) return fallback.code + ': ' + fallback.message;
  return 'AUTH_LOGIN_FAILED: ' + raw;
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Authenticating...';

  try {
    // Login endpoint sets HttpOnly cookie — no need to store token in JS.
    // 登录端点設置 HttpOnly cookie，無需在 JS 中存储 token。
    const resp = await fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'same-origin',
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });

    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      throw new Error(formatLoginError(data.detail));
    }

    const data = await resp.json();
    // Only store username for display; token is in HttpOnly cookie.
    // 只存用户名用于顯示；token 在 HttpOnly cookie 中。
    localStorage.setItem(USER_KEY, data.username);
    // Clean up legacy token if present / 清理旧的 localStorage token
    localStorage.removeItem('oc_trading_token');

    // Redirect to original page or default to /console
    const redirect = loginRedirectTarget();
    sessionStorage.removeItem(REDIRECT_KEY);
    window.location.href = redirect;

  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Login';
  }
});

// If already logged in (cookie valid), redirect.
// 如果已登录（cookie 有效），直接跳转。
(async function() {
  try {
    const r = await fetch('/api/v1/auth/check?soft=1', { credentials: 'same-origin' });
    if (r.ok) {
      const data = await r.json().catch(() => ({}));
      if (!data.authenticated) return;
      const redirect = loginRedirectTarget();
      sessionStorage.removeItem(REDIRECT_KEY);
      window.location.href = redirect;
    }
  } catch(e) { /* not logged in, stay on login page / 未登录，留在登录页 */ }
})();
</script>
</body>
</html>
