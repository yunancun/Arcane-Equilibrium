    head 內極小 inline 腳本僅防 FOUC(首繪前依顯式選擇定 data-theme),零業務邏輯、非樣式塊,不破 canon 8;
    OS-dark / 顯式-dark 用戶玄夜 token byte-identical、零視覺回歸,解釘只讓 OS-light 用戶進帛晝;
    ③衡樑 / 遙測無真值 → blocked 佔位(canon 7),絕不 fake;clock 是唯一 client 真值。

<!-- FOUC 防閃(首繪前定主題):僅讀 localStorage 顯式選擇 → 條件 setAttribute('data-theme');無顯式
     選擇則不設,交由 tokens.css 的 prefers-color-scheme 決定(OS-dark→玄夜 / OS-light→帛晝),故
     OS-dark 用戶零回歸。零業務邏輯;inline 腳本非 ratchet 違規(ratchet 只管樣式塊與 inline 樣式屬性)。 -->
<script>
(function () {
  try {
    var t = localStorage.getItem('oc-theme');
    if (t === 'dark' || t === 'light') {
      document.documentElement.setAttribute('data-theme', t);
    }
  } catch (e) {}
})();
</script>
