apiVersion: 1
datasources:
  - name: TradingAPI
    type: marcusolsson-json-datasource
    access: proxy
    url: http://host.docker.internal:8000
    jsonData:
      httpHeaderName1: Authorization
    secureJsonData:
      # 安全 / Security:
      #   由环境变量注入完整 header 值；不要在仓库中提交 bearer token。
      #   Inject the full header value from the environment; never commit bearer tokens.
      httpHeaderValue1: "${GRAFANA_FASTAPI_AUTH_HEADER}"
