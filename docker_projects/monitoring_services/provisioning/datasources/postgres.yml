apiVersion: 1
datasources:
  - name: PostgreSQL
    type: grafana-postgresql-datasource
    access: proxy
    url: trading_postgres:5432
    user: trading_admin
    secureJsonData:
      password: "<REDACTED>"
    jsonData:
      database: trading_ai
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
