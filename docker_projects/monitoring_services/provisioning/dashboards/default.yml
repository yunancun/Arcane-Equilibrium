apiVersion: 1
providers:
  - name: 'OpenClaw Trading Dashboards'
    orgId: 1
    folder: 'Trading'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
