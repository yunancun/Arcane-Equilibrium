services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: trading_grafana
    restart: always
    ports:
      - "${GRAFANA_BIND_ADDR:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    environment:
      # 安全 / Security:
      #   管理员密码必须由部署环境提供；仓库内不保留已知默认密码。
      #   Admin password must come from deployment env; no repo-known default password.
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD outside the repo}
      - GF_SERVER_ROOT_URL=http://trade-core:3000
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # 安全 / Security:
      #   匿名访问默认关闭；如需只读面板，部署时显式设置为 true。
      #   Anonymous access is disabled by default; explicitly set true for read-only dashboards.
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GRAFANA_FASTAPI_AUTH_HEADER=${GRAFANA_FASTAPI_AUTH_HEADER:?set GRAFANA_FASTAPI_AUTH_HEADER outside the repo}
      - GRAFANA_POSTGRES_PASSWORD=${GRAFANA_POSTGRES_PASSWORD:?set GRAFANA_POSTGRES_PASSWORD outside the repo}
      - GF_INSTALL_PLUGINS=marcusolsson-json-datasource
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/system_overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
      - ./dashboards:/var/lib/grafana/dashboards
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pg_net

networks:
  pg_net:
    external: true
    name: basic_system_services_default

volumes:
  grafana_data:
