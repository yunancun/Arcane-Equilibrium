#
# Last updated: 2026-06-14
# 最後更新：2026-06-14
#
# Source: official pricing pages (anthropic.com, openai.com)
# 來源：官方定價頁
# anthropic 條目於 2026-06-14 對齊 anthropic.com pricing：
#   opus-4.8 $5/$25、sonnet-4.6 $3/$15、haiku-4.5 $1/$5（per MTok）。
# 退役型號保留為 active:false（fail-closed 拒呼叫），不刪除，
# 符合 pricing.rs Test 5 retired 慣例 + 啟動 active_count()>=5 sanity check。
#
# Format / 格式:
#   <provider>:
#     <model_name>:
#       input_per_mtok: <usd>
#       output_per_mtok: <usd>
#       active: true|false        # if false, model is fail-closed (rejected by tracker)
#                                 # 若 false，模型 fail-closed（tracker 拒絕）

