# Adaptive Demo Profit Engine（ADPE）閉環 runner 配置。
#
# 用途：control program_code.ml_training.adaptive_demo_profit_engine.runner 的閉環行為。
# 硬邊界：engine_mode 硬鎖 'demo'（runner 啟動驗證，非 demo 直接拒絕整個 cycle）；
#         真錢 / mainnet 5-gate / live 路徑完全不碰。
# 缺檔 / 缺欄位 → runner 用內建 dataclass 預設（fail-soft）。

[runner]
# engine_mode 硬鎖：只允許 'demo'。改成其他值會被 runner 拒絕（fail-closed）。
engine_mode = "demo"

# 默認 dry-run：true = 只產 plan + log，不發 set_strategy_active IPC。
# 真發需 CLI --apply（operator 確認 dry-run plan 合理後才開）。
dry_run_default = true

# 讀 realized demo reward 的近窗天數（learning.mlde_edge_training_rows，post-fee）。
reward_max_age_days = 30

# 候選策略集（要被配置的 strategy-arm）。空 = 從 reward 觀測自動發現 arm_id。
# funding_arb 已 retired；controlled experiment mode 下不可由 ADPE revive。
candidate_strategies = ["ma_crossover", "bb_breakout", "bb_reversion", "grid_trading"]

# 候選 regime 集（要逐一 allocate 的 regime context）。空 = allocator VALID_REGIMES 全集。
# 留空使用全集；如需收斂到特定 regime 再列舉。
candidate_regimes = []

# 是否把 demo-maker candidate arm（post-only maker 捕價差，artifact tier）納入候選。
# 注：demo-maker 增益走 all_fills 軌標 saw_artifact，transferable_only 軌不吸收。
include_demo_maker_arm = true

# Track1 explore-gate 開關：true = 每 cycle 由 allocator 真實 explore_budget_remaining
# 推導 explore overlay 寫 edge_estimates.json。controlled mode 會額外約束哪些策略可為了探索
# 被保 active；winner active 仍由 allocator post-fee reward 決定。
enable_explore_sink = true

# Controlled experiment mode：demo 不是停機，而是把探索從「全策略常開」改為
# evidence-gated / capped / auditable 的實驗政策。L2/multi-agent advisory 只作
# explore 保活 evidence，不授予下單權、不改 live、不繞 governance。
controlled_experiment_enabled = true
retired_strategy_blocklist = ["funding_arb"]
explore_strategy_allowlist = ["ma_crossover", "bb_breakout", "bb_reversion", "grid_trading"]
max_active_explore_strategies = 2
require_advisory_for_explore = true
advisory_sources = ["ml_shadow", "dream_engine"]
advisory_max_age_hours = 48
advisory_min_confidence = 0.5
advisory_min_expected_net_bps = 0.0
advisory_min_sample_count = 10
advisory_allow_requires_governance = false

# Side-aware realized edge evidence：讀 settings/edge_estimates.json 的
# strategy::symbol::Buy/Sell cell，只有清過 cost wall 的 side edge 才能作 explore
# keepalive evidence。當至少一個候選策略有 cost-viable side edge 時，advisory-only
# 候選不再保活，避免舊 advisory 讓 grid 反覆產生會被 Rust cost gate 擋掉的 intent。
use_edge_snapshot_for_explore_evidence = true
require_cost_viable_edge_for_explore_when_available = true
edge_evidence_fee_rate = 0.00055
edge_evidence_slippage = 0.0
edge_evidence_win_rate_floor = 0.3
edge_evidence_safety_multiplier = 1.3
edge_evidence_grid_min_n = 30
edge_evidence_require_runtime_symbol_ready = true
edge_evidence_runtime_snapshot_path = "/tmp/openclaw/pipeline_snapshot.json"

# RNG seed：留空 = 非確定（production cron）；CLI --seed 可注入固定值供可重現。
# rng_seed = 42

[allocator]
# 歸零硬閘：真 arm 的 P(μ>0) 必須 ≥ 此值才有資格被配置；否則歸 flat（學會歸零）。
positive_prob_gate = 0.55

# Monte-Carlo 估 P(μ>0) / posterior-prob 權重的抽樣次數。
prob_mc_samples = 2000

# flat-arm 保守成本下限（bps）：真 arm 要贏過「不做且付此成本」才被配。
flat_arm_cost_floor_bps = 5.0

# 每 arm explore 上限（n_trials < 此值仍在探索期）。
explore_budget = 30

# 遺忘因子（非平穩）：每次 ingest 對舊充分統計量指數衰減。0.99 = 慢衰減。
forgetting_gamma = 0.99

# dormant 自動清除：arm 連續此 tick 數無新報酬 → 後驗回退 prior。
dormant_clear_after_ticks = 1440

# 信任軌：transferable_only = promotion 鐵則（demo artifact 不驅動真實配置）。
trust_track = "transferable_only"
