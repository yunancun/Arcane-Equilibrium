# ADR-0048 Stock/ETF kill-switch and disable-cleanup runbook template.
#
# This is a blocked, secret-free source template. It does not stop services,
# contact IBKR, create secrets, route paper orders, mutate DB state, change
# Bybit live execution, authorize release, or authorize tiny-live/live.

[runbook]
runbook_id = ""
asset_lane = "crypto_perp"
broker = "bybit"
source_artifact_hash = ""
bybit_live_execution_unchanged = false
ibkr_contact_performed = false
connector_runtime_started = false
paper_order_routed = false
secret_slot_created = false
secret_content_serialized = false
destructive_db_cleanup_requested = false
db_delete_or_truncate_allowed = false
paper_shadow_launch_authorized = false
tiny_live_authorized = false
live_authorized = false

