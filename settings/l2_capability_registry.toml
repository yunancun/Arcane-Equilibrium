# L2 Advisory Mesh — capability registry（TOML-only SSOT，PA P2 設計 §B/§L）。
#
# 為什麼 TOML-only：operator 拍板 registry = TOML SSOT（無 DB 表、無 V137）。此檔是
# capability 啟用/調參的唯一真相來源（mirror settings/risk_control_rules/risk_config.toml）。
# 系統啟動時零外部 state 即可 boot。
#
# 硬規則（loader 強制，見 l2_capability_registry.py）：
#   - 每個 [[capability]] stanza 預設 enabled=false（fail-closed；省略 enabled ⇒ false）。
#   - unknown field → reject load（catches 過期 v1 config / drift）。
#   - 宣告 autonomy_level 欄 → reject load（autonomy 是 DERIVED，永不宣告，見 §C）。
#   - 把 can_auto_deploy_to_paper 當 posture gate 用 → reject load（它 True@all-tiers 無 signal）。
#   - lane 不在 LANE_DIRECTION 表 keys → reject load（無 "live" lane；live 不可從任何 auto 路徑到達）。
#
# P3a（首批 capability）= ml_advisory 的 diagnose_leak + interpret_result 兩模式（direction=neutral，
# 斷言「無 alpha」，無 alpha math gate）。hypothesize 模式（P3b，alpha-bearing）blocked on QC B1 +
# altcap data，**本檔不含**。全部預設 enabled=false（fail-closed），部署即行為中性。

[meta]
# schema 版本：loader 在 unknown top-level key 時 reject；此版本供日後 contract drift 追溯。
version = 1
note = "P3a — ml_advisory diagnose_leak + interpret_result (neutral, no-alpha); all enabled=false"

# ═══════════════════════════════════════════════════════════════════════════════
# P3a capability stanzas（PA P3 設計 §B/§C/§L；direction=neutral，0 新執行權，斷言無 alpha）
# ═══════════════════════════════════════════════════════════════════════════════
#
# 為什麼 enabled=false 預設：fail-closed（loader 強制）。部署即行為中性——orchestrator dispatch
# 對 disabled capability 立即 capability_disabled 短路，零 model 呼叫、零 sink 寫入。operator
# 評估後才設 enabled=true。
#
# 為什麼 P3a 只有 2 模式、無 hypothesize：diagnose/interpret 斷言「無 alpha」（leak 診斷 / 結果
# 解讀皆不作 promotion-relevant 斷言），故無 alpha 需要驗，無 B1 beta-neutral gate（=P3b，
# alpha-bearing，blocked on QC B1 final numbers + altcap basket data）。P3a 的 gate = leak/
# diagnostic typing（M3）+ Ollama 校準（M4），非 alpha math gate（beta/DSR/PBO）。
#
# 為什麼 lane="ml_backlog"（→ LANE_DIRECTION="neutral"）：研究 sink，非 remediation、無交易效果。
# 兩模式皆 neutral（鐵律：0 新執行權）；feeds 既有 mlde_shadow_recommendations（applied=false/
# requires_governance=true）+ D3。
#
# 為什麼 min_tier="L1"：diagnose/interpret 不生成 hypothesis（can_generate_hypotheses 是 L3+ 才
# True，learning_tier_gate.py:203），L1 baseline 即足。hypothesize（P3b）才需 L3。

[[capability]]
capability_id          = "ml_advisory.diagnose_leak"  # P3a — 診斷 ML 管線 leak/drift；斷言無 alpha
enabled                = false                          # FAIL-CLOSED DEFAULT（loader 強制；省略 ⇒ false）
min_tier               = "L1"                           # 診斷不需 hypothesis-gen tier
tier_capability_flag   = ""                             # 不綁 flag（L1 baseline）
model_tier             = "cloud_l2"                     # cloud-L2 解讀 survivors；Ollama screen 是 cascade 內部階
cloud_model_pref       = "sonnet"
lane                   = "ml_backlog"                   # → LANE_DIRECTION="neutral"（研究 sink，無交易效果）
output_schema_ref      = "ml_advisory.v1"               # → contract registry（三模式共用 schema）
prompt_contract_ref    = "ml_advisory.diagnose_leak.v1" # → contract registry（確定性 versioned 模板）
out_of_bound_guard_ref = "ml_advisory.guard.v1"         # → guard registry（M3 source_class typing）
novelty_gate           = false                          # 診斷非 hypothesis → 無 novelty dedupe
consequential_default  = false

[capability.trigger]
kind          = "event"
spec          = "ml:training_complete"
debounce_secs = 900                                     # §F.1 trailing-edge settle（burst 沉澱後 fire 一次）
dedup_key     = "capability_id+spec+coarse_subject"

[capability.budget]
per_call_usd_cap = 0.50
daily_usd_cap    = 0.50                                 # ≤ DOC-08 $2/day（budget_config.toml）
tier_gated_spend = true

[[capability]]
capability_id          = "ml_advisory.interpret_result"  # P3a — 解讀訓練結果；斷言無 alpha
enabled                = false                            # FAIL-CLOSED DEFAULT
min_tier               = "L1"
tier_capability_flag   = ""
model_tier             = "cloud_l2"
cloud_model_pref       = "sonnet"
lane                   = "ml_backlog"                     # → LANE_DIRECTION="neutral"
output_schema_ref      = "ml_advisory.v1"
prompt_contract_ref    = "ml_advisory.interpret_result.v1"
out_of_bound_guard_ref = "ml_advisory.guard.v1"
novelty_gate           = false
consequential_default  = false

[capability.trigger]
kind          = "event"
spec          = "ml:training_complete"
debounce_secs = 900
dedup_key     = "capability_id+spec+coarse_subject"

[capability.budget]
per_call_usd_cap = 0.50
daily_usd_cap    = 0.50
tier_gated_spend = true

# ═══════════════════════════════════════════════════════════════════════════════
# P3b capability stanza（PA P3b 設計 §E.1；alpha-bearing，promotion-relevant verdict）
# ═══════════════════════════════════════════════════════════════════════════════
#
# 為什麼 hypothesize 是 alpha-bearing 卻仍 lane="ml_backlog"（neutral）：一次 hypothesize run
# 產出「backlog item + promotion-relevant verdict（pass/DEFER/fail）」。verdict 是 promotion-
# relevant，但「晉升動作」（到 demo Stage 1）是「另一個」demo_stage1 lane（=expand=forced
# MANUAL）。alpha 驗證發生在 cascade 的「確定性 math gate」（B1+DSR+PBO+leak+Q1，唯一 validator；
# LLM 永不驗 alpha）。pass-verdict backlog item 只是 advisory；「人工」晉升它（P4/P5），且 auto
# 晉升須 B2 forward-OOS ≥21d demo Stage 1（Stage 0R necessary-not-sufficient）。0 新 live
# authority、0 新 auto-to-paper signal。
#
# 雙閘（fail-closed）：
#   - enabled=false（loader 強制；部署即行為中性，operator 評估後才開）。
#   - min_tier=L3 + tier_capability_flag=can_generate_hypotheses（effective_autonomy STEP-2
#     TIER_LOCKED if tier<L3 或 flag False）。can_generate_hypotheses 首次 True@L3
#     （learning_tier_gate.py:203）。

[[capability]]
capability_id          = "ml_advisory.hypothesize"     # P3b — alpha-bearing；promotion-relevant verdict
enabled                = false                          # FAIL-CLOSED DEFAULT（loader 強制；雙閘之一）
min_tier               = "L3"                           # can_generate_hypotheses 首次 True@L3
tier_capability_flag   = "can_generate_hypotheses"      # 綁 L3 flag（STEP-2 TIER_LOCKED if flag False）
model_tier             = "cloud_l2"
cloud_model_pref       = "sonnet"
lane                   = "ml_backlog"                   # → LANE_DIRECTION="neutral"（backlog sink；晉升是另一 expand/MANUAL lane）
output_schema_ref      = "ml_advisory.v1"               # 三模式共用 schema（mode 欄驅動子物件）
prompt_contract_ref    = "ml_advisory.hypothesize.v2"   # → contract registry（P4：結構化 falsification 三欄 + primary_axis；v1 保留供 D3 血緣）
out_of_bound_guard_ref = "ml_advisory.guard.v1"         # → guard registry（擴 empty-mechanism clause）
novelty_gate           = true                           # hypothesis → novelty dedupe vs dead_failure_modes
consequential_default  = false

[capability.trigger]
kind          = "event"
spec          = "ml:training_complete"
debounce_secs = 900                                     # §F.1 trailing-edge settle

[capability.budget]
per_call_usd_cap = 0.50
daily_usd_cap    = 0.50                                 # ≤ DOC-08 $2/day
tier_gated_spend = true

# ── capability stanza 範本（P3 才填；保留為文件，loader 不解析註解）──
# [[capability]]
# capability_id        = "ml_advisory"        # 穩定 key（P3 首個 capability）
# enabled              = false                # master off-switch — FAIL-CLOSED DEFAULT（全 caps）
# min_tier             = "L1"                 # LearningTier 門檻（map 到 can_*()）
# tier_capability_flag = ""                   # 可選：綁某 TierCapabilities.can_* flag（空=不綁）
# model_tier           = "cloud_l2"           # local_sentinel | ollama | cloud_l2
# cloud_model_pref     = "sonnet"             # 僅 model_tier=cloud_l2 時用
# lane                 = "research"           # 必在 LANE_DIRECTION keys（無 "live"）
# output_schema_ref    = "ml_advisory.v1"     # → contract registry
# prompt_contract_ref  = "ml_advisory.v1"     # → contract registry（確定性模板）
# out_of_bound_guard_ref = "ml_advisory.guard.v1"
# novelty_gate         = true
# consequential_default = false               # → D3 ledger consequential_at_creation
# quality_metric_ref   = "ml_advisory.metric.v1"  # → §O（P5）
#
# [capability.trigger]
# kind          = "event"                     # event | schedule | manual | threshold
# spec          = "ml:training_complete"
# debounce_secs = 900                         # §F.1 trailing-edge settle window
# dedup_key     = "capability_id+spec+coarse_subject"
#
# [capability.budget]
# per_call_usd_cap = 0.50
# daily_usd_cap    = 1.00                      # ≤ DOC-08 $2/day（budget_config.toml）unless rule-raised
# tier_gated_spend = true
