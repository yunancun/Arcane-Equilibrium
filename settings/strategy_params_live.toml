# Per-Engine Strategy Parameters — Live (3E-9 / BLOCKER-8)
# 每引擎策略參數 — 實盤
#
# Live = conservative. Operator adjusts after promotion pipeline graduation.
# 實盤 = 保守。策略經放權管線畢業後由 Operator 調整。
#
# OC-5: FundingArb available but conservative for live.
# OC-5：FundingArb 可用但 live 保守設定。

[ma_crossover]
active = true
cooldown_ms = 600000
adx_threshold = 25.0
regime_filter_enabled = true
higher_tf_alpha = 0.003
min_persistence_ms = 240000
conf_scale = 1.0
# LIVE-DEMO-MAKER-FIX (2026-04-29): current live pipeline writes live_demo fills
# against Bybit Demo, not real funds. Align MA entry execution with demo so the
# second exchange pipeline stops paying taker fees while net edge is measured.
# Before binding this file to real mainnet funds, re-check operator acceptance
# criteria and live execution policy.
# LIVE-DEMO-MAKER-FIX（2026-04-29）：目前 live pipeline 產生 live_demo fills，
# 對接 Bybit Demo，非真實資金。MA 入場執行需與 demo 對齊，避免第二條
# exchange pipeline 繼續付 taker fee；若未來此檔綁到真實主網，需重新檢查
# operator acceptance criteria 與 live execution policy。
use_maker_entry = true
maker_price_offset_bps = 1.0
maker_limit_timeout_ms = 45000
maker_price_buffer_ticks = 0
min_trend_snr = 0.75

[bb_reversion]
active = true
cooldown_ms = 600000
use_limit = false
limit_offset_bps = 10.0
conf_scale = 1.0

[bb_breakout]
# G2-06 (2026-04-26): permanently disabled — 7d 0 fills + 1m bandwidth mis-scale
# confirmed (P1-11 F1). Re-enable requires PA RFC + 5m timeframe upgrade.
# G2-06 (2026-04-26): 永久停用 — 7d 0 fills + 1m bandwidth 結構性錯配
# 確認（P1-11 F1）。重啟需 PA RFC + 升 5m timeframe。
active = false
cooldown_ms = 600000
squeeze_bw = 0.02
expansion_bw = 0.04
volume_threshold = 1.5
trailing_stop_atr_mult = 2.0
conf_scale = 1.0
# EDGE-P2-2: Open Interest confluence signal — experimental, default off.
# Live conservative: must stay false until demo validates positive edge.
# EDGE-P2-2：OI 合流信號（實驗性，預設關）。Live 保守：demo 驗證後再評估開啟。
enable_oi_signal = false
oi_buffer_window_ms = 60000   # rolling window for OI-delta, validated [1000, 600000] / OI 差分滾動窗口，校驗 [1000, 600000]
oi_confluence_bonus = 0.10    # ± bonus applied to confluence score, |value| ≤ 0.5 / 合流加成（±），|value| ≤ 0.5
oi_min_delta_pct = 0.0        # FUP #3: noise floor for |oi_delta_pct|, 0.0 = pre-FUP behaviour / 噪音地板（0.0 = 維持 FUP 前行為）
# EDGE-P2-3 Phase 2+: live stays on Market (root principle #6). Flip to true
# only after demo validation shows positive net edge with maker fills.
# EDGE-P2-3 Phase 2+：live 維持 Market（根原則 #6）；demo 驗證正 edge 後再評估啟用。
use_maker_entry = false
maker_price_offset_bps = 1.0
maker_limit_timeout_ms = 45000
maker_price_buffer_ticks = 0

[grid_trading]
active = true
# P1-10 AUDIT 2026-04-20: explicit cooldown surfaces the serde default that was
# previously silent (E5-P2-4 "TOML 不可達漏洞" hygiene follow-up). Matches demo/paper.
cooldown_ms = 180000
# GRID-LIFECYCLE-DRIFT RFC (2026-04-29): live_demo showed grid close churn
# (`strategy_close:grid_close_*`) with re_entry_rate=0.72. Reduce level density
# first; keep strategy active and close/reduce paths untouched.
# GRID-LIFECYCLE-DRIFT RFC：live_demo 出現 grid close churn，先降低網格密度；
# 保留策略啟用與平倉 / 減倉路徑。
grid_levels = 5
spacing_mode = "linear"
health_check_interval = 200
max_out_of_range = 50
conf_scale = 1.0
# LIVE-DEMO-MAKER-FIX (2026-04-29): current live pipeline writes live_demo fills
# against Bybit Demo, not real funds. Enable entry-only PostOnly Limit here too
# so the second exchange pipeline stops paying taker fees while demo validates.
# Before binding this file to real mainnet funds, re-check operator acceptance
# criteria and live execution policy.
# LIVE-DEMO-MAKER-FIX（2026-04-29）：目前 live pipeline 產生 live_demo fills，
# 對接 Bybit Demo，非真實資金。此處也啟用入場 PostOnly Limit，避免第二條
# exchange pipeline 繼續付 taker fee；若未來此檔綁到真實主網，需重新檢查
# operator acceptance criteria 與 live execution policy。
use_maker_entry = true
maker_price_offset_bps = 1.0
maker_price_buffer_ticks = 0
# EDGE-P2-3 Phase 1B-3.1: resting PostOnly Limit sweep timeout (ms).
# EDGE-P2-3 Phase 1B-3.1：掛中 PostOnly Limit 逾時清理（毫秒）。
maker_limit_timeout_ms = 45000
reject_cooldown_ms = 120000
min_grid_step_bps = 22.0
cost_floor_multiplier = 2.0
# GRID-LIFECYCLE-DRIFT RFC (2026-04-29): mirror demo's robust-negative cells
# (n>=30, shrunk_bps<0) into live_demo. This blocks NEW grid entries only;
# existing positions can still close/reduce normally.
# GRID-LIFECYCLE-DRIFT RFC：同步 demo robust-negative cells 到 live_demo；
# 僅阻擋新 grid 入場，既有倉位仍可平倉 / 減倉。
blocked_symbols = [
  "BSBUSDT",
  "PRLUSDT",
  "ZBTUSDT",
  "FARTCOINUSDT",
  "SOLUSDT",
  "DOGEUSDT",
  "GALAUSDT",
  "ENAUSDT",
  "AAVEUSDT",
  "ORCAUSDT",
  "PENGUUSDT",
  "NAORISUSDT",
  "TAOUSDT",
  "1000PEPEUSDT",
  "ADAUSDT",
]

# OC-5: FundingArb — disabled across paper/demo/live until funding-capture
# redesign lands. Keep params aligned so a future re-enable is explicit.
# OC-5：FundingArb 三端統一關閉，待 funding-capture 重設計落地後才重啟。
[funding_arb]
active = false
cooldown_ms = 3600000
total_cost_bps = 34.0
expected_periods = 3.0
funding_threshold = 0.0005
max_basis_pct = 0.5
max_hold_ms = 259200000
