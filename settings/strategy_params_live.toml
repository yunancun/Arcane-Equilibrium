# Per-Engine Strategy Parameters — Live (3E-9 / BLOCKER-8)
# 每引擎策略參數 — 實盤
#
# Live = conservative. Operator adjusts after promotion pipeline graduation.
# 實盤 = 保守。策略經放權管線畢業後由 Operator 調整。
#
# OC-5: FundingArb available but conservative for live.
# OC-5：FundingArb 可用但 live 保守設定。

[ma_crossover]
active = true
cooldown_ms = 300000
adx_threshold = 20.0
regime_filter_enabled = true
higher_tf_alpha = 0.003
conf_scale = 1.0

[bb_reversion]
active = true
cooldown_ms = 600000
use_limit = false
limit_offset_bps = 10.0
conf_scale = 1.0

[bb_breakout]
active = true
cooldown_ms = 600000
squeeze_bw = 0.02
expansion_bw = 0.04
volume_threshold = 1.5
trailing_stop_atr_mult = 2.0
conf_scale = 1.0

[grid_trading]
active = true
# P1-10 AUDIT 2026-04-20: explicit cooldown surfaces the serde default that was
# previously silent (E5-P2-4 "TOML 不可達漏洞" hygiene follow-up). Matches demo/paper.
cooldown_ms = 60000
grid_levels = 10
spacing_mode = "linear"
health_check_interval = 200
max_out_of_range = 50
conf_scale = 1.0

# OC-5: FundingArb — inactive for live until paper/demo validated.
# OC-5：FundingArb — live 暫不啟用，待紙盤/模擬盤驗證通過。
[funding_arb]
active = false
cooldown_ms = 3600000
total_cost_bps = 34.0
expected_periods = 3.0
funding_threshold = 0.001
max_basis_pct = 0.3
max_hold_ms = 259200000
