# Per-Engine Strategy Parameters — Live (3E-9 / BLOCKER-8)
# 每引擎策略參數 — 實盤
#
# Live = conservative. Operator adjusts after promotion pipeline graduation.
# 實盤 = 保守。策略經放權管線畢業後由 Operator 調整。
#
# OC-5: FundingArb available but conservative for live.
# OC-5：FundingArb 可用但 live 保守設定。

[ma_crossover]
active = true
cooldown_ms = 300000
adx_threshold = 20.0
regime_filter_enabled = true
higher_tf_alpha = 0.003
conf_scale = 1.0
# EDGE-P2-3 Phase 2+: live stays on Market (root principle #6). Flip to true
# after demo validates positive net edge.
# EDGE-P2-3 Phase 2+：live 維持 Market（根原則 #6）。
use_maker_entry = false
maker_price_offset_bps = 1.0
maker_limit_timeout_ms = 45000

[bb_reversion]
active = true
cooldown_ms = 600000
use_limit = false
limit_offset_bps = 10.0
conf_scale = 1.0

[bb_breakout]
active = true
cooldown_ms = 600000
squeeze_bw = 0.02
expansion_bw = 0.04
volume_threshold = 1.5
trailing_stop_atr_mult = 2.0
conf_scale = 1.0
# EDGE-P2-2: Open Interest confluence signal — experimental, default off.
# Live conservative: must stay false until demo validates positive edge.
# EDGE-P2-2：OI 合流信號（實驗性，預設關）。Live 保守：demo 驗證後再評估開啟。
enable_oi_signal = false
oi_buffer_window_ms = 60000   # rolling window for OI-delta, validated [1000, 600000] / OI 差分滾動窗口，校驗 [1000, 600000]
oi_confluence_bonus = 0.10    # ± bonus applied to confluence score, |value| ≤ 0.5 / 合流加成（±），|value| ≤ 0.5
oi_min_delta_pct = 0.0        # FUP #3: noise floor for |oi_delta_pct|, 0.0 = pre-FUP behaviour / 噪音地板（0.0 = 維持 FUP 前行為）

[grid_trading]
active = true
# P1-10 AUDIT 2026-04-20: explicit cooldown surfaces the serde default that was
# previously silent (E5-P2-4 "TOML 不可達漏洞" hygiene follow-up). Matches demo/paper.
cooldown_ms = 60000
grid_levels = 10
spacing_mode = "linear"
health_check_interval = 200
max_out_of_range = 50
conf_scale = 1.0
# EDGE-P2-3 Phase 1a (2026-04-20): live stays on Market entries (conservative,
# root principle #6). Flip to `true` only after demo validation produces positive
# net edge with maker fills. Reject/timeout handling lands in Phase 1b before
# any live opt-in.
# EDGE-P2-3 Phase 1a：live 維持 Market（根原則 #6 保守）。待 demo 驗證出正 net edge
# 且 Phase 1b 拒絕/超時處理完成後再評估開啟。
use_maker_entry = false
maker_price_offset_bps = 1.0
# EDGE-P2-3 Phase 1B-3.1: resting PostOnly Limit sweep timeout (ms).
# Plumbed for live TOML parity even though use_maker_entry=false means
# no PostOnly submits happen in live today; prevents schema drift between envs.
# EDGE-P2-3 Phase 1B-3.1：掛中 PostOnly Limit 逾時清理（毫秒）。
# live 目前 use_maker_entry=false 不會實際發 PostOnly，但同步設定避免環境配置漂移。
maker_limit_timeout_ms = 45000

# OC-5: FundingArb — inactive for live until paper/demo validated.
# OC-5：FundingArb — live 暫不啟用，待紙盤/模擬盤驗證通過。
[funding_arb]
active = false
cooldown_ms = 3600000
total_cost_bps = 34.0
expected_periods = 3.0
funding_threshold = 0.001
max_basis_pct = 0.3
max_hold_ms = 259200000
