# 三端統一關閉，待重做結算窗口 + maker 入場後再議。
[funding_arb]
active = false
cooldown_ms = 3600000
total_cost_bps = 34.0
expected_periods = 3.0
funding_threshold = 0.0005
max_basis_pct = 0.5
max_hold_ms = 259200000
