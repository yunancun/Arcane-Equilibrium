# Per-Engine Strategy Parameters — Demo (3E-9 / BLOCKER-8)
# 每引擎策略參數 — 模擬盤
#
# Demo = validation before live. Same strategies, slightly tighter parameters.
# 模擬盤 = Live 前驗證。相同策略，參數稍微收緊。

[ma_crossover]
active = true
cooldown_ms = 600000
adx_threshold = 25.0
regime_filter_enabled = true
higher_tf_alpha = 0.003
min_persistence_ms = 240000
conf_scale = 1.0
# EDGE-P2-3 Phase 2+ (2026-04-20): PostOnly Limit entries; entry-only scope
# (close stays Market). Demo enabled first for validation.
# EDGE-P2-3 Phase 2+：入場改 PostOnly Limit；平倉維持 Market。Demo 先驗證。
use_maker_entry = true
maker_price_offset_bps = 1.0
maker_limit_timeout_ms = 45000
maker_price_buffer_ticks = 0
min_trend_snr = 0.75

[bb_reversion]
active = true
cooldown_ms = 600000
use_limit = false
limit_offset_bps = 10.0
conf_scale = 1.0

[bb_breakout]
# G2-06 (2026-04-26): permanently disabled — 7d 0 fills + 1m bandwidth mis-scale
# confirmed (P1-11 F1). Re-enable requires PA RFC + 5m timeframe upgrade.
# G2-06 (2026-04-26): 永久停用 — 7d 0 fills + 1m bandwidth 結構性錯配
# 確認（P1-11 F1）。重啟需 PA RFC + 升 5m timeframe。
#
# EDGE-DIAG-2 (2026-04-28): operator override of G2-06 — re-enable on demo only
# (live stays false in strategy_params_live.toml). Rationale: ML / agent layer
# needs *some* historical data per strategy when it comes online; a permanently
# disabled strategy = permanent blind spot in the learning pipeline.
#
# EDGE-DIAG-2B (2026-04-29): apply the demo-only rescue gate from the 2026-04-24
# threshold sweep. The old 1m family (squeeze 0.02/0.03, expansion 0.04) is
# structurally unreachable in current 1m bandwidth distribution; use the observed
# 1m band and soften Donchian so demo can produce validation samples. Live remains
# active=false until fresh demo fills show positive post-cutoff edge.
# EDGE-DIAG-2C (2026-04-29): fresh 14d 1m sweep around the rescue band kept
# squeeze=0.0015/expansion=0.005 and raised volume_threshold 1.0→1.2. Among
# n>=50 combos this was the best fwd30_mean (n=71, +5.33bps raw signal-level
# 30m; not statistically promotable, but cleaner than 1.0/1.1 and still non-dormant).
# EDGE-DIAG-2（2026-04-28）：operator 覆蓋 G2-06 — 僅 demo 重啟
# （live 仍 false）。理由：ML / agent 上線時每個策略都需要歷史資料；永久 disable
# = learning pipeline 永久盲區。
# EDGE-DIAG-2B（2026-04-29）：套用 demo-only rescue gate。舊 1m 閾值組
# （squeeze 0.02/0.03、expansion 0.04）在當前 1m bandwidth 分佈不可達；
# 改用 sweep 觀測到的 1m 區間並軟化 Donchian，先讓 demo 累積驗證樣本。
# W-AUDIT-6 (2026-05-09): 1m rescue is retired. bb_breakout now consumes the
# real 5m indicator snapshot; missing 5m warmup skips rather than falling back
# to 1m. Live remains inactive until demo 5m evidence is net-positive.
active = true
signal_timeframe = "5m"
cooldown_ms = 600000
squeeze_bw = 0.02
expansion_bw = 0.04
volume_threshold = 1.5
trailing_stop_atr_mult = 2.0
min_persistence_ms = 300000
confluence_as_gate = false
donchian_mode = "score"
donchian_score_bonus = 0.15
conf_scale = 1.0
# EDGE-P2-2: Open Interest confluence signal — experimental, default off.
# Rising OI + long (or falling OI + short) adds `oi_confluence_bonus` to the
# confluence score; opposite direction subtracts it. `oi_buffer_window_ms` is
# the rolling window for OI-delta. Flag default = false so bb_breakout behaviour
# is bit-identical to pre-EDGE-P2-2 baseline.
# EDGE-P2-2：OI 合流信號（實驗性，預設關）。同向加 bonus，背離扣 bonus。
# 預設 false → 行為與舊基線 bit-identical。
enable_oi_signal = false
oi_buffer_window_ms = 60000   # rolling window for OI-delta, validated [1000, 600000] / OI 差分滾動窗口，校驗 [1000, 600000]
oi_confluence_bonus = 0.10    # ± bonus applied to confluence score, |value| ≤ 0.5 / 合流加成（±），|value| ≤ 0.5
oi_min_delta_pct = 0.0        # FUP #3: noise floor for |oi_delta_pct|, 0.0 = pre-FUP behaviour / 噪音地板（0.0 = 維持 FUP 前行為）
# EDGE-P2-3 Phase 2+ (2026-04-20): PostOnly Limit entries cut per-side fee
# taker ~5.5 bps -> maker ~2 bps. Same scope rules as grid_trading Phase 1A —
# entry-only, close stays Market. Demo enabled first for validation.
# EDGE-P2-3 Phase 2+：入場改發 PostOnly Limit，單邊費率 taker→maker；平倉維持 Market。
use_maker_entry = true
maker_price_offset_bps = 1.0
maker_limit_timeout_ms = 45000
maker_price_buffer_ticks = 0

[grid_trading]
active = true
# P1-10 AUDIT 2026-04-20: explicit cooldown surfaces the serde default that was
# previously silent (E5-P2-4 "TOML 不可達漏洞" hygiene follow-up). A3 trend-adaptive
# boost multiplies this base 1x-6x in trending regimes (observed demo BLURUSDT
# entry min-gap 120s = 60s × 2x, p10 123.7s → cooldown respected, P1-10 grid
# negative edge is per-trade fee drag not cadence).
cooldown_ms = 180000
grid_levels = 7
spacing_mode = "linear"
health_check_interval = 200
max_out_of_range = 50
conf_scale = 1.0
# EDGE-P2-3 Phase 1a (2026-04-20): PostOnly Limit entries cut per-side fee
# from taker ~5.5 bps → maker ~2 bps, targeting P1-10 grid fee-drag root cause.
# Close path stays Market (entry-only scope). Demo enabled first for validation.
# EDGE-P2-3 Phase 1a：入場改發 PostOnly Limit，單邊費率 taker→maker，
# 針對 P1-10 grid 手續費拖累問題；平倉維持 Market。Demo 先啟用驗證。
use_maker_entry = true
maker_price_offset_bps = 1.0
maker_price_buffer_ticks = 0
# EDGE-P2-3 Phase 1B-3.1: resting PostOnly Limit sweep timeout (ms).
# Default 45_000 ms; runtime clamped to [15_000, 300_000].
# EDGE-P2-3 Phase 1B-3.1：掛中 PostOnly Limit 逾時清理（毫秒）。
# 默認 45_000 ms；運行時 clamp 到 [15_000, 300_000]。
maker_limit_timeout_ms = 45000
reject_cooldown_ms = 120000
min_grid_step_bps = 22.0
cost_floor_multiplier = 2.0
# G2-04 2026-04-29: robust negative grid cells (n>=30, shrunk_bps<0) from
# settings/edge_estimates.json. New grid entries are disabled for these symbols
# while close/reduce paths remain enabled.
# P1-DATA-1 2026-05-08: LABUSDT added from [40] combined demo/live_demo negative
# cell (grid_trading/LABUSDT n=17 avg=-78.76bps).
# W-AUDIT-6 2026-05-09 post-rebuild [40]: BILLUSDT added from combined
# demo/live_demo negative cell (grid_trading/BILLUSDT n=11 avg=-49.67bps).
# G2-04：robust negative grid cell 暫停新 grid 入場；平倉/減倉仍正常。
blocked_symbols = [
  "BSBUSDT",
  "PRLUSDT",
  "ZBTUSDT",
  "FARTCOINUSDT",
  "SOLUSDT",
  "DOGEUSDT",
  "GALAUSDT",
  "ENAUSDT",
  "AAVEUSDT",
  "ORCAUSDT",
  "PENGUUSDT",
  "NAORISUSDT",
  "TAOUSDT",
  "1000PEPEUSDT",
  "ADAUSDT",
  "LABUSDT",
  "BILLUSDT",
]

