# Per-Engine Strategy Parameters — Demo (3E-9 / BLOCKER-8)
# 每引擎策略參數 — 模擬盤
#
# Demo = validation before live. Same strategies, slightly tighter parameters.
# 模擬盤 = Live 前驗證。相同策略，參數稍微收緊。

[ma_crossover]
active = true
cooldown_ms = 300000
adx_threshold = 20.0
regime_filter_enabled = true
higher_tf_alpha = 0.003
conf_scale = 1.0
# EDGE-P2-3 Phase 2+ (2026-04-20): PostOnly Limit entries; entry-only scope
# (close stays Market). Demo enabled first for validation.
# EDGE-P2-3 Phase 2+：入場改 PostOnly Limit；平倉維持 Market。Demo 先驗證。
use_maker_entry = true
maker_price_offset_bps = 1.0
maker_limit_timeout_ms = 45000

[bb_reversion]
active = true
cooldown_ms = 600000
use_limit = false
limit_offset_bps = 10.0
conf_scale = 1.0

[bb_breakout]
active = true
cooldown_ms = 600000
squeeze_bw = 0.02
expansion_bw = 0.04
volume_threshold = 1.5
trailing_stop_atr_mult = 2.0
conf_scale = 1.0
# EDGE-P2-2: Open Interest confluence signal — experimental, default off.
# Rising OI + long (or falling OI + short) adds `oi_confluence_bonus` to the
# confluence score; opposite direction subtracts it. `oi_buffer_window_ms` is
# the rolling window for OI-delta. Flag default = false so bb_breakout behaviour
# is bit-identical to pre-EDGE-P2-2 baseline.
# EDGE-P2-2：OI 合流信號（實驗性，預設關）。同向加 bonus，背離扣 bonus。
# 預設 false → 行為與舊基線 bit-identical。
enable_oi_signal = false
oi_buffer_window_ms = 60000   # rolling window for OI-delta, validated [1000, 600000] / OI 差分滾動窗口，校驗 [1000, 600000]
oi_confluence_bonus = 0.10    # ± bonus applied to confluence score, |value| ≤ 0.5 / 合流加成（±），|value| ≤ 0.5
oi_min_delta_pct = 0.0        # FUP #3: noise floor for |oi_delta_pct|, 0.0 = pre-FUP behaviour / 噪音地板（0.0 = 維持 FUP 前行為）

[grid_trading]
active = true
# P1-10 AUDIT 2026-04-20: explicit cooldown surfaces the serde default that was
# previously silent (E5-P2-4 "TOML 不可達漏洞" hygiene follow-up). A3 trend-adaptive
# boost multiplies this base 1x-6x in trending regimes (observed demo BLURUSDT
# entry min-gap 120s = 60s × 2x, p10 123.7s → cooldown respected, P1-10 grid
# negative edge is per-trade fee drag not cadence).
cooldown_ms = 60000
grid_levels = 10
spacing_mode = "linear"
health_check_interval = 200
max_out_of_range = 50
conf_scale = 1.0
# EDGE-P2-3 Phase 1a (2026-04-20): PostOnly Limit entries cut per-side fee
# from taker ~5.5 bps → maker ~2 bps, targeting P1-10 grid fee-drag root cause.
# Close path stays Market (entry-only scope). Demo enabled first for validation.
# EDGE-P2-3 Phase 1a：入場改發 PostOnly Limit，單邊費率 taker→maker，
# 針對 P1-10 grid 手續費拖累問題；平倉維持 Market。Demo 先啟用驗證。
use_maker_entry = true
maker_price_offset_bps = 1.0
# EDGE-P2-3 Phase 1B-3.1: resting PostOnly Limit sweep timeout (ms).
# Default 45_000 ms; runtime clamped to [15_000, 300_000].
# EDGE-P2-3 Phase 1B-3.1：掛中 PostOnly Limit 逾時清理（毫秒）。
# 默認 45_000 ms；運行時 clamp 到 [15_000, 300_000]。
maker_limit_timeout_ms = 45000

# OC-5: FundingArb — funding rate capture strategy.
# Demo = validation before live, same params as paper.
# OC-5：FundingArb — 資金費率捕獲策略。模擬盤驗證，參數同紙盤。
#
