# Per-Engine Strategy Parameters — Paper (3E-9 / BLOCKER-8)
# 每引擎策略參數 — 紙盤
#
# Paper = maximum exploration. All strategies active, wide parameters.
# 紙盤 = 最大探索空間。所有策略啟用，參數寬鬆。
#
# Agent/Optuna can tune these at runtime via IPC update_strategy_params.
# Agent/Optuna 可通過 IPC update_strategy_params 在運行時調參。

[ma_crossover]
active = true
cooldown_ms = 300000
adx_threshold = 20.0
regime_filter_enabled = true
higher_tf_alpha = 0.003
conf_scale = 1.0

[bb_reversion]
active = true
cooldown_ms = 600000
use_limit = false
limit_offset_bps = 10.0
conf_scale = 1.0

[bb_breakout]
active = true
cooldown_ms = 600000
squeeze_bw = 0.02
expansion_bw = 0.04
volume_threshold = 1.5
trailing_stop_atr_mult = 2.0
conf_scale = 1.0

[grid_trading]
active = true
grid_levels = 10
spacing_mode = "linear"
health_check_interval = 200
max_out_of_range = 50
conf_scale = 1.0

# OC-5: FundingArb — funding rate capture strategy.
# Paper = exploration, activated for signal validation.
# OC-5：FundingArb — 資金費率捕獲策略。紙盤啟用以驗證信號。
#
# G-2 VALIDATION WINDOW（2026-04-14 啟動）：
#   funding_threshold 臨時 0.0005→0.0001（降 5 倍）
#   total_cost_bps   臨時 34.0→1.0（讓 amortized_fee≈0.0000033 不再阻斷 edge gate）
# 目的：calm market 下強制觸發幾筆 fills 驗證 OC-5 代碼路徑（entry/direction/exit/close_tag/PnL）
# 污染範圍：edge_estimates_paper.json 會記錄低質量 fills，驗證後需恢復默認並清理
# 恢復條件：≥20 funding_arb fills 累積後，兩個參數恢復 0.0005 / 34.0
# G-2 VALIDATION WINDOW (2026-04-14): both funding_threshold AND total_cost_bps
# lowered. edge_estimates_paper.json contamination; revert + cleanup required.
[funding_arb]
active = true
cooldown_ms = 3600000
total_cost_bps = 1.0
expected_periods = 3.0
funding_threshold = 0.0001
max_basis_pct = 0.5
max_hold_ms = 259200000
