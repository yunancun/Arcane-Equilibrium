# Per-Engine Strategy Parameters — Paper (3E-9 / BLOCKER-8)
# 每引擎策略參數 — 紙盤
#
# Paper = maximum exploration. All strategies active, wide parameters.
# 紙盤 = 最大探索空間。所有策略啟用，參數寬鬆。
#
# Agent/Optuna can tune these at runtime via IPC update_strategy_params.
# Agent/Optuna 可通過 IPC update_strategy_params 在運行時調參。

[ma_crossover]
active = true
cooldown_ms = 300000
adx_threshold = 20.0
regime_filter_enabled = true
higher_tf_alpha = 0.003
conf_scale = 1.0
# EDGE-P2-3 Phase 2+: mirrors demo so paper exploration matches target fee profile.
# EDGE-P2-3 Phase 2+：與 demo 對齊。
use_maker_entry = true
maker_price_offset_bps = 1.0
maker_limit_timeout_ms = 45000

[bb_reversion]
active = true
cooldown_ms = 600000
use_limit = false
limit_offset_bps = 10.0
conf_scale = 1.0

[bb_breakout]
active = true
cooldown_ms = 600000
squeeze_bw = 0.02
expansion_bw = 0.04
volume_threshold = 1.5
trailing_stop_atr_mult = 2.0
conf_scale = 1.0
# EDGE-P2-2: Open Interest confluence signal — experimental, default off.
# Flag default = false so bb_breakout behaviour is bit-identical to baseline.
# EDGE-P2-2：OI 合流信號（實驗性，預設關）。
enable_oi_signal = false
oi_buffer_window_ms = 60000   # rolling window for OI-delta, validated [1000, 600000] / OI 差分滾動窗口，校驗 [1000, 600000]
oi_confluence_bonus = 0.10    # ± bonus applied to confluence score, |value| ≤ 0.5 / 合流加成（±），|value| ≤ 0.5
oi_min_delta_pct = 0.0        # FUP #3: noise floor for |oi_delta_pct|, 0.0 = pre-FUP behaviour / 噪音地板（0.0 = 維持 FUP 前行為）
# EDGE-P2-3 Phase 2+: mirrors demo so paper exploration matches live-target fee profile.
# EDGE-P2-3 Phase 2+：與 demo 對齊，保持紙盤探索費率代表性。
use_maker_entry = true
maker_price_offset_bps = 1.0
maker_limit_timeout_ms = 45000

[grid_trading]
active = true
# P1-10 AUDIT 2026-04-20: explicit cooldown surfaces the serde default that was
# previously silent (E5-P2-4 "TOML 不可達漏洞" hygiene follow-up). Matches demo/live.
cooldown_ms = 60000
grid_levels = 10
spacing_mode = "linear"
health_check_interval = 200
max_out_of_range = 50
conf_scale = 1.0
# EDGE-P2-3 Phase 1a (2026-04-20): PostOnly Limit entries; mirrors demo so paper
# exploration stays representative of live-target fee profile.
# EDGE-P2-3 Phase 1a：PostOnly Limit 入場；與 demo 對齊以保持紙盤探索費率代表性。
use_maker_entry = true
maker_price_offset_bps = 1.0
# EDGE-P2-3 Phase 1B-3.1: resting PostOnly Limit sweep timeout (ms).
# Default 45_000 ms; runtime clamped to [15_000, 300_000].
# EDGE-P2-3 Phase 1B-3.1：掛中 PostOnly Limit 逾時清理（毫秒）。
# 默認 45_000 ms；運行時 clamp 到 [15_000, 300_000]。
maker_limit_timeout_ms = 45000

# OC-5: FundingArb — funding rate capture strategy.
# Paper = exploration, activated for signal validation.
# OC-5：FundingArb — 資金費率捕獲策略。紙盤啟用以驗證信號。
#
# G-2 VALIDATION COMPLETE（2026-04-14）：21 paper fills 累積後恢復默認參數。
# 污染窗口：2026-04-14 17:33 ~ 21:32；edge_estimates_paper.json 此窗口 funding_arb 數據需排除。
# G-2 VALIDATION COMPLETE (2026-04-14): reverted to defaults after 21 paper fills.
[funding_arb]
active = true
cooldown_ms = 3600000
total_cost_bps = 34.0
expected_periods = 3.0
funding_threshold = 0.0005
max_basis_pct = 0.5
max_hold_ms = 259200000
