[meta]
version = 1
saved_ts_ms = 0

[limits]
stop_loss_max_pct = 20.0
take_profit_max_pct = 20.0
take_profit_enforced = false
position_size_max_pct = 15.0
total_exposure_max_pct = 100.0
correlated_exposure_max_pct = 60.0
leverage_max = 9.9
session_drawdown_max_pct = 10.0
daily_loss_max_pct = 10.0
consec_loss_cooldown_count = 3
consec_loss_cooldown_min = 30
holding_hours_max = 76.0
open_positions_max = 25
min_order_notional_usdt = 0.0
max_order_notional_usdt = 0.0
min_balance_usdt = 0.0
allowed_categories = ["spot", "linear", "inverse"]
margin_mode = "isolated"
position_mode = "one_way"
guardian_modification_size_factor = 0.5
guardian_modification_leverage_cap = 2.0
per_trade_risk_pct = 0.1

[overrides]

[per_strategy]

[per_strategy.ma_crossover]
enabled = true
blocked_symbols = [
  "NAORISUSDT",
  "PENGUUSDT",
  "FARTCOINUSDT",
]

[agent]
trailing_enabled = true
trailing_activation_pct = 1.0
trailing_distance_pct = 3.0
size_multiplier = 1.0
prefer_limit = true
reduce_only_close = true
post_only_limit = false
partial_tp_enabled = false
partial_tp_levels = []

[agent.category_weights]

[cascade]
drawdown_cautious_pct = 5.0
drawdown_reduced_pct = 8.0
drawdown_defensive_pct = 12.0
drawdown_circuit_pct = 15.0
daily_loss_cautious_pct = 2.0
daily_loss_reduced_pct = 3.5
daily_loss_circuit_pct = 5.0
consec_loss_cautious = 3
consec_loss_reduced = 5
consec_loss_circuit = 10
pressure_cautious = 0.3
pressure_reduced = 0.5
pressure_defensive = 0.7
pressure_circuit = 0.9
min_hold_ms = 300000

[regime.trending]
stop = 1.0
tp = 1.5
time = 1.5

[regime.volatile]
stop = 1.5
tp = 0.8
time = 0.8

[regime.ranging]
stop = 0.7
tp = 0.7
time = 0.8

[regime.squeeze]
stop = 0.6
tp = 0.5
time = 1.0

[regime.unknown]
stop = 1.0
tp = 1.0
time = 1.0

[cost_gate]
min_confidence = 0.15
k_base = 1.5
k_medium = 2.0
k_small = 3.0
adx_trending = 25.0

[dynamic_stop]
base_ratio = 0.6
cap_ratio = 0.8
trailing_min_rr = 0.5
atr_stop_mult = 2.0
atr_tp_mult = 3.0

[market_gate]
min_ob_depth_usdt = 50000.0
max_ob_imbalance = 0.7
min_volume_24h_usdt = 1000000.0
max_taker_fee_bps = 8.0
spread_max_bps = 20.0
slippage_max_bps = 15.0
funding_rate_max_abs = 0.03
liquidation_buffer_pct = 20.0
max_orders_per_minute = 60

[anti_cluster]
offset_fraction = 0.15
max_same_direction = 5

[correlation]
max_pairwise_r = 0.7
window_minutes = 60

[runtime]
boot_cooldown_ms = 60000
signals_heartbeat_ms = 60000
h0_shadow_mode = true

[experimental.flags]

# G7-07 (2026-04-24): cost-gate slippage tiers + win-rate weighting knobs.
# Defaults below mirror pre-G7-07 SLIPPAGE_TIERS / DEFAULT_SLIPPAGE_RATE / 0.3
# / 1.3 hardcoded constants exactly. Operators may tune live without rebuild.
# G7-07：成本門滑點分級 + 勝率加權 knob；以下為 G7-07 前硬編預設，可熱重載。
[slippage]
default_rate = 0.0005           # 5 bps fallback when volume_24h <= 0
cost_gate_win_rate_floor = 0.3  # max(floor, win_rate) clamp in cost gates
cost_gate_safety_multiplier = 1.3  # 30 % safety buffer on threshold

[[slippage.tiers]]
min_turnover_usd = 1_000_000_000.0
rate = 0.0001                   # >$1B: 1 bps (BTC/ETH)

[[slippage.tiers]]
min_turnover_usd = 100_000_000.0
rate = 0.0002                   # >$100M: 2 bps

[[slippage.tiers]]
min_turnover_usd = 10_000_000.0
rate = 0.0005                   # >$10M: 5 bps

[[slippage.tiers]]
min_turnover_usd = 1_000_000.0
rate = 0.0015                   # >$1M: 15 bps

[[slippage.tiers]]
min_turnover_usd = 0.0
rate = 0.0030                   # <$1M: 30 bps (illiquid alts)
