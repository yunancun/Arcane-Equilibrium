# Paper Engine Risk Config — Maximum Agent Exploration
# 紙盤引擎風控配置 — 最大 Agent 探索自由度
#
# Design intent / 設計意圖:
#   P1 (limits): Very wide ceilings — emergency backstop only.
#                硬上限極寬，僅作緊急兜底。
#   P2 (dynamic_stop): base_ratio=0.30, cap_ratio=0.95 →
#     agent real working stop range ~9%–54% of account.
#     Agent 有效止損範圍約 9%–54%（含 regime×anti-cluster）。
#   cascade: Very tolerant — let agent explore deep drawdowns before halting.
#            高容忍，讓 Agent 在熔斷前充分探索。
#   h0_shadow_mode=true: H0 gate logs decisions but never blocks.
#                        H0 gate 純觀察，不阻擋交易。
# GUI / IPC patch_risk_config can override any field at runtime.
# GUI / IPC patch_risk_config 可在運行時覆蓋任何欄位。

[meta]
version = 2
saved_ts_ms = 0

[limits]
stop_loss_max_pct = 50.0          # P1 backstop; P2 dynamic stop caps at ~47.5%
take_profit_max_pct = 30.0
take_profit_enforced = false
position_size_max_pct = 50.0
total_exposure_max_pct = 200.0
correlated_exposure_max_pct = 80.0
leverage_max = 100.0
session_drawdown_max_pct = 50.0
daily_loss_max_pct = 30.0
consec_loss_cooldown_count = 5
consec_loss_cooldown_min = 3
holding_hours_max = 720.0
open_positions_max = 25
min_order_notional_usdt = 0.0
max_order_notional_usdt = 0.0
min_balance_usdt = 0.0
allowed_categories = ["spot", "linear", "inverse"]
margin_mode = "isolated"
position_mode = "one_way"
guardian_modification_size_factor = 0.5
guardian_modification_leverage_cap = 2.0
per_trade_risk_pct = 0.20
# P0-ENGINE-HALTSESSION-STUCK-FIX (2026-05-19)
# 與 demo 一致：daily_loss=24h / drawdown=0 sticky；
# paper 預設 dormant（OPENCLAW_ENABLE_PAPER=0），future re-enable 沿用 demo 政策。
# P0-ENGINE-HALTSESSION-STUCK-FIX（2026-05-19）：halt TTL（ms）。
daily_loss_halt_ttl_ms = 86400000
drawdown_halt_ttl_ms = 0

[overrides]

[per_strategy]

# ─────────────────────────────────────────────────────────────────────────────
# G2-03 (2026-04-26) — ma_crossover SL/TP per-strategy override schema (Option B2).
# Schema landed per PA RFC `2026-04-26--g2_03_option_b_rfc.md` § 2.4 + § 6.T3.
# W-AUDIT-6 (2026-05-09) binds ma_crossover R:R values here after the
# AMD-2026-05-09-02 strategy verdict: TP enforcement is per-strategy, not global.
#
# Defense (PA RFC § 3.1):
#   A. RiskConfig::validate() rejects override > limits at IPC patch / TOML reload
#   B. risk_checks runtime cap clamps any survivor at limits (effective_*_max_pct)
#   C. counterfactual_calibrator dry-run rejects before write (offline)
#
# Per memory `feedback_env_config_independence` — four risk TOMLs are updated
# explicitly so env drift is visible; future changes still require independent
# operator/QC review per env.
#
# G2-03（2026-04-26）—— ma_crossover SL/TP 每策略覆蓋 schema（Option B2）。
# W-AUDIT-6（2026-05-09）已按 AMD-2026-05-09-02 對 MA R:R 實際落值；
# TP enforcement 僅策略級啟用，避免全局影響 grid / BB。
# ─────────────────────────────────────────────────────────────────────────────
[per_strategy.ma_crossover]
enabled = true
# P1-EDGE-1 2026-05-08: LABUSDT added from ma_crossover combined demo/live_demo
# negative cell (7d n=6 avg=-244.54bps); blocks new entries only.
blocked_symbols = [
  "NAORISUSDT",
  "PENGUUSDT",
  "FARTCOINUSDT",
  "LABUSDT",
]
# W-AUDIT-6 2026-05-09: ma_crossover R:R rewrite. Tighten MA exits through
# per-strategy RiskConfig so TP/trailing changes do not affect grid / BB.
stop_loss_max_pct_override = 2.5
take_profit_max_pct_override = 8.0
take_profit_enforced_override = true
trailing_activation_pct_override = 0.6
trailing_distance_pct_override = 0.4

[agent]
trailing_enabled = true
trailing_activation_pct = 0.5
trailing_distance_pct = 2.0
size_multiplier = 1.0
prefer_limit = true
reduce_only_close = true
post_only_limit = false
partial_tp_enabled = false
partial_tp_levels = []

[agent.category_weights]

# Cascade: fire very late — agent needs room to explore
# 熔斷極晚觸發，讓 Agent 自由探索
[cascade]
drawdown_cautious_pct = 15.0
drawdown_reduced_pct = 25.0
drawdown_defensive_pct = 35.0
drawdown_circuit_pct = 45.0
daily_loss_cautious_pct = 10.0
daily_loss_reduced_pct = 20.0
daily_loss_circuit_pct = 28.0
consec_loss_cautious = 5
consec_loss_reduced = 8
consec_loss_circuit = 15
pressure_cautious = 0.4
pressure_reduced = 0.6
pressure_defensive = 0.75
pressure_circuit = 0.9
min_hold_ms = 60000

[regime.trending]
stop = 1.0
tp = 1.5
time = 1.5

[regime.volatile]
stop = 1.5
tp = 0.8
time = 0.8

[regime.ranging]
stop = 0.7
tp = 0.7
time = 0.8

[regime.squeeze]
stop = 0.6
tp = 0.5
time = 1.0

[regime.unknown]
stop = 1.0
tp = 1.0
time = 1.0

# Cost gate: very permissive — let agent try low-confidence signals
# 費率門控極寬鬆，允許低信心信號入場
[cost_gate]
min_confidence = 0.05
k_base = 1.0
k_medium = 1.2
k_small = 1.5
adx_trending = 15.0

# Dynamic stop: base=30%×P1=15%, cap=95%×P1=47.5%
# 動態止損：基礎=15%，上限=47.5%（相對帳戶）
[dynamic_stop]
base_ratio = 0.30
cap_ratio = 0.95
trailing_min_rr = 0.2
atr_stop_mult = 2.5
atr_tp_mult = 4.0

# Market gate: minimal filters — allow illiquid / exotic pairs
# 微結構門控極低，允許流動性較低的幣種
[market_gate]
min_ob_depth_usdt = 10000.0
max_ob_imbalance = 0.85
min_volume_24h_usdt = 100000.0
max_taker_fee_bps = 12.0
spread_max_bps = 50.0
slippage_max_bps = 30.0
funding_rate_max_abs = 0.05
liquidation_buffer_pct = 10.0
max_orders_per_minute = 120

[anti_cluster]
offset_fraction = 0.15
max_same_direction = 10

[correlation]
max_pairwise_r = 0.90
window_minutes = 30

# h0_shadow_mode=true: H0 gate observes only, never blocks paper trades
# h0_shadow_mode=true：H0 gate 純觀察，不阻擋紙盤交易
[runtime]
boot_cooldown_ms = 30000
signals_heartbeat_ms = 60000
h0_shadow_mode = true
# AMD-2026-05-15-02 §3 Phase 1b：Paper 不啟用 maker close path。Paper 已於
# PAPER-DISABLE-1 (2026-04-16) 預設停用 spawn (project_paper_pipeline_disabled_by_default)；
# 仍補欄位避免 cold-default drift。即使本行誤填 true，commands.rs:91-103 守衛
# 仍會拒絕。
use_maker_close = false

# DYNAMIC-RISK-1: disabled on paper — paper pipeline drains by default
# (PAPER-DISABLE-1, 2026-04-16); enabling would accumulate no real trades anyway.
# DYNAMIC-RISK-1：paper 預設停用（PAPER-DISABLE-1 後 paper 已 drain，無交易可累積）。
[dynamic_sizing]
enabled = false

# INFRA-PREBUILD-1 Part A (2026-04-23) — Combine Layer shadow mode.
# Paper defaults follow demo: shadow OFF. Flip via hot-reload when observing.
# 詳見 risk_config_demo.toml 的 [exit] 註解說明。
[exit]
shadow_enabled = false

# G7-01 (2026-04-24) — Kelly fractional-tier sample-size boundaries.
# Paper defaults match demo (50 / 200). Paper pipeline is drained by default
# (PAPER-DISABLE-1) so Kelly sizing rarely fires here, but keeping the section
# present preserves three-environment config parity.
# G7-01：Kelly 分層樣本量邊界。Paper 預設與 demo 對齊（50/200），保持三環境配置對稱。
[kelly]
young_threshold = 50
mature_threshold = 200
young_fraction = 0.125
mature_fraction = 0.16666666666666666
established_fraction = 0.25

# W-AUDIT-6 (2026-05-09) — Fast-track held-drop thresholds.
# Paper mirrors demo/live defaults to keep three-environment config parity.
# W-AUDIT-6：Paper 對齊 demo/live 預設，保持三端配置面一致。
[fast_track]
extreme_drop_pct = 15.0
moderate_drop_pct = 5.0
outlier_sigma_threshold = 3.0

# G3-02 Phase A (2026-04-25): ExecutorAgent shadow→live control plane.
# Paper default shadow_mode=true — paper is opt-in via OPENCLAW_ENABLE_PAPER
# env, but the executor flag mirrors live for symmetry.
# G3-02 Phase A：Paper 預設 shadow_mode=true（與 live 對齊保 symmetry）。
[executor]
shadow_mode = true
max_position_pct = 0.05
per_symbol_position_cap = {}

# G7-02 (2026-04-24) — Per-timeframe EWMA Vol lambda decay constants.
# Paper mirrors live/demo with default_lambda = 0.97 (pre-G7-02 hardcoded value).
# Per-timeframe overrides go in [ewma_vol.lambdas] for paper-only experiments
# without polluting live/demo configs (3-env config independence rule).
# G7-02：Paper 與 live/demo 對齊 0.97；per-tf overrides 走獨立路徑保 3-env 隔離。
[ewma_vol]
default_lambda = 0.97
lambdas = {}

# G7-04 (2026-04-24) — CUSUM strategy decay monitor (Phase A: schema only).
# Paper holds the same dormant default `enabled = false` for env symmetry while
# Phase B+ wiring lands; operators may flip paper-side first to validate the
# alarm path on synthetic noise without touching demo/live (3-env independence).
# Numeric defaults match Page/Montgomery convention (0.5σ / 4σ / 30 obs / 0 bps);
# validate() enforces 0 < slack_k < threshold_h, threshold_h ∈ (0, 100],
# min_observations >= 5.
# G7-04：Paper 維持 Phase A 靜默 enabled=false 與 live/demo 對齊；Phase B+ wiring
# 後 paper 可率先翻 true 驗證警報路徑（3-env 隔離保 demo/live 不受污染）。
[cusum]
enabled = false
slack_k = 0.5
threshold_h = 4.0
min_observations = 30
target_return_bps = 0.0

# G7-07 (2026-04-24) — cost-gate slippage tiers + win-rate weighting knobs.
# Replaces pre-G7-07 hardcoded SLIPPAGE_TIERS / DEFAULT_SLIPPAGE_RATE /
# `win_rate.clamp(0.3, 1.0)` / `× 1.3` literals in intent_processor::{mod, gates}.
# Paper mirrors live/demo defaults (bit-identical pre-G7-07 behaviour). Operators
# can pre-flight new tier tables / safety knobs on paper without touching
# demo/live (3-env independence rule).
# G7-07：Paper 預設與 demo/live bit-identical；operator 可先在 paper 試新 tier
# 表 / safety knob，不影響 demo/live（3-env 隔離規則）。
[slippage]
default_rate = 0.0005           # 5 bps fallback when volume_24h <= 0
cost_gate_win_rate_floor = 0.3  # max(floor, win_rate) clamp in cost gates
cost_gate_safety_multiplier = 1.3  # 30 % safety buffer on threshold

[[slippage.tiers]]
min_turnover_usd = 1_000_000_000.0
rate = 0.0001                   # >$1B: 1 bps (BTC/ETH)

[[slippage.tiers]]
min_turnover_usd = 100_000_000.0
rate = 0.0002                   # >$100M: 2 bps

[[slippage.tiers]]
min_turnover_usd = 10_000_000.0
rate = 0.0005                   # >$10M: 5 bps

[[slippage.tiers]]
min_turnover_usd = 1_000_000.0
rate = 0.0015                   # >$1M: 15 bps

[[slippage.tiers]]
min_turnover_usd = 0.0
rate = 0.0030                   # <$1M: 30 bps (illiquid alts)

# G7-06 (2026-04-24) — Grid OU residual-based σ estimator (Phase A: schema only).
# Replaces (in Phase B) the raw-Δx σ path in `grid_helpers::compute_ou_step`
# with a proper residual estimator σ̂ = sqrt(Σ ε² / (n-1)) where ε_t = Δx_t −
# θ̂(μ̂ − x_{t-1}). Phase A: `use_residual_sigma = false` keeps the runtime
# bit-identical to pre-G7-06 behavior. validate() enforces residual_window_size
# ∈ [20, 5000] and fallback_sigma ∈ [0.0, 1.0].
# G7-06：Grid OU 殘差 σ 估計器 schema；Phase A 預設 use_residual_sigma=false
# 保留現行為，Phase B 接 wire 後 operator 才翻 true。
[grid_ou]
use_residual_sigma = false      # Phase A dormant; flip after Phase B wire-up
residual_window_size = 200      # rolling window for residual σ̂
fallback_sigma = 0.001          # 10 bps fallback when σ̂ degenerates

# G7-03 (2026-04-24) — Hurst exponent + hysteresis regime detector (Phase A: schema only).
# Wraps openclaw_core::indicators::volatility::hurst (R/S analysis) with a typed
# RegimeLabel + HysteresisDetector (lag-based label stabilizer). Phase A: enabled
# = false keeps `regime::hurst::hurst_label_for_symbol` returning None, so
# runtime is bit-identical to pre-G7-03 behavior. Phase B wires the detector
# into the tick pipeline / scanner. validate() enforces window>=16, lag∈[1,256],
# 0 < antipersistent < persistent < 1, min_window>=2 and min_window*4<=window.
# G7-03：Hurst + 滯回 regime 偵測器 schema；Phase A 預設 enabled=false 完全 no-op，
# Phase B 接線後 operator 才翻 true。
[hurst]
enabled = false                 # Phase A dormant
window_size = 128               # R/S total observation window
min_window = 8                  # smallest sub-window (lag) for chunking
hysteresis_lag = 6              # consecutive same-side observations before flip
persistent_threshold = 0.55     # H > 0.55 → trending side
antipersistent_threshold = 0.45 # H < 0.45 → mean-reverting side

# STRATEGIST-TUNE-TARGET-CONFIG-1 (2026-04-25) — StrategistScheduler param
# tuner clamp. `max_param_delta_pct` caps `|new − cur| / |cur|` for non-weight
# scalar params each cycle. W-AUDIT-7 F-strategist-cap raises the current
# source default to `0.50` (±50%) while retaining the same hot-reload path.
# Operators may flip via TOML or IPC `patch_risk_config` (`<60s` hot-reload via
# the existing deep-merge path). validate() enforces the open interval
# `(0.0, 1.0)` and rejects NaN/Inf.
# STRATEGIST-TUNE-TARGET-CONFIG-1：策略師調參 delta 上限；source 預設升至 0.50，
# operator 可 IPC `<60s` 熱重載；validate() 強制 (0.0, 1.0) + 拒 NaN/Inf。
#
# F-09 MODEL-TIER-EXTRACTION (2026-05-16, WP-04 follow-up) — 把 IPC payload
# `model_tier` 從 Rust 硬碼（evaluate.rs 舊 "l1_9b"）提取到此 TOML 欄位。
# 切 27B / L1.5 / L2 不需 Rust rebuild；TOML 改值或 IPC `patch_risk_config`
# `<60s` 熱重載即生效。validate() 只擋空字串 / 純空白（不綁 enum，保留
# future P2-F-09b dynamic routing 設計空間）。
# Python `_handle_strategist` 端讀 `params.get("model_tier", "l1_9b")`，與
# 本檔 source default 對齊保 backward compat。
# F-09：model_tier 抽至 TOML，operator 熱切 9B / 27B / L1.5 不需 rebuild。
[strategist]
max_param_delta_pct = 0.50      # ±50% cap on per-cycle non-weight param delta
model_tier = "l1_9b"            # F-09 IPC strategist_evaluate Ollama tier；non-empty string

[experimental.flags]

# G3-09 Phase A (2026-04-27) — cost_edge_advisor schema (advisory only).
# Lifts CLAUDE.md §二 原則 #13 「AI 資源成本感知 — 每次 AI 調用計費，
# cost_edge_ratio ≥ 0.8 → 建議關倉」into Rust ConfigStore. Phase A defaults:
# `enabled = false` (advisor dormant — env=1 + enabled=true to activate);
# `trigger_threshold = -0.5` (per PM Tier 9 T9-LOW-1 lock-in: ratio ≤ -0.5
# means paper PnL loss reaches 50% of AI spend — clearly burning, not noise).
# Phase A landing: 0 trade impact / no IntentProcessor wiring / advisory only
# (status logged + audit emitted on transition; no close trigger). Phase B
# (shadow dry-run) + Phase C (gate 新倉) deferred to follow-up sub-tasks.
# Cross-env: per memory `feedback_env_config_independence`, demo/paper/live
# threshold may evolve independently — DO NOT consolidate. Live TOML uses
# more conservative `-0.3` (smaller tolerance for AI burn).
# G3-09 Phase A：cost_edge_advisor schema（純 advisory）。CLAUDE.md §二 #13
# 「AI 成本感知」升為 Rust ConfigStore 一級欄位。預設 `enabled=false`（dormant，
# env=1 + flag=true 才啟動）+ `trigger_threshold=-0.5`（PM lock-in：paper 虧損達
# AI 花費 50%）。Phase A 0 trade impact / 不接 IntentProcessor / 純 advisory。
[cost_edge]
enabled = false                 # Phase A dormant — env-gate + flag dual safeguard
trigger_threshold = -0.5        # ratio <= -0.5 trigger（PM Tier 9 T9-LOW-1 lock-in）

# REF-20 Sprint 3 Track H E-4 (2026-05-03) — agent 三表 DB sink schema (Phase A
# config-only). Paper posture: sampling 與 demo 同（paper 為 dormant 狀態
# disabled by default per project_paper_pipeline_disabled_by_default）。
# 實際 PG sink wiring deferred to P1-AGENT-DB-SINK follow-up ticket。
# 三環境獨立 per memory `feedback_env_config_independence` — 禁衛生合併。
#
# REF-20 Sprint 3 Track H E-4：agent 三表 DB sink schema（config-only Phase A）。
# Paper 配置：與 demo 同 sampling 比；paper 整體 dormant 不影響真實 throughput。
[messagebus_db_sink]
enabled = false                 # Phase A dormant — flag flip after P1 wiring lands
sampling = "severity"            # Option A severity-based per PA design §4 #3
sampling_low_pct = 1            # LOW priority sample rate (0-100)
sampling_normal_pct = 10        # NORMAL priority (0-100)
sampling_high_pct = 50          # HIGH priority (0-100)
sampling_critical_pct = 100     # CRITICAL priority (always 100)
fail_soft_on_db_error = true    # PG outage → log warn + drop, never block MessageBus

# LG-2 T4 (2026-05-11) — 24h pricing freshness gate config（per PA tech plan
# `2026-05-11--lg_2_3_4_design_plan.md` §2.4 表 T4 + LG-3 RFC
# `2026-05-01--lg3_provider_pricing_binding_rfc.md` §Refresh Cadence）。
#
# Paper 預設：寬鬆閾值 — paper pipeline 預設 dormant（OPENCLAW_ENABLE_PAPER=1
# 才 spawn），且 paper 不接 Bybit fee endpoint（無 fill 即無 pricing 行），
# 此處數值僅作 schema parity 與三環境配置面一致；24h warn / 7d fail 給
# operator 充足 forensic 窗。cold_default_acceptable_modes 列 paper/demo/
# live_demo，與 demo 對齊 — paper 整體無 mainnet 暴露故無需嚴格收緊。
#
# 三環境獨立 per memory `feedback_env_config_independence`：本 section 預設
# 與 demo/live 不同，禁衛生合併。validate() 強制 warn < fail / fail > 0 /
# 白名單非空且不含 "live"（LG-3 RFC §2.3 mainnet fail-closed 不變式）。
[pricing]
max_age_warn_minutes = 1440     # 24h — paper 寬鬆觀察門檻
max_age_fail_minutes = 10080    # 7d  — paper hard-fail 門檻（mainnet 無關）
cold_default_acceptable_modes = ["paper", "demo", "live_demo"]
