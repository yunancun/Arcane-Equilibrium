# Scanner Config — dynamic symbol universe management
# 掃描器配置 — 動態交易對品類管理
# ARCH-RC1 ScannerConfig defaults (see scanner/config.rs for validate() rules)

[meta]
version = 1
saved_ts_ms = 0

[scheduling]
scan_interval_secs = 60     # 1 minute / 1 分鐘
warmup_delay_secs = 60      # wait 60s after engine start / 引擎啟動後等待 60 秒

[universe]
max_symbols = 40
# pinned_symbols 對齊 main.rs panel_aggregator_cohort() 25-sym 名單
# （per W1 P0 fix follow-up 2026-05-11）。
# 原因：panel.funding_rates_panel + panel.oi_delta_panel 需 cohort 全 sym
# 有 ticker WS 訂閱才能寫入；scanner pinned 是唯一 boot-time WS subscribe set。
# Scanner 收到 25 pinned 後 anti-churn 保護全 cohort，max_symbols=40 留 15 動態 slot。
# Side effect: 動態探索 long-tail sym 機會減少 ~23 slot；接受換 panel 全覆蓋。
# POLUSDT 取代 MATICUSDT（後者 Bybit V5 status=Closed since 2024-09-06）。
pinned_symbols = [
    "BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT", "DOGEUSDT",
    "ADAUSDT", "AVAXUSDT", "LINKUSDT", "DOTUSDT", "POLUSDT",
    "LTCUSDT", "BCHUSDT", "NEARUSDT", "UNIUSDT", "ATOMUSDT",
    "ETCUSDT", "FILUSDT", "ICPUSDT", "TRXUSDT", "ARBUSDT",
    "OPUSDT", "APTUSDT", "SUIUSDT", "TONUSDT", "INJUSDT",
]

[hard_filters]
min_turnover_24h_usdt = 50000000.0   # 50M USDT minimum 24h volume
max_spread_bps = 8.0
min_price_usdt = 0.001
btc_min_move_pct = 0.3   # BTC must move ≥0.3% for beta_proxy to be valid

[anti_churn]
min_hold_cycles = 30          # 30 scan cycles = ~30 min at 60s scans
challenger_threshold = 15.0   # new symbol must beat worst by ≥15 pts
removal_cooldown_minutes = 30

[correlation]
max_high_beta_symbols = 12  # max symbols with BTC beta > threshold
max_per_strategy = 12
max_per_sector = 6
high_beta_threshold = 0.8

[edge_routing]
# Edge-first routing. Defaults preserve the original bonus formula for normal
# cells, but cap mature negative cells out of the main scanner route.
bonus_weight = 0.5
bonus_min = -30.0
bonus_max = 10.0
unexplored_bonus = 2.0
robust_negative_min_trades = 30
robust_negative_bps_threshold = 0.0
robust_negative_score_cap = 35.0
posterior_lcb_z = 1.0
posterior_min_std_bps = 20.0
posterior_negative_lcb_threshold_bps = 0.0

[market_judgment]
# Strategy-specific market compatibility gate. The scanner still selects a
# symbol universe, but demo/live_demo new opens are checked against the actual
# strategy that emitted the intent, not only the scanner's best_strategy.
enabled = true
gate_score_cap = 25.0

# Grid wants oscillation, not one-way drift.
grid_max_trend_score = 0.55
grid_max_directional_efficiency = 0.55
grid_max_dir_pct = 3.5
grid_min_range_pct = 3.0

# MA / breakout need trend quality; reversion needs range without trend dominance.
trend_min_trend_score = 0.45
trend_min_dir_pct = 0.8
reversion_min_range_pct = 4.0
reversion_max_trend_score = 0.60
breakout_min_trend_score = 0.50
breakout_min_dir_pct = 1.8

# Funding arb route fitness is penalized in directional momentum. The current v2
# behaves as a directional perp trade without verified funding capture, so one-way
# shocks are recorded as scanner evidence rather than scanner-side hard gates.
funding_max_dir_pct = 4.0
funding_max_trend_score = 0.65

# Low-sample negative edge quarantine. Any strategy-symbol cell with enough
# early negative evidence is exploration-only until a redesign or explicit
# operator override reopens it.
immature_negative_min_trades = 10
immature_negative_bps_threshold = 0.0
immature_negative_score_cap = 20.0

[opportunity]
# Scanner opportunity evaluation. The typed fields are persisted for
# audit/replay; canary_block_new_entries only applies to demo/live_demo new
# opens and never to close/reduce/protective paths.
enabled = true
one_way_fee_bps = 4.5
slippage_buffer_bps = 1.0
cost_uncertainty_bps = 2.0
base_uncertainty_bps = 3.0
fitness_gross_bps_per_score = 0.30
spread_quality_reference_bps = 8.0
min_calibration_trades = 30
historical_lcb_z = 1.0
historical_min_std_bps = 20.0
historical_negative_penalty_weight = 0.25
positive_history_uncertainty_discount_bps = 2.0
opportunity_score_bps_multiplier = 2.0
canary_block_new_entries = true
