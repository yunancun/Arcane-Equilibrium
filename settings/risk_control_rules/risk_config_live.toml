take_profit_enforced = false
position_size_max_pct = 15.0
total_exposure_max_pct = 80.0
correlated_exposure_max_pct = 40.0
leverage_max = 15.0
session_drawdown_max_pct = 12.0
daily_loss_max_pct = 7.0
consec_loss_cooldown_count = 2
consec_loss_cooldown_min = 45
holding_hours_max = 72.0
open_positions_max = 10
min_order_notional_usdt = 5.0
max_order_notional_usdt = 0.0
min_balance_usdt = 50.0
global_notional_cap_usdt = 0.0
allowed_categories = ["linear", "spot", "inverse"]
margin_mode = "isolated"
position_mode = "one_way"
guardian_modification_size_factor = 0.4
guardian_modification_leverage_cap = 1.5
per_trade_risk_pct = 0.05
ft_min_notional_ratio_of_entry = 0.25

[overrides]

