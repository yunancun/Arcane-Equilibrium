# ─────────────────────────────────────────────────────────────────────────────
# G2-03 (2026-04-26) — ma_crossover SL/TP per-strategy override schema (Option B2).
# Schema landed per PA RFC `2026-04-26--g2_03_option_b_rfc.md` § 2.4 + § 6.T3.
# W-AUDIT-6 (2026-05-09) binds ma_crossover R:R values here after the
# AMD-2026-05-09-02 strategy verdict: TP enforcement is per-strategy, not global.
#
# Live-specific notes:
#   - This live file currently backs live_demo flow in this deployment; true
#     mainnet still requires INDEPENDENT operator approval per memory
#     `feedback_env_config_independence`.
#   - Live TOML reload still gated by §四 hard boundaries (live_reserved /
#     authorization.json HMAC / OPENCLAW_ALLOW_MAINNET=1) — schema falls under
#     P1 risk surface, not live-execution gates.
#
# Defense (PA RFC § 3.1):
#   A. RiskConfig::validate() rejects override > limits at IPC patch / TOML reload
#   B. risk_checks runtime cap clamps any survivor at limits (effective_*_max_pct)
#   C. counterfactual_calibrator dry-run rejects before write (offline)
#
# G2-03（2026-04-26）—— ma_crossover SL/TP 每策略覆蓋 schema（Option B2）。
# W-AUDIT-6（2026-05-09）已按 AMD-2026-05-09-02 對 MA R:R 實際落值；
# TP enforcement 僅策略級啟用，避免全局影響 grid / BB。
# Live 特性：當前 deployment 仍是 live_demo；真 mainnet binding 需 operator
# 獨立審查（feedback_env_config_independence）；TOML reload 仍受 §四 硬邊界。
# ─────────────────────────────────────────────────────────────────────────────
[per_strategy.ma_crossover]
enabled = true
# P1-EDGE-1 2026-05-08: LABUSDT added from ma_crossover combined demo/live_demo
# negative cell (7d n=6 avg=-244.54bps); blocks new entries only.
blocked_symbols = [
  "NAORISUSDT",
  "PENGUUSDT",
  "FARTCOINUSDT",
  "LABUSDT",
]
# W-AUDIT-6 2026-05-09: ma_crossover R:R rewrite. Tighten MA exits through
# per-strategy RiskConfig so TP/trailing changes do not affect grid / BB.
stop_loss_max_pct_override = 2.5
take_profit_max_pct_override = 8.0
take_profit_enforced_override = true
trailing_activation_pct_override = 0.6
trailing_distance_pct_override = 0.4

[agent]
