# DYNAMIC-RISK-1: Sharpe-aware dynamic per-trade risk. Live uses tighter
# defaults than demo: ±0.25% step, 0.5%..3% clamp, Sharpe band [0.5, 1.5],
# longer window (500 trades) and 10-min update interval so the live pct
# drifts only on strong evidence.
# DYNAMIC-RISK-1：live 較 demo 更緊：更小步、更窄夾限、更高 Sharpe 門檻，
# 更長窗口，僅在強證據下才緩慢漂移。
[dynamic_sizing]
enabled = true
min_trades = 100
step_pct = 0.0025
min_pct = 0.005
max_pct = 0.03
sharpe_high = 1.5
sharpe_low = 0.5
update_interval_ms = 600000
window_size = 500

# INFRA-PREBUILD-1 Part A (2026-04-23) — Combine Layer shadow mode.
# Live defaults OFF. When Phase 3+ Track L graduates, flip to true via IPC
# (not hand-edit for live — use write-face for audit trail).
# Live 預設關閉；Phase 3+ Track L 成熟時經 IPC（非手編 TOML）切換便於審計。
[exit]
shadow_enabled = false

# G7-01 (2026-04-24) — Kelly fractional-tier sample-size boundaries.
# Live defaults match demo (50 / 200). Tighten on live (e.g. 100 / 400) only
# after demo statistics support a higher sample-size requirement.
# G7-01：Kelly 分層樣本量邊界。Live 預設與 demo 對齊（50/200）；
# 待 demo 統計支持更高樣本量門檻時可在 live 收緊（如 100/400）。
[kelly]
young_threshold = 50
mature_threshold = 200
young_fraction = 0.125
mature_fraction = 0.16666666666666666
established_fraction = 0.25

# W-AUDIT-6 (2026-05-09) — Fast-track held-drop thresholds.
# Live defaults are intentionally identical to the former code constants:
# 15% extreme drop, and 5% + 3σ moderate outlier. Tune only after demo evidence.
# W-AUDIT-6：Live 預設保留舊硬編碼觸發，需 demo 證據後再調整。
[fast_track]
extreme_drop_pct = 15.0
moderate_drop_pct = 5.0
outlier_sigma_threshold = 3.0

# G3-02 Phase A (2026-04-25): ExecutorAgent shadow→live control plane.
# Live default shadow_mode=true — Phase C operator IPC flip (auth-gated)
# is the only way to land on shadow_mode=false in this environment.
# G3-02 Phase A：Live 預設 shadow_mode=true；唯有 Phase C 經 auth IPC 才能 flip。
[executor]
shadow_mode = true
max_position_pct = 0.05
per_symbol_position_cap = {}

# G7-02 (2026-04-24) — Per-timeframe EWMA Vol lambda decay constants.
# Live default `default_lambda = 0.97` mirrors the pre-G7-02 hardcoded value
# so live runtime stays bit-identical until operators add per-tf overrides.
# See risk_config_demo.toml for the full rationale; live keeps an empty
# overrides table to enforce the conservative single-lambda default.
# G7-02：Live 維持 G7-02 前單一 0.97 衰減；overrides 表保持空以維持保守預設。
[ewma_vol]
default_lambda = 0.97
lambdas = {}

# G7-04 (2026-04-24) — CUSUM strategy decay monitor (Phase A: schema only).
# Live keeps the conservative dormant default `enabled = false` until Phase B+
# wiring lands and the operator opts in via IPC. Numeric defaults match
# risk_config_demo.toml (Page/Montgomery convention 0.5σ / 4σ / 30 obs / 0 bps);
# see that file for the full rationale. validate() enforces 0 < slack_k <
# threshold_h, threshold_h ∈ (0, 100], min_observations >= 5.
# G7-04：Live 維持 Phase A 靜默預設 enabled=false 不接 runtime；後續 follow-up
# 補 wiring。
[cusum]
enabled = false
slack_k = 0.5
threshold_h = 4.0
min_observations = 30
target_return_bps = 0.0

# G7-07 (2026-04-24) — cost-gate slippage tiers + win-rate weighting knobs.
# Replaces pre-G7-07 hardcoded SLIPPAGE_TIERS / DEFAULT_SLIPPAGE_RATE /
# `win_rate.clamp(0.3, 1.0)` / `× 1.3` literals in intent_processor::{mod, gates}.
# Live keeps default-rate / floor / multiplier IDENTICAL to demo for now —
# operators may tighten safety_multiplier (e.g. 1.5) on live once data shows
# realised slippage trends. Tier table mirrors pre-G7-07 constants exactly.
# G7-07：Live 預設與 demo 一致；待真實滑點數據累積後可調 safety_multiplier。
# 默認值 bit-identical 保持運行時行為不變。
[slippage]
default_rate = 0.0005           # 5 bps fallback when volume_24h <= 0
cost_gate_win_rate_floor = 0.3  # max(floor, win_rate) clamp in cost gates
cost_gate_safety_multiplier = 1.3  # 30 % safety buffer on threshold

[[slippage.tiers]]
min_turnover_usd = 1_000_000_000.0
rate = 0.0001                   # >$1B: 1 bps (BTC/ETH)

[[slippage.tiers]]
min_turnover_usd = 100_000_000.0
rate = 0.0002                   # >$100M: 2 bps

[[slippage.tiers]]
min_turnover_usd = 10_000_000.0
rate = 0.0005                   # >$10M: 5 bps

[[slippage.tiers]]
min_turnover_usd = 1_000_000.0
rate = 0.0015                   # >$1M: 15 bps

[[slippage.tiers]]
min_turnover_usd = 0.0
rate = 0.0030                   # <$1M: 30 bps (illiquid alts)

# G7-06 (2026-04-24) — Grid OU residual-based σ estimator (Phase A: schema only).
# Replaces (in Phase B) the raw-Δx σ path in `grid_helpers::compute_ou_step`
# with a proper residual estimator σ̂ = sqrt(Σ ε² / (n-1)) where ε_t = Δx_t −
# θ̂(μ̂ − x_{t-1}). Phase A: `use_residual_sigma = false` keeps the runtime
# bit-identical to pre-G7-06 behavior. validate() enforces residual_window_size
# ∈ [20, 5000] and fallback_sigma ∈ [0.0, 1.0].
# G7-06：Grid OU 殘差 σ 估計器 schema；Phase A 預設 use_residual_sigma=false
# 保留現行為，Phase B 接 wire 後 operator 才翻 true。
[grid_ou]
use_residual_sigma = false      # Phase A dormant; flip after Phase B wire-up
residual_window_size = 200      # rolling window for residual σ̂
fallback_sigma = 0.001          # 10 bps fallback when σ̂ degenerates

# G7-03 (2026-04-24) — Hurst exponent + hysteresis regime detector (Phase A: schema only).
# Wraps openclaw_core::indicators::volatility::hurst (R/S analysis) with a typed
# RegimeLabel + HysteresisDetector (lag-based label stabilizer). Phase A: enabled
# = false keeps `regime::hurst::hurst_label_for_symbol` returning None, so
# runtime is bit-identical to pre-G7-03 behavior. Phase B wires the detector
# into the tick pipeline / scanner. validate() enforces window>=16, lag∈[1,256],
# 0 < antipersistent < persistent < 1, min_window>=2 and min_window*4<=window.
# G7-03：Hurst + 滯回 regime 偵測器 schema；Phase A 預設 enabled=false 完全 no-op，
# Phase B 接線後 operator 才翻 true。
[hurst]
enabled = false                 # Phase A dormant
window_size = 128               # R/S total observation window
min_window = 8                  # smallest sub-window (lag) for chunking
hysteresis_lag = 6              # consecutive same-side observations before flip
persistent_threshold = 0.55     # H > 0.55 → trending side
antipersistent_threshold = 0.45 # H < 0.45 → mean-reverting side

# STRATEGIST-TUNE-TARGET-CONFIG-1 (2026-04-25) — StrategistScheduler param
# tuner clamp. `max_param_delta_pct` caps `|new − cur| / |cur|` for non-weight
# scalar params each cycle. W-AUDIT-7 F-strategist-cap raises the current
# source default to `0.50` (±50%) while retaining the same hot-reload path.
# Operators may flip via TOML or IPC `patch_risk_config` (`<60s` hot-reload via
# the existing deep-merge path). validate() enforces the open interval
# `(0.0, 1.0)` and rejects NaN/Inf.
# STRATEGIST-TUNE-TARGET-CONFIG-1：策略師調參 delta 上限；source 預設升至 0.50，
# operator 可 IPC `<60s` 熱重載；validate() 強制 (0.0, 1.0) + 拒 NaN/Inf。
#
# F-09 MODEL-TIER-EXTRACTION (2026-05-16, WP-04 follow-up) — 把 IPC payload
# `model_tier` 從 Rust 硬碼（evaluate.rs 舊 "l1_9b"）提取到此 TOML 欄位。
# 切 27B / L1.5 / L2 不需 Rust rebuild；TOML 改值或 IPC `patch_risk_config`
# `<60s` 熱重載即生效。validate() 只擋空字串 / 純空白（不綁 enum，保留
# future P2-F-09b dynamic routing 設計空間）。Live 環境同 demo / paper 預設
# `"l1_9b"`，operator 視 live 場景複雜度（保守 vs 探索）自行調整。
# Python `_handle_strategist` 端讀 `params.get("model_tier", "l1_9b")`，與
# 本檔 source default 對齊保 backward compat。
# F-09：model_tier 抽至 TOML，operator 熱切 9B / 27B / L1.5 不需 rebuild。
[strategist]
max_param_delta_pct = 0.50      # ±50% cap on per-cycle non-weight param delta
model_tier = "l1_9b"            # F-09 IPC strategist_evaluate Ollama tier；non-empty string

[experimental.flags]

# G3-09 Phase A (2026-04-27) — cost_edge_advisor schema (advisory only).
# See risk_config_demo.toml for full background. LIVE-specific tuning:
# `trigger_threshold = -0.3` is more conservative than demo/paper `-0.5` —
# real-money environment has lower tolerance for AI cost vs PnL drift.
# Phase A landing remains advisory only (no IntentProcessor wiring); Phase C
# operator unlock requires ≥7d demo Phase B shadow data review per RFC §8.3.
# G3-09 Phase A：cost_edge_advisor schema（純 advisory）— Live 環境用更保守
# threshold `-0.3`（vs demo/paper `-0.5`）；Phase A 不接 IntentProcessor，
# Phase C unlock 需 ≥7d demo Phase B shadow 資料審核（RFC §8.3）。
[cost_edge]
enabled = false                 # Phase A dormant — env-gate + flag dual safeguard
trigger_threshold = -0.3        # Live more conservative than demo/paper (-0.5)

# REF-20 Sprint 3 Track H E-4 (2026-05-03) — agent 三表 DB sink schema (Phase A
# config-only). Live posture: sampling 收緊（live 永遠 fail-closed strict per
# memory `feedback_demo_loose_live_strict_policy`）；HIGH/CRITICAL 100% audit
# 完整保留，LOW/NORMAL 略低於 demo（live throughput 真實風險）。
# 實際 PG sink wiring deferred to P1-AGENT-DB-SINK follow-up ticket。
# 三環境獨立 per memory `feedback_env_config_independence` — 禁衛生合併。
#
# REF-20 Sprint 3 Track H E-4：agent 三表 DB sink schema（config-only Phase A）。
# Live 配置：sampling 收緊；HIGH/CRITICAL 永 100% audit；LOW/NORMAL 略低於 demo。
[messagebus_db_sink]
enabled = false                 # Phase A dormant — flag flip after P1 wiring + extra audit gate
sampling = "severity"            # Option A severity-based per PA design §4 #3
sampling_low_pct = 0            # LOW priority — Live drops all (audit completeness via HIGH+)
sampling_normal_pct = 5         # NORMAL — Live tightened from demo 10% → 5%
sampling_high_pct = 50          # HIGH priority (0-100)
sampling_critical_pct = 100     # CRITICAL — always 100% (audit completeness)
fail_soft_on_db_error = true    # PG outage → log warn + drop, never block MessageBus.send

# LG-2 T4 (2026-05-11) — 24h pricing freshness gate config（per PA tech plan
# `2026-05-11--lg_2_3_4_design_plan.md` §2.4 表 T4 + LG-3 RFC
# `2026-05-01--lg3_provider_pricing_binding_rfc.md` §Refresh Cadence）。
#
# Live 預設：嚴格閾值 — Live（mainnet + LiveDemo）走真實/模擬真實流量，
# pricing 必須極新；30min warn 給 fast-track 1 個 hourly refresh cycle 內
# observability，12h fail 比 demo 1440min 進一步收緊（LiveDemo 模擬 mainnet
# 嚴苛度 per memory `feedback_live_no_degradation_by_endpoint`）。
#
# cold_default_acceptable_modes：**移除 "paper"**（live 配置無 paper 路徑）
# 並**永不可含 "live"**（LG-3 RFC §2.3 mainnet hard-block 不變式 — mainnet
# 必須拒 seed_default，validate() 強制）。LiveDemo（engine_mode='live_demo'）
# 與 demo 同視為 Bybit endpoint 不支援 fee-rate API → 可接受 seed_default；
# 真 mainnet 'live' 不在白名單，後續 LG2-T2 startup assertion 必拒。
#
# 三環境獨立 per memory `feedback_env_config_independence`：live 比 demo
# 嚴格、比 paper 嚴格甚多；禁衛生合併。
[pricing]
max_age_warn_minutes = 30       # 30min — hourly refresh fail 30min 內即 WARN
max_age_fail_minutes = 720      # 12h  — Live 比 demo (24h) 收緊（per `feedback_demo_loose_live_strict_policy`）
cold_default_acceptable_modes = ["demo", "live_demo"]
