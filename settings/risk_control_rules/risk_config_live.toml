[meta]
version = 2
saved_ts_ms = 0

[limits]
stop_loss_max_pct = 15.0
take_profit_max_pct = 20.0
take_profit_enforced = false
position_size_max_pct = 15.0
total_exposure_max_pct = 80.0
correlated_exposure_max_pct = 40.0
leverage_max = 15.0
session_drawdown_max_pct = 12.0
daily_loss_max_pct = 7.0
consec_loss_cooldown_count = 2
consec_loss_cooldown_min = 45
holding_hours_max = 72.0
open_positions_max = 10
min_order_notional_usdt = 5.0
max_order_notional_usdt = 0.0
min_balance_usdt = 50.0
global_notional_cap_usdt = 0.0
allowed_categories = ["linear", "spot", "inverse"]
margin_mode = "isolated"
position_mode = "one_way"
guardian_modification_size_factor = 0.4
guardian_modification_leverage_cap = 1.5
per_trade_risk_pct = 0.05
ft_min_notional_ratio_of_entry = 0.25

[overrides]

[per_strategy]

[agent]
trailing_enabled = true
trailing_activation_pct = 0.5
trailing_distance_pct = 2.0
size_multiplier = 0.7
prefer_limit = true
reduce_only_close = true
post_only_limit = true
partial_tp_enabled = true
partial_tp_levels = [[5.0, 0.3], [10.0, 0.4]]

[agent.category_weights]

[cascade]
drawdown_cautious_pct = 2.5
drawdown_reduced_pct = 5.0
drawdown_defensive_pct = 8.0
drawdown_circuit_pct = 10.0
daily_loss_cautious_pct = 1.5
daily_loss_reduced_pct = 3.0
daily_loss_circuit_pct = 5.5
consec_loss_cautious = 2
consec_loss_reduced = 3
consec_loss_circuit = 6
pressure_cautious = 0.25
pressure_reduced = 0.4
pressure_defensive = 0.6
pressure_circuit = 0.8
min_hold_ms = 600000

[regime.trending]
stop = 1.0
tp = 1.5
time = 1.5

[regime.volatile]
stop = 1.5
tp = 0.8
time = 0.8

[regime.ranging]
stop = 0.7
tp = 0.7
time = 0.8

[regime.squeeze]
stop = 0.6
tp = 0.5
time = 1.0

[regime.unknown]
stop = 1.0
tp = 1.0
time = 1.0

[cost_gate]
min_confidence = 0.2
k_base = 1.8
k_medium = 2.2
k_small = 3.5
adx_trending = 28.0

[edge_predictor]
use_edge_predictor = false
shadow_mode = true
quantile_safety_k = 0.5
require_q10_positive_for_adds = true
fallback_on_error = "shrinkage"
exploration_rate = 0.05
retrain_cadence_seconds = 604800
model_max_age_seconds = 1209600

[dynamic_stop]
base_ratio = 0.5
cap_ratio = 0.75
trailing_min_rr = 0.8
atr_stop_mult = 1.5
atr_tp_mult = 2.5

[market_gate]
min_ob_depth_usdt = 50000.0
max_ob_imbalance = 0.65
min_volume_24h_usdt = 2000000.0
max_taker_fee_bps = 7.0
spread_max_bps = 15.0
slippage_max_bps = 10.0
funding_rate_max_abs = 0.025
liquidation_buffer_pct = 25.0
max_orders_per_minute = 40

[anti_cluster]
offset_fraction = 0.2
max_same_direction = 4

[correlation]
max_pairwise_r = 0.55
window_minutes = 90

[runtime]
boot_cooldown_ms = 90000
signals_heartbeat_ms = 30000
h0_shadow_mode = false

# DYNAMIC-RISK-1: Sharpe-aware dynamic per-trade risk. Live uses tighter
# defaults than demo: ±0.25% step, 0.5%..3% clamp, Sharpe band [0.5, 1.5],
# longer window (500 trades) and 10-min update interval so the live pct
# drifts only on strong evidence.
# DYNAMIC-RISK-1：live 較 demo 更緊：更小步、更窄夾限、更高 Sharpe 門檻，
# 更長窗口，僅在強證據下才緩慢漂移。
[dynamic_sizing]
enabled = true
min_trades = 100
step_pct = 0.0025
min_pct = 0.005
max_pct = 0.03
sharpe_high = 1.5
sharpe_low = 0.5
update_interval_ms = 600000
window_size = 500

[experimental.flags]
