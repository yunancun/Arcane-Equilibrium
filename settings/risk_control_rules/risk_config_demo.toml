[meta]
version = 2
saved_ts_ms = 0

[limits]
stop_loss_max_pct = 25.0
take_profit_max_pct = 25.0
take_profit_enforced = false
position_size_max_pct = 25.0
total_exposure_max_pct = 150.0
correlated_exposure_max_pct = 65.0
leverage_max = 50.0
session_drawdown_max_pct = 25.0
daily_loss_max_pct = 15.0
consec_loss_cooldown_count = 4
consec_loss_cooldown_min = 15
holding_hours_max = 168.0
open_positions_max = 25
min_order_notional_usdt = 0.0
max_order_notional_usdt = 0.0
min_balance_usdt = 0.0
allowed_categories = ["spot", "linear", "inverse"]
margin_mode = "isolated"
position_mode = "one_way"
guardian_modification_size_factor = 0.5
guardian_modification_leverage_cap = 2.0
per_trade_risk_pct = 0.1

[overrides]

[per_strategy]

[agent]
trailing_enabled = true
trailing_activation_pct = 0.8
trailing_distance_pct = 3.5
size_multiplier = 1.0
prefer_limit = true
reduce_only_close = true
post_only_limit = false
partial_tp_enabled = false
partial_tp_levels = []

[agent.category_weights]

[cascade]
drawdown_cautious_pct = 8.0
drawdown_reduced_pct = 15.0
drawdown_defensive_pct = 20.0
drawdown_circuit_pct = 22.0
daily_loss_cautious_pct = 5.0
daily_loss_reduced_pct = 10.0
daily_loss_circuit_pct = 14.0
consec_loss_cautious = 4
consec_loss_reduced = 7
consec_loss_circuit = 12
pressure_cautious = 0.35
pressure_reduced = 0.55
pressure_defensive = 0.72
pressure_circuit = 0.88
min_hold_ms = 120000

[regime.trending]
stop = 1.0
tp = 1.5
time = 1.5

[regime.volatile]
stop = 1.5
tp = 0.8
time = 0.8

[regime.ranging]
stop = 0.7
tp = 0.7
time = 0.8

[regime.squeeze]
stop = 0.6
tp = 0.5
time = 1.0

[regime.unknown]
stop = 1.0
tp = 1.0
time = 1.0

[cost_gate]
min_confidence = 0.1
k_base = 1.2
k_medium = 1.5
k_small = 2.0
adx_trending = 20.0

[dynamic_stop]
base_ratio = 0.4
cap_ratio = 0.85
trailing_min_rr = 0.3
atr_stop_mult = 2.0
atr_tp_mult = 3.5

[market_gate]
min_ob_depth_usdt = 30000.0
max_ob_imbalance = 0.75
min_volume_24h_usdt = 500000.0
max_taker_fee_bps = 8.0
spread_max_bps = 25.0
slippage_max_bps = 18.0
funding_rate_max_abs = 0.03
liquidation_buffer_pct = 15.0
max_orders_per_minute = 90

[anti_cluster]
offset_fraction = 0.15
max_same_direction = 7

[correlation]
max_pairwise_r = 0.75
window_minutes = 45

[runtime]
boot_cooldown_ms = 60000
signals_heartbeat_ms = 60000
h0_shadow_mode = false

# DYNAMIC-RISK-1: Sharpe-aware dynamic per-trade risk. Demo is the primary
# learning/edge-accumulation channel (project_edge_data_isolation.md), so
# enabled with moderate defaults: ±0.5% step, 1%..5% clamp, update every 5min.
# DYNAMIC-RISK-1：demo 為主要學習/edge 累積通道，啟用中庸參數。
[dynamic_sizing]
enabled = true
min_trades = 50
step_pct = 0.005
min_pct = 0.01
max_pct = 0.05
sharpe_high = 1.0
sharpe_low = 0.0
update_interval_ms = 300000
window_size = 200

[experimental.flags]

# EDGE-DIAG-1 對照實驗（2026-04-23 起）— 升 missing_edge_fallback_bps：default -10 → +10。
# 目的：讓 sync-label 倉位（bybit_sync / orphan_* / dust_frozen，est_net_bps=None）
# 跳過 v2 Gate 1，進 Gate 2-4 評估；grid/ma 倉位（raw shrunk_bps=-4.30）仍走 Gate 1
# Hold 作對照組。24-48h 後對比 sync-label phys_lock fire 後 net 是否優於 trailing/dynamic。
# 詳 TODO §EDGE-DIAG-1。其他 ExitConfig 欄位走 v2.rs default。
# Other ExitConfig fields fall through to v2.rs defaults (min_net_floor_bps=5.0,
# min_hold_secs=30, min_peak_atr_norm=0.5, stale_peak_ms=60000, giveback_base=1.0,
# slope=0.15, floor=0.3). Only override the fallback for the A/B comparison.
[exit]
missing_edge_fallback_bps = 10.0
