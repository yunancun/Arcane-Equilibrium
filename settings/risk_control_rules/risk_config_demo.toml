# ─────────────────────────────────────────────────────────────────────────────
# G2-03 (2026-04-26) — ma_crossover SL/TP per-strategy override schema (Option B2).
# Schema landed per PA RFC `2026-04-26--g2_03_option_b_rfc.md` § 2.4 + § 6.T3.
# All four override fields commented out — schema-only landing, NO binding values.
# Binding deferred until G2-02 counterfactual replay produces a QC + FA approved
# report (~2026-05-03), then operator runs `g2_03_bind_ma_sltp.sh` SOP wrapper.
#
# Defense (PA RFC § 3.1):
#   A. RiskConfig::validate() rejects override > limits at IPC patch / TOML reload
#   B. risk_checks runtime cap clamps any survivor at limits (effective_*_max_pct)
#   C. counterfactual_calibrator dry-run rejects before write (offline)
#
# Per memory `feedback_env_config_independence` — three env TOMLs intentionally
# isolated; this G2-03 schema-only block is mirrored across paper/demo/live so
# operators can flip in any environment without TOML drift, but binding values
# are still environment-specific and require independent QC review per env.
#
# G2-03（2026-04-26）—— ma_crossover SL/TP 每策略覆蓋 schema（Option B2）。
# 落 schema 不落值；binding 等 G2-02 counterfactual 報告（~2026-05-03）+ QC/FA
# review 後 operator 跑 g2_03_bind_ma_sltp.sh SOP 寫入。
# 三 env TOML 同方向 schema 鏡像，per memory `feedback_env_config_independence`
# 仍保各 env 獨立審查的硬規則。
# ─────────────────────────────────────────────────────────────────────────────
[per_strategy.ma_crossover]
enabled = true
# P1-EDGE-1 2026-05-08: LABUSDT added from ma_crossover combined demo/live_demo
# negative cell (7d n=6 avg=-244.54bps); blocks new entries only.
blocked_symbols = [
  "NAORISUSDT",
  "PENGUUSDT",
  "FARTCOINUSDT",
  "LABUSDT",
]
# stop_loss_max_pct_override   = 2.5   # < limits.stop_loss_max_pct (must be ≤ P1)
# take_profit_max_pct_override = 8.0   # < limits.take_profit_max_pct
# trailing_activation_pct_override = 0.6
# trailing_distance_pct_override   = 0.4

# ─────────────────────────────────────────────────────────────────────────────
# 2026-05-03 funding_arb stop-loss RCA: disable new entries across all envs.
# Keep the 3% SL override for any legacy funding_arb position that must still be
# evaluated by tick risk before the strategy is fully redesigned.
#
# 2026-05-03 funding_arb 止損 RCA：三端統一阻擋新開倉。保留 3% SL override，
# 供既有 funding_arb 倉位在完全重設計前繼續套用更緊風控。
# ─────────────────────────────────────────────────────────────────────────────
[per_strategy.funding_arb]
enabled = false
stop_loss_max_pct_override = 3.0
# take_profit_max_pct_override   未設 → fall back limits.take_profit_max_pct=25.0
# trailing_activation_pct_override 未設 → fall back agent.trailing_activation_pct
# trailing_distance_pct_override   未設 → fall back agent.trailing_distance_pct

[agent]
trailing_enabled = true
trailing_activation_pct = 0.8
trailing_distance_pct = 3.5
size_multiplier = 1.0
prefer_limit = true
reduce_only_close = true
