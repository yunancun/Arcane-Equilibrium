# DYNAMIC-RISK-1: Sharpe-aware dynamic per-trade risk. Demo is the primary
# learning/edge-accumulation channel (project_edge_data_isolation.md), so
# enabled with moderate defaults: ±0.5% step, 1%..5% clamp, update every 5min.
# DYNAMIC-RISK-1：demo 為主要學習/edge 累積通道，啟用中庸參數。
[dynamic_sizing]
enabled = true
min_trades = 50
step_pct = 0.005
min_pct = 0.01
max_pct = 0.05
sharpe_high = 1.0
sharpe_low = 0.0
update_interval_ms = 300000
window_size = 200

[experimental.flags]

# EDGE-DIAG-1 對照實驗（2026-04-23 起）— 升 missing_edge_fallback_bps：default -10 → +10。
# 目的：讓 sync-label 倉位（bybit_sync / orphan_* / dust_frozen，est_net_bps=None）
# 跳過 v2 Gate 1，進 Gate 2-4 評估；grid/ma 倉位（raw shrunk_bps=-4.30）仍走 Gate 1
# Hold 作對照組。24-48h 後對比 sync-label phys_lock fire 後 net 是否優於 trailing/dynamic。
# 詳 TODO §EDGE-DIAG-1。其他 ExitConfig 欄位走 v2.rs default。
# Other ExitConfig fields fall through to v2.rs defaults (min_net_floor_bps=5.0,
# min_hold_secs=30, min_peak_atr_norm=0.5, stale_peak_ms=60000, giveback_base=1.0,
# slope=0.15, floor=0.3). Only override the fallback for the A/B comparison.
[exit]
missing_edge_fallback_bps = 10.0

# INFRA-PREBUILD-1 Part A (2026-04-23) — Combine Layer shadow mode switch.
# false (default): Phase 1a pass-through — close-path still hands ml_opt=None to
#   combine_exit_decision, learning.decision_shadow_exits stays empty.
# true  (Phase 2+): close-path builds mock MLInference from edge_estimates and
#   emits one ShadowExitMsg per close. Safe to flip via TOML hot-reload + IPC
#   (ArcSwap). ml_override_high=2.0 sentinel keeps ML unreachable for overrides.
# INFRA-PREBUILD-1 A 部：Combine Layer shadow 開關；false 維持 Phase 1a，
# true 開 Phase 2+ 觀察寫入。熱重載即可，不須重啟。
shadow_enabled = false

# G7-01 (2026-04-24) — Kelly fractional-tier sample-size boundaries.
# Drives ml::kelly_sizer::compute_kelly_qty:
#   trades < young_threshold     → 1/8 Kelly (young, most conservative)
#   trades < mature_threshold    → 1/6 Kelly (mature)
#   trades >= mature_threshold   → 1/4 Kelly (established, never full Kelly)
# Defaults 50 / 200 mirror the pre-G7-01 hardcoded constants — runtime
# behavior is unchanged unless an operator edits these.
# G7-01：Kelly 分層樣本量邊界。預設 50/200 保留 G7-01 前的硬編碼行為。
[kelly]
young_threshold = 50
mature_threshold = 200

# G3-02 Phase A (2026-04-25): ExecutorAgent shadow→live control plane.
# Replaces hardcoded Python `_shadow_mode = True` (executor_agent.py:482).
# Phase A schema-only landing — defaults preserve forced shadow behaviour.
# Phase B (Python read path) + Phase C (operator IPC flip) follow.
# G3-02 Phase A：ExecutorAgent 控制平面 schema 落地，預設 shadow_mode=true
# 保留現行為；Phase B/C 後續完成 Python 讀路徑 + operator IPC flip。
[executor]
shadow_mode = true
max_position_pct = 0.05
per_symbol_position_cap = {}

# G7-02 (2026-04-24) — Per-timeframe EWMA Vol lambda decay constants.
# Drives openclaw_core::indicators::ewma_vol via
# IndicatorEngine::compute_all_with_lambda. `default_lambda = 0.97` mirrors the
# pre-G7-02 hardcoded RiskMetrics value; per-tf overrides go in `[ewma_vol.lambdas]`
# and tune the decay rate of a specific timeframe (e.g. 1m/5m faster decay,
# 1h/4h slower). Empty `lambdas = {}` keeps the runtime bit-identical to the
# pre-G7-02 behavior. validate() rejects any lambda outside (0.0, 1.0).
# G7-02：逐 timeframe EWMA Vol lambda 衰減常數。預設 0.97 保留 G7-02 前行為，
# `lambdas = {}` 為空時所有 timeframe 走 default_lambda；validate() 強制
# (0.0, 1.0) 開區間。
[ewma_vol]
default_lambda = 0.97
lambdas = {}

# G7-04 (2026-04-24) — CUSUM strategy decay monitor (Phase A: schema only).
# One-sided downward CUSUM control chart that accumulates per-trade PnL
# deviations from `target_return_bps` and alarms when the cumulative sum
# exceeds `threshold_h * σ`. Defaults follow Page/Montgomery convention:
#   slack_k = 0.5σ deadband, threshold_h = 4σ alarm, min_observations = 30
#   warm-up, target_return_bps = 0 (breakeven net of fees).
# Phase A schema-only landing: `enabled = false` → fully dormant, no
# `dynamic_risk_sizer` / strategy-disable hook fires. Wiring to the runtime
# consumer is deferred to a future G7-04 follow-up.
# validate() enforces 0 < slack_k < threshold_h, threshold_h ∈ (0, 100],
# min_observations >= 5.
# G7-04：CUSUM 策略衰減監控 schema；Phase A 預設靜默 enabled=false 不接 runtime，
# 後續 follow-up 補 wiring。
[cusum]
enabled = false
slack_k = 0.5
threshold_h = 4.0
min_observations = 30
target_return_bps = 0.0

# G7-07 (2026-04-24) — cost-gate slippage tiers + win-rate weighting knobs.
# Replaces pre-G7-07 hardcoded SLIPPAGE_TIERS / DEFAULT_SLIPPAGE_RATE /
# `win_rate.clamp(0.3, 1.0)` / `× 1.3` literals in intent_processor::{mod, gates}.
# Defaults are bit-identical to the pre-G7-07 constants. Operators may tune
# the tier table or safety knobs live without rebuild.
# G7-07：成本門滑點分級 + 勝率加權 knob；預設保持 G7-07 前 hardcoded 值
# bit-identical，可熱重載 tier 表 / safety knob 不需重啟。
[slippage]
default_rate = 0.0005           # 5 bps fallback when volume_24h <= 0
cost_gate_win_rate_floor = 0.3  # max(floor, win_rate) clamp in cost gates
cost_gate_safety_multiplier = 1.3  # 30 % safety buffer on threshold

[[slippage.tiers]]
min_turnover_usd = 1_000_000_000.0
rate = 0.0001                   # >$1B: 1 bps (BTC/ETH)

[[slippage.tiers]]
min_turnover_usd = 100_000_000.0
rate = 0.0002                   # >$100M: 2 bps

[[slippage.tiers]]
min_turnover_usd = 10_000_000.0
rate = 0.0005                   # >$10M: 5 bps

[[slippage.tiers]]
min_turnover_usd = 1_000_000.0
rate = 0.0015                   # >$1M: 15 bps

[[slippage.tiers]]
min_turnover_usd = 0.0
rate = 0.0030                   # <$1M: 30 bps (illiquid alts)

# G7-06 (2026-04-24) — Grid OU residual-based σ estimator (Phase A: schema only).
# Replaces (in Phase B) the raw-Δx σ path in `grid_helpers::compute_ou_step`
# with a proper residual estimator σ̂ = sqrt(Σ ε² / (n-1)) where ε_t = Δx_t −
# θ̂(μ̂ − x_{t-1}). Phase A: `use_residual_sigma = false` keeps the runtime
# bit-identical to pre-G7-06 behavior. validate() enforces residual_window_size
# ∈ [20, 5000] and fallback_sigma ∈ [0.0, 1.0].
# G7-06：Grid OU 殘差 σ 估計器 schema；Phase A 預設 use_residual_sigma=false
# 保留現行為，Phase B 接 wire 後 operator 才翻 true。
[grid_ou]
use_residual_sigma = false      # Phase A dormant; flip after Phase B wire-up
residual_window_size = 200      # rolling window for residual σ̂
fallback_sigma = 0.001          # 10 bps fallback when σ̂ degenerates

# G7-03 (2026-04-24) — Hurst exponent + hysteresis regime detector (Phase A: schema only).
# Wraps openclaw_core::indicators::volatility::hurst (R/S analysis) with a typed
# RegimeLabel + HysteresisDetector (lag-based label stabilizer). Phase A: enabled
# = false keeps `regime::hurst::hurst_label_for_symbol` returning None, so
# runtime is bit-identical to pre-G7-03 behavior. Phase B wires the detector
# into the tick pipeline / scanner. validate() enforces window>=16, lag∈[1,256],
# 0 < antipersistent < persistent < 1, min_window>=2 and min_window*4<=window.
# G7-03：Hurst + 滯回 regime 偵測器 schema；Phase A 預設 enabled=false 完全 no-op，
# Phase B 接線後 operator 才翻 true。
[hurst]
enabled = false                 # Phase A dormant
window_size = 128               # R/S total observation window
min_window = 8                  # smallest sub-window (lag) for chunking
hysteresis_lag = 6              # consecutive same-side observations before flip
persistent_threshold = 0.55     # H > 0.55 → trending side
antipersistent_threshold = 0.45 # H < 0.45 → mean-reverting side
