# Test PostgreSQL + TimescaleDB for integration tests (Phase 1 Day 0-C).
# 整合測試用 PostgreSQL + TimescaleDB。
#
# Usage / 使用方式:
#   docker compose -f docker/docker-compose.test.yml up -d
#   ./scripts/setup_test_db.sh
#   OPENCLAW_TEST_DATABASE_URL="postgresql://test_user:test_pass@127.0.0.1:15432/openclaw_test" cargo test
#   docker compose -f docker/docker-compose.test.yml down -v

services:
  test-pg:
    image: timescale/timescaledb:latest-pg16
    container_name: openclaw-test-pg
    environment:
      POSTGRES_DB: openclaw_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d openclaw_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data  # RAM-backed for speed in tests / 測試用 RAM 存儲加速
