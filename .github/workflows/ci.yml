name: ci

# 觸發策略（2026-05-09 成本優化；2026-07-16 續優化）：
# - push to main：只跑 Linux check（macOS 10x 計費倍率太貴）
# - pull_request：Linux + macOS 雙平台
# - schedule：每週一跑 macOS smoke，確保 aarch64-apple-darwin target 仍編得過
# 2026-07-16 成本收斂（「非必要，不 CI」）：
# - path-filter：push 事件由 changes job 用 event.before...sha 精確 diff 分類
#   （不再 --all），純 docs/governance 合併不再觸發整棵 Rust 重建；schedule 仍 --all。
# - Rust target/ 快取：rust-check-linux / rust-check-macos / schema-contract /
#   rust-ibkr-tests 四個編譯密集 job 掛 Swatinem/rust-cache@v2（full SHA pin；workspace 根 = rust/）。
#   alr-fit-verifier 刻意不快取——它靠「乾淨 offline target」做 locked-online↔
#   clean-offline 對賬，快取會破壞其 hermetic 語義。
on:
  push:
    branches:
      - main
  pull_request:
    # R9 教訓搭車(W5-S2 順手):默認 types 不含 ready_for_review——draft-gated job
    # (rust-check-macos 掛 draft==false)在 undraft 時不會自動補跑;顯式列 types 使
    # undraft 觸發新一輪 CI。
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '0 3 * * 1'  # 每週一 03:00 UTC（北京 11:00）

permissions:
  contents: read

# A newer head makes every in-flight result for the older head obsolete. Cancel
# it before it can keep spending Linux minutes or macOS 10x minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: classify changed paths (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      governance: ${{ steps.classify.outputs.governance }}
      alr_fit_verifier: ${{ steps.classify.outputs.alr_fit_verifier }}
      rust: ${{ steps.classify.outputs.rust }}
      schema: ${{ steps.classify.outputs.schema }}
      stock_etf: ${{ steps.classify.outputs.stock_etf }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Classify the exact diff
        id: classify
        shell: bash
        run: |
          set -euo pipefail
          # pull_request：精確 base...head diff。
          # push to main：用 event.before...sha 精確 diff，純 docs/governance 合併
          #   不再觸發整棵 Rust 重建；首推/force-push 使 before 為全零或不可解時，
          #   退回 --all 保守全開（git cat-file 守衛）。
          # schedule（每週 macOS smoke）：落到 else 恆 --all，那正是排程的目的。
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only -z \
              "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
              | python3 helper_scripts/ci/classify_ci_changes.py \
                  --null --github-output "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" \
                  && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]] \
               && git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            git diff --name-only -z \
              "${{ github.event.before }}...${{ github.sha }}" \
              | python3 helper_scripts/ci/classify_ci_changes.py \
                  --null --github-output "$GITHUB_OUTPUT"
          else
            python3 helper_scripts/ci/classify_ci_changes.py \
              --all --github-output "$GITHUB_OUTPUT" </dev/null
          fi

  migration-immutability-guard:
    name: applied migration immutability guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Check locked migration checksums
        run: python3 helper_scripts/db/check_applied_migration_checksums.py
      - name: Check PR does not rewrite applied migrations
        if: github.event_name == 'pull_request'
        run: python3 helper_scripts/db/check_applied_migration_checksums.py --git-diff-base "origin/${{ github.base_ref }}"
      - name: Check push does not rewrite applied migrations
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: python3 helper_scripts/db/check_applied_migration_checksums.py --git-diff-base "${{ github.event.before }}"

  stable-id-duplication-guard:
    name: stable_id duplication guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check Agent Spine stable_id literal duplication
        run: bash helper_scripts/ci/check_stable_id_duplication.sh

  # This job is deliberately independent of the changed-path classifier. A
  # defective classifier or workflow edit must never be able to skip the tests
  # that validate that same control plane.
  git-workflow-policy:
    name: Git workflow policy (unconditional cheap gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install focused test dependency
        run: python3 -m pip install --disable-pip-version-check pytest
      - name: Run Git workflow policy tests
        run: |
          python3 -m pytest -q \
            tests/structure/test_git_loop_guard.py \
            tests/structure/test_public_repo_security_gate.py \
            tests/structure/test_public_repo_security_policy.py \
            tests/ci/test_classify_ci_changes.py \
            tests/ci/test_github_ci_workflow_static.py \
            tests/ci/test_ci_workflow_ibkr_job_static.py

  # Development-agent governance and the V158/V159 migration source contracts use
  # stdlib + focused pytest only. Keep them on the Linux 1x runner so static
  # authority/Registry/view/permission drift fails before merge without
  # consuming a Rust build or macOS 10x minute.
  development-agent-governance:
    name: development-agent governance (cheap static gate)
    needs: changes
    if: needs.changes.outputs.governance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install focused test dependency
        run: python3 -m pip install --disable-pip-version-check pytest
      - name: Validate Registry and generated views
        run: |
          python3 helper_scripts/maintenance_scripts/agent_governance.py validate
          python3 helper_scripts/maintenance_scripts/agent_governance.py render --check
      - name: Run focused development-agent governance tests
        run: |
          python3 -m pytest -q \
            tests/structure/test_development_agent_governance.py \
            tests/structure/test_agent_governance_*.py
      - name: Run V158/V159 qualified challenger source contracts
        run: |
          python3 -m pytest -q \
            tests/migrations/test_v158_alr_qualified_challenger_training.py \
            tests/migrations/test_v159_alr_durable_fit_attestation.py

  alr-fit-verifier:
    name: isolated ALR fit verifier (locked online + clean offline)
    needs: changes
    if: needs.changes.outputs.alr_fit_verifier == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install focused test dependency
        run: python3 -m pip install --disable-pip-version-check pytest
      - name: Fetch the complete locked workspace graph once
        working-directory: rust
        run: cargo fetch --locked
      - name: Confirm distinct offline target is initially absent
        working-directory: rust
        run: test ! -e target/alr-offline
      - name: Run isolated verifier tests with the locked online target
        working-directory: rust
        run: CARGO_TARGET_DIR=target/alr-online cargo test --locked -p openclaw_alr_fit_verifier
      - name: Replay isolated verifier from a distinct offline target
        working-directory: rust
        run: CARGO_NET_OFFLINE=true CARGO_TARGET_DIR=target/alr-offline cargo test --locked -p openclaw_alr_fit_verifier
      - name: Capture the locked offline dependency graph
        working-directory: rust
        run: CARGO_NET_OFFLINE=true cargo metadata --locked --offline --format-version 1 > target/alr-fit-verifier-metadata.json
      - name: Run parsed lock and metadata assertions
        run: python3 tests/structure/test_alr_fit_verifier_source_static.py --metadata-json rust/target/alr-fit-verifier-metadata.json
      - name: Run focused static contract through pytest
        run: python3 -m pytest -q tests/structure/test_alr_fit_verifier_source_static.py

  rust-check-linux:
    name: rust check (x86_64-unknown-linux-gnu)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install target
        run: rustup target add x86_64-unknown-linux-gnu
      - name: Cache Rust build artifacts
        # workspace 根 = rust/（Cargo.lock 所在），非成員 crate openclaw_engine。
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust
      - name: Cargo check
        run: cargo check --target x86_64-unknown-linux-gnu --release -p openclaw_engine --bin openclaw-engine

  rust-check-macos:
    name: rust check (aarch64-apple-darwin)
    # macOS 10x 計費倍率：push 事件跳過，僅 PR / schedule 觸發。
    # W5-S0 ⑤（loop v2 S4 draft 閘）：draft PR 不燒 macOS 10x，ready-for-review 才跑；
    # schedule 事件無 pull_request payload（draft 表達式為空 ≠ false），必須以
    # event_name 守衛疊加，否則週一 macOS smoke 會被一併關掉。
    needs: changes
    if: github.event_name != 'push' && needs.changes.outputs.rust == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install target
        run: rustup target add aarch64-apple-darwin
      - name: Cache Rust build artifacts
        # macOS 10x runner，快取效益最高；共用 rust/target。
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust
      - name: Test isolated ALR fit verifier
        run: cargo test --locked -p openclaw_alr_fit_verifier
      - name: Cargo check
        run: cargo check --target aarch64-apple-darwin --release -p openclaw_engine --bin openclaw-engine

  # schema-consumer contract（P1-SCHEMA-1）：對 ephemeral PG 跑真完整 migration tree，
  # 再對代表性熱表執行與真實 writer/consumer 同形的 query，兜住「column rename/drop
  # 隱形至 runtime」這條主線（engine 全 runtime-checked sqlx，編譯期看不見 column drift）。
  # 成本紀律：限 pull_request → 只 PR 跑、ubuntu-latest 1x 倍率、零 macOS 10x；
  # push-to-main 與 weekly schedule 不觸發。
  schema-contract:
    name: schema-consumer contract (linux + ephemeral pg)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.schema == 'true'
    runs-on: ubuntu-latest
    # Four V157 preparations, bounded V159/V160 functional and concurrency
    # probes, and the cold Rust full-tree contract share this PR-only job.
    timeout-minutes: 40
    env:
      OPENCLAW_TEST_PG_DESTRUCTIVE: "1"
    defaults:
      run:
        working-directory: rust
    services:
      # 用 prod 對齊的 TimescaleDB image，並 pin 明確 tag 避免 latest 漂版導致
      # V### Guard 反射 timescaledb_information.* view 欄位名 drift（false RAISE）。
      postgres:
        image: timescale/timescaledb:2.26.1-pg16
        env:
          POSTGRES_USER: contract_user
          POSTGRES_PASSWORD: contract_pass
          POSTGRES_DB: contract_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache Rust build artifacts
        # 本 job 反覆編譯 openclaw_engine 測試二進位（V157/V159/V160 baseline +
        # schema_contract_test），是最耗時的 Rust 編譯 job，快取效益最大。
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust
      - name: Install psql + psycopg2
        # psql 用於建 timescaledb extension；psycopg2 供 audit_migrations.py 反射。
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client python3-psycopg2
      - name: Create timescaledb extension
        # 決定性前置：migration 不自建 timescaledb extension（pg_trgm/btree_gist/
        # pgcrypto 由 migration 自建免管）；缺此 step → V006 unguarded compression/
        # retention 會 hard-fail = 非真 schema drift 的 false-positive。
        run: |
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d contract_db \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;"
      - name: Create isolated V159 probe databases
        # Functional and concurrency probes apply their own forward migrations and require
        # empty durable tables, so they must never share a database. V006 also
        # unconditionally alters the historical compatibility DB `trading_ai`.
        run: |
          if ! PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d postgres -Atc \
            "SELECT 1 FROM pg_catalog.pg_database AS d WHERE d.datname = 'trading_ai' AND pg_catalog.pg_get_userbyid(d.datdba) = 'contract_user'" \
            | grep -qx 1; then
            PGPASSWORD=contract_pass createdb --host 127.0.0.1 --username contract_user --owner contract_user trading_ai
          fi
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d postgres \
            -c "CREATE DATABASE alr_v159_functional_ci OWNER contract_user;"
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d postgres \
            -c "CREATE DATABASE alr_v159_concurrency_ci OWNER contract_user;"
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d postgres \
            -c "CREATE DATABASE alr_v160_functional_ci OWNER contract_user;"
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d postgres \
            -c "CREATE DATABASE alr_v160_concurrency_ci OWNER contract_user;"
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d alr_v159_functional_ci \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;"
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d alr_v159_concurrency_ci \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;"
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d alr_v160_functional_ci \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;"
          PGPASSWORD=contract_pass psql -h 127.0.0.1 -U contract_user -d alr_v160_concurrency_ci \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;"
      - name: Prepare V157 baseline for V159 functional probe
        env:
          # 憑證走 query 參數（?user=&password=）而非 user:pass@ 授權段：兩者對 sqlx
          # 等價（sqlx 0.8 parse_from_url 支援 user/password query key），但避開
          # public_repo_security_gate 的 embedded_credential_dsn 規則（只匹配 ://…:…@）。
          # 用的是 ephemeral CI 容器的非機密憑證，與上方 service env 同值。
          OPENCLAW_TEST_PG: postgres://127.0.0.1:5432/alr_v159_functional_ci?user=contract_user&password=contract_pass
          OPENCLAW_V159_PROBE_BASELINE: "1"
        run: >-
          cargo test -p openclaw_engine --test schema_contract_test
          prepare_v159_probe_v157_baseline -- --exact --test-threads=1
      - name: Prepare V157 baseline for V159 concurrency probe
        env:
          OPENCLAW_TEST_PG: postgres://127.0.0.1:5432/alr_v159_concurrency_ci?user=contract_user&password=contract_pass
          OPENCLAW_V159_PROBE_BASELINE: "1"
        run: >-
          cargo test -p openclaw_engine --test schema_contract_test
          prepare_v159_probe_v157_baseline -- --exact --test-threads=1
      - name: Run V159 functional disposable-PG contract
        working-directory: .
        env:
          ALR_V159_DISPOSABLE_ACK: "1"
          ALR_V159_DISPOSABLE_ADMIN_DSN: >-
            host=127.0.0.1 port=5432 dbname=alr_v159_functional_ci
            user=contract_user password=contract_pass
        run: >-
          python3 program_code/ml_training/tests/integration/alr_durable_fit_attestation_isolated_pg.py
          --confirm-disposable-v159
          --expected-database alr_v159_functional_ci
          --disposable-sentinel V159_DURABLE_FIT_DISPOSABLE_MUTATION_CONFIRMED:alr_v159_functional_ci
      - name: Remove V159 functional probe database
        if: always()
        working-directory: .
        # V159 fail-closes on cross-database ownership by its fixed roles.
        # Force-drop the first target before the second probe can own objects.
        run: >-
          PGPASSWORD=contract_pass dropdb --force --if-exists
          -h 127.0.0.1 -U contract_user alr_v159_functional_ci
      - name: Run V159 concurrency disposable-PG contract
        working-directory: .
        env:
          ALR_V159_CONCURRENCY_DISPOSABLE_ACK: "1"
          ALR_V159_DISPOSABLE_ADMIN_DSN: >-
            host=127.0.0.1 port=5432 dbname=alr_v159_concurrency_ci
            user=contract_user password=contract_pass
        run: >-
          python3 program_code/ml_training/tests/integration/alr_durable_fit_attestation_concurrency_isolated_pg.py
          --confirm-disposable-v159-concurrency
          --expected-database alr_v159_concurrency_ci
          --disposable-sentinel V159_DURABLE_FIT_CONCURRENCY_DISPOSABLE_MUTATION_CONFIRMED:alr_v159_concurrency_ci
      - name: Remove V159 concurrency probe database
        if: always()
        working-directory: .
        run: >-
          PGPASSWORD=contract_pass dropdb --force --if-exists
          -h 127.0.0.1 -U contract_user alr_v159_concurrency_ci
      - name: Prepare V157 baseline for V160 functional probe
        env:
          OPENCLAW_TEST_PG: postgres://127.0.0.1:5432/alr_v160_functional_ci?user=contract_user&password=contract_pass
          OPENCLAW_V160_PROBE_BASELINE: "1"
        run: >-
          cargo test -p openclaw_engine --test schema_contract_test
          prepare_v160_probe_v157_baseline -- --exact --test-threads=1
      - name: Prepare V157 baseline for V160 concurrency probe
        env:
          OPENCLAW_TEST_PG: postgres://127.0.0.1:5432/alr_v160_concurrency_ci?user=contract_user&password=contract_pass
          OPENCLAW_V160_PROBE_BASELINE: "1"
        run: >-
          cargo test -p openclaw_engine --test schema_contract_test
          prepare_v160_probe_v157_baseline -- --exact --test-threads=1
      - name: Run V160 functional disposable-PG contract
        working-directory: .
        env:
          ALR_V160_DISPOSABLE_ACK: "1"
          ALR_V160_DISPOSABLE_ADMIN_DSN: >-
            host=127.0.0.1 port=5432 dbname=alr_v160_functional_ci
            user=contract_user password=contract_pass
        run: >-
          python3 program_code/ml_training/tests/integration/alr_atomic_fit_consumption_isolated_pg.py
          --confirm-disposable-v160
          --expected-database alr_v160_functional_ci
          --disposable-sentinel V160_ATOMIC_FIT_DISPOSABLE_MUTATION_CONFIRMED:alr_v160_functional_ci
      - name: Remove V160 functional probe database
        if: always()
        working-directory: .
        run: >-
          PGPASSWORD=contract_pass dropdb --force --if-exists
          -h 127.0.0.1 -U contract_user alr_v160_functional_ci
      - name: Run V160 concurrency disposable-PG contract
        working-directory: .
        env:
          ALR_V160_CONCURRENCY_DISPOSABLE_ACK: "1"
          ALR_V160_DISPOSABLE_ADMIN_DSN: >-
            host=127.0.0.1 port=5432 dbname=alr_v160_concurrency_ci
            user=contract_user password=contract_pass
        run: >-
          python3 program_code/ml_training/tests/integration/alr_atomic_fit_consumption_concurrency_isolated_pg.py
          --confirm-disposable-v160-concurrency
          --expected-database alr_v160_concurrency_ci
          --disposable-sentinel V160_ATOMIC_FIT_CONCURRENCY_DISPOSABLE_MUTATION_CONFIRMED:alr_v160_concurrency_ci
      - name: Remove V160 concurrency probe database
        if: always()
        working-directory: .
        run: >-
          PGPASSWORD=contract_pass dropdb --force --if-exists
          -h 127.0.0.1 -U contract_user alr_v160_concurrency_ci
      - name: Schema-consumer contract test (cargo)
        # 正向：對代表性熱表跑真實 writer/consumer query（type/nullable/ON CONFLICT 都驗）。
        env:
          OPENCLAW_TEST_PG: postgres://127.0.0.1:5432/contract_db?user=contract_user&password=contract_pass
          OPENCLAW_AUTO_MIGRATE: "1"
        run: cargo test -p openclaw_engine --test schema_contract_test -- --test-threads=1
      - name: Migration-declared vs DB audit (python, informational-only)
        # audit_migrations.py 反射 information_schema.columns，列出「migration 宣告但
        # DB 缺」的物件，補 consumer-test 的另一向診斷視角。**informational-only，非 gate**：
        # parser 是 naive forward regex（無 drop/rename 感知），對 create-then-drop 的
        # 生命週期表（如 learning.decision_features、observability.scorer_predictions）會
        # 報 false-positive「missing」；故 main() 恆 return 0，不能用其 exit code 攔 CI。
        # 真正的 drift gate 是上一個 cargo schema_contract_test step（query 真執行）。
        working-directory: .
        env:
          POSTGRES_USER: contract_user
          POSTGRES_PASSWORD: contract_pass
          POSTGRES_DB: contract_db
        run: python3 helper_scripts/db/audit_migrations.py

  # stock_etf 靜態 guard（G0.5）：ADR-0048 IBKR lane 的 AST/檔案掃描層防線
  # （Python 唯讀邊界 / route GET-only / GUI 不寫 / surface coverage），原本只在
  # 本地 pytest 跑、hosted CI 無覆蓋。純 stdlib（ast/re/pathlib）+ pytest，無 FastAPI 等重依賴。
  # 成本紀律（2000min/月，單 runner）：限 pull_request → 只 PR 跑、ubuntu-latest 1x 倍率、零 macOS 10x。
  stock-etf-static-guards:
    name: stock_etf static guards (python)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.stock_etf == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Install pytest
        # pytest-asyncio 供 repo 根 pytest.ini 的 asyncio_mode=strict（否則發 unknown-ini 警告）。
        # fastapi/httpx/slowapi 供 W4 connection-health lockstep 套件（route fixtures 走
        # FastAPI TestClient + app.main_legacy 的 slowapi Limiter）——最小集已本地空 venv 實證。
        run: pip install pytest pytest-asyncio fastapi httpx slowapi
      - name: Run stock_etf static-guard tests
        run: |
          python -m pytest -q \
            program_code/exchange_connectors/bybit_connector/control_api_v1/tests/test_stock_etf_python_no_write_static_guard.py \
            program_code/exchange_connectors/bybit_connector/control_api_v1/tests/test_stock_etf_route_static_guard.py \
            program_code/exchange_connectors/bybit_connector/control_api_v1/tests/test_stock_etf_static_gui_guard.py \
            program_code/exchange_connectors/bybit_connector/control_api_v1/tests/test_stock_etf_surface_coverage_static_guard.py
      - name: Run stock_etf / ibkr structure static-guard tests
        # tests/structure 的 rust source-static 守衛（handler/tests split cap、無 runtime
        # material 讀取、rust source coverage、ibkr phase2 gate 與 TWS session-state 契約）。
        # glob 由 shell 展開，pytest 收多檔；純 stdlib（ast/re/pathlib），無重依賴。
        run: |
          python -m pytest -q \
            tests/structure/test_stock_etf_*.py \
            tests/structure/test_ibkr_*.py
      - name: Run W4 connection-health lockstep / parity / tripwire tests
        # W5-S0 ③(c)（R8 審計洞③）：W4 lockstep 套件（routes 三層/tripwire + cross-surface
        # parity/superset）入 hosted CI——單改 Rust emitter 的 PR 由 stock_etf gate 觸發本
        # job，破 lockstep 即紅。**執行計數證明**（R1 教訓：字面 filter 空轉）：先
        # --collect-only 斷言收集數 ≥ 10（2026-07-16 落地時為 15），空轉即紅；pytest 對
        # 空集合 exit 5 為第二道兜底。
        run: |
          set -euo pipefail
          suite="program_code/exchange_connectors/bybit_connector/control_api_v1/tests"
          collected=$(python -m pytest -q --collect-only \
            "$suite"/test_stock_etf_connection_health_routes.py \
            "$suite"/test_stock_etf_connection_health_cross_surface_parity.py \
            | grep -c '::')
          echo "connection-health collected tests: $collected"
          test "$collected" -ge 10
          python -m pytest -q \
            "$suite"/test_stock_etf_connection_health_routes.py \
            "$suite"/test_stock_etf_connection_health_cross_surface_parity.py

  # IBKR lane Rust 測試 + G4 symbol audit（W-CI：IBKR-CI-1 / IBKR-CI-2，出典 IBKR_TODO §5）。
  # 缺口：rust-check-linux 只跑 cargo check，37 個 openclaw_types ibkr_*/stock_etf_*
  # acceptance 檔與引擎 ibkr_phase2 in-file 測試在 hosted CI 原本零執行覆蓋
  # （emergency merge 可繞過本地 E4，同 G0.5 當年的 CI drift 病根）。
  # 範圍鎖五個 scope 而非引擎全測（全測含 40 個 integration-test bin + PG fixture，太重）：
  #   1) openclaw_types 用 --test glob 按「測試檔」選 target——cargo 的名稱 filter 只匹配
  #      測試函數路徑（不含檔名），acceptance fn 名多不含 ibkr/stock_etf，用名稱 filter 會空轉；
  #   2) 引擎側 ibkr 命中面全在 lib in-file 測試（tests/ 目錄零 ibkr 檔；
  #      ibkr_phase2_seal bin 的 2 個 CLI test fn 名不含 ibkr，任何 target 選擇下
  #      名稱 filter 都不會執行它們），故 --lib 限縮編譯與全 package filter 的執行集合等價；
  #      filter 取 ibkr（非 ibkr_phase2）以同時覆蓋 gate producer、secret-slot loader
  #      與 readonly TWS client 三個模組的 in-file 測試，增量成本≈0（同一 lib harness）。
  # 成本紀律（2000min/月）：限 pull_request、ubuntu-latest 1x 倍率、零 macOS 10x。
  rust-ibkr-tests:
    name: ibkr lane rust tests + g4 symbol audit (linux)
    needs: changes
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.stock_etf == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Cache Rust build artifacts
        # 反覆 cargo test openclaw_types + openclaw_engine（--lib/--bin）並暖 target/
        # 供後續 g4 / fake-tws symbol audit 重用，35min timeout 的重編譯 job，快取效益大。
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rust
      - name: Run openclaw_types ibkr acceptance tests
        run: cargo test -p openclaw_types --test 'ibkr_*'
      - name: Run openclaw_types stock_etf acceptance tests
        run: cargo test -p openclaw_types --test 'stock_etf_*'
      - name: Run openclaw_engine ibkr in-file tests
        run: cargo test -p openclaw_engine --lib ibkr
      - name: Run openclaw_engine stock_etf IPC in-file tests
        # 驗收明文含 lane IPC 測試（ipc_server::tests::stock_etf 31 fn；
        # 名稱 filter ibkr 只命中 3 個，此步以 module 路徑 stock_etf 全收）。
        run: cargo test -p openclaw_engine --lib stock_etf
      - name: Run openclaw_engine seal CLI bin tests
        # ibkr_phase2_seal bin 的 2 個 CLI test fn 名不含 ibkr，唯有按 bin target 才會執行。
        run: cargo test -p openclaw_engine --bin ibkr_phase2_seal
      - name: Run openclaw_fake_tws unit tests
        # W5-S0 ④：fake crate 9 個 unit test 原不在任何 CI scope（dev-dep-only crate，
        # engine 的 --lib/--bin target 不會帶入）；按 package 直跑補上。
        run: cargo test -p openclaw_fake_tws
      - name: Run the IBKR G4 symbol audit against the default debug build
        # 斷言效期綁 W3 build-posture 重裁：若重裁採「能力進 default build」方案，
        # 必須在同一 PR 內把本斷言改版為「connect 路徑必經 envelope 驗證」類負面斷言；
        # 不得留紅、不得靜默刪除（出典 IBKR_TODO §5 W-CI IBKR-CI-2）。
        # script 自帶 default debug build（cargo build -p openclaw_engine），前面
        # cargo test 已暖 target/，此處增量重用；stripped/空 symtab 走 fail-closed exit 5。
        working-directory: .
        run: bash helper_scripts/ci/ibkr_g4_symbol_audit.sh
      - name: Run the IBKR W3-S2 INV-1 permit-stub static guard
        # CC 約束 #8（設計 §1.5/§10）:斷言 default-build connect 路徑的 permit provider 是具體
        # EnvelopeRequiredStub（禁 dyn/泛型）、PermitToken 非 Clone·構造子 crate-private、stub 零
        # env/config/cfg 讀取;內建正控（注入放行 provider/env → 守衛 FAIL）+ inconclusive 非零 exit。
        # 純源級靜態掃描（無需編譯,ubuntu 1x,零 macOS 10x）;script 自算 repo root,不依賴 cwd。
        working-directory: .
        run: python3 tests/structure/test_ibkr_tws_permit_stub_source_static.py
      - name: Run the IBKR W3-S4 fake-TWS dev-dep-only structure guard
        # IBKR-CI-3 (a)（CC 約束 ⑤;設計 §4）:掃全 workspace 成員 Cargo.toml,斷言 openclaw_fake_tws
        # 只出現在 [dev-dependencies]（禁任何 production dep）+ engine 確有 dev-dep + fake 不依賴
        # engine（engine-independent,避 dev-dep cycle）;內建正控（fake 進 production dep → FAIL）+
        # inconclusive 非零 exit。純源級靜態掃描（無需編譯,ubuntu 1x）;自算 repo root,不依賴 cwd。
        working-directory: .
        run: python3 tests/structure/test_ibkr_fake_tws_devdep_only.py
      - name: Run the IBKR W3-S4 fake-TWS absence audit against the default debug build
        # IBKR-CI-3 (b)（CC 約束 ⑤;設計 §4）:Part 1 nm default debug engine artifact 零 fake_tws
        # 符號（dev-only → default build 不編譯 → 結構性缺席;conclusive gate + fail-closed exit 5,
        # 仿 g4 audit）;Part 2 源掃 fake crate src 零真實 socket token。前面 cargo test 已暖 target/,
        # 此處增量重用 default build。正控（IBKR_FAKE_TWS_AUDIT_BIN 指向 engine lib-test bin →
        # fake 符號命中 → FAIL）已於本地實證有牙。
        working-directory: .
        run: bash helper_scripts/ci/ibkr_fake_tws_absence_audit.sh
      - name: Run the IBKR W4 driver-absence audit against the default debug build
        # W4-1（設計 §5;E2-F1）:health 查詢是 session/pacing 的首個 production caller,但 driver
        # (`ibkr_tws_driver`)仍 production-DCE。Part A 斷言 session 符號 present（W4 已 wire）、
        # Part B nm default debug engine artifact 零 `ibkr_tws_driver` 符號（send_framed 真消費者
        # 屬 W8 TCP factory,W4 前 driver 不得有 production caller）;conclusive gate + fail-closed
        # exit 5,仿 g4。正控（指 fake-linked lib-test bin → driver 符號命中 → FAIL）已本地實證有牙。
        working-directory: .
        run: bash helper_scripts/ci/ibkr_driver_absence_audit.sh
