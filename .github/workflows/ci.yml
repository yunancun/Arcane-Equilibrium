name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-check:
    name: rust check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install target
        run: rustup target add "${{ matrix.target }}"
      - name: Cargo check
        run: cargo check --target "${{ matrix.target }}" --release -p openclaw_engine --bin openclaw-engine
