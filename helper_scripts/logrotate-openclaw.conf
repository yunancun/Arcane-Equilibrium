# OpenClaw 引擎 live 日誌輪轉（logrotate，crontab 每小時跑）。
# 目標 = 引擎 stdout/stderr（fd 1/2 → $DATA_DIR/engine.log，預設 /tmp/openclaw/engine.log）。
# 注意：engine_results.jsonl 由 canary_writer.rs 自帶 size-rotation 管理，不在此處；
#       engine_logs/engine-*.log 歸檔由 restart_all.sh rotate_engine_log() 壓縮+keep-10 管理。
/tmp/openclaw/engine.log {
    maxsize 1G
    rotate 3
    compress
    missingok
    notifempty
    copytruncate
}
