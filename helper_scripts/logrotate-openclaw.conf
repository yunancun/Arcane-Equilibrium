# ============================================================================
# logrotate-openclaw.conf — trade-core 日誌輪替正本(canonical,入庫版)
# ----------------------------------------------------------------------------
# 執行機制:live crontab Tier 0 整點行每小時執行
#   0 * * * * /usr/sbin/logrotate -s /home/ncyu/logrotate-openclaw.state /home/ncyu/logrotate-openclaw.conf
# 安裝契約:改動一律先改本 canonical、過 review,再 cp 到 runtime 路徑;禁止只改
#   runtime 副本(2026-06-15 入庫動機=消滅 runtime-only drift;2026-07-15 實證 runtime
#   副本曾漂回 /tmp 舊路徑,致真 engine.log 輪替空轉、cron log 裸奔,教訓再確認):
#   cp /home/ncyu/BybitOpenClaw/srv/helper_scripts/logrotate-openclaw.conf /home/ncyu/logrotate-openclaw.conf
# 路徑說明:本檔為 trade-core per-host 正本,保留機器絕對路徑(logrotate conf 無 env
#   展開能力;理由同 crontab.trade-core.template),生產代碼禁硬編碼路徑原則不受影響。
# 不歸此檔管的輪替(勿加回,各有既有機制):
#   - engine_results.jsonl:canary_writer.rs 自帶 size-rotation;
#   - engine_logs/engine-*.log:restart_all.sh rotate_engine_log() mv+keep-10(不壓縮
#     ——engine_watchdog 崩潰分類讀純 UTF-8 不識 .gz,2026-06-15 壓縮版已回退)。
# ============================================================================

# 引擎 stdout/stderr(fd 1/2 → $OPENCLAW_DATA_DIR/engine.log)。
# 2026-07-04 env 統一後 runtime SSOT = var/openclaw(非 /tmp);此 stanza 為引擎日誌
# 輪替主體(2026-07-15 前 runtime 副本只蓋 /tmp 死路徑,var 真身自 06-27 起無輪替)。
/home/ncyu/BybitOpenClaw/var/openclaw/engine.log {
    size 1G
    rotate 3
    compress
    missingok
    notifempty
    copytruncate
}

# /tmp 舊默認路徑,保留純作保險(missingok):萬一未帶 env 的手動啟動回退舊默認,
# 日誌仍有上限——2026-07-14 前確曾發生此回退。
/tmp/openclaw/engine.log {
    size 1G
    rotate 3
    compress
    missingok
    notifempty
    copytruncate
}

# cron 日誌目錄全量 size-cap。動機(2026-07-15):alpha_discovery_throughput_cron.log
# 無輪替長到 4.5GB(~180MB/day,runtime_runner --print-json 每 15min 全量 JSON 落 log),
# 同目錄其餘 cron log 普遍無上限。寫入者全是短命 cron 進程以 '>>'(O_APPEND)追加,
# copytruncate 安全;輪替瞬間 in-flight 行有微小丟失窗,觀測型 log 可接受(與 engine.log
# stanza 既有取捨一致)。size 200M × rotate 7 ≈ 按 alpha 現行增速保留約一週 RCA 視窗。
# 全檔用 size 而非 maxsize:maxsize 在無 daily/weekly 排程的 conf 中退化為「默認 1MiB
# size 基線+maxsize 提前條款」(2026-07-15 logrotate -d 實證;舊 conf 即因此 >1M 就轉,
# 7/14 /tmp、6/27 var 的小時級輪替指紋皆此病),size 才是純 size-cap 語意。
# 刻意不用 dateext:同日二次觸頂會因目標檔名衝突被跳過,size-cap 語意會破。
/home/ncyu/BybitOpenClaw/var/openclaw/logs/*.log {
    size 200M
    rotate 7
    compress
    missingok
    notifempty
    copytruncate
}
